<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中国近代史 练习系统</title>
  <link rel="stylesheet" href="assets/common.css">
  <script src="assets/question-loader.js"></script>
<script src="assets/session-sync.js" defer></script>
  <style>
    body{margin:0;background:#f5f7fb;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}
    .app{max-width:1180px;margin:0 auto;padding:24px}
    .toolbar,.card{background:#fff;border:1px solid #d9e2ef;border-radius:8px;padding:16px;margin-bottom:14px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button,select,input{border:1px solid #cbd5e1;border-radius:8px;padding:9px 12px;background:#fff;color:#0f172a}
    button.primary{background:#2563eb;border-color:#2563eb;color:#fff}
    .option{display:block;width:100%;text-align:left;margin:8px 0;padding:12px;border:1px solid #d9e2ef;border-radius:8px;background:#f8fafc}
    .option.correct{border-color:#22c55e;background:#f0fdf4}
    .option.wrong{border-color:#ef4444;background:#fef2f2}
    textarea{box-sizing:border-box;border:1px solid #cbd5e1;border-radius:8px;padding:12px;font:inherit;line-height:1.65;color:#0f172a}
    .muted{color:#64748b}.hidden{display:none}.answer-code{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:8px;padding:12px;line-height:1.55;overflow:auto}.analysis{margin-top:12px;padding:12px;background:#f8fafc;border-left:4px solid #2563eb;line-height:1.65}
  </style>
</head>
<body data-practice-shell="modern-history">
<aside id="practiceAnswerCard" class="practice-question-nav" aria-label="答题卡" hidden></aside>
<main class="app">
  <header class="card">
    <h1>中国近代史 练习系统</h1>
    <p class="muted">截图题库、学习通章节测验、2023 B 卷、2026 A 卷与模拟试卷题源；模拟考试采用最新格式：30 单选、15 多选、10 判断、2 简答、1 论述。</p>
  </header>

  <section class="toolbar">
    <div class="row">
      <select id="chapterFilter"></select>
      <select id="typeFilter"></select>
      <input id="searchBox" placeholder="搜索题干/解析">
      <button id="shuffleBtn">随机一题</button>
      <button id="resetBtn">重置本题</button>
      <button id="wrongBtn">错题本</button>
      <button id="exitWrongBtn" class="hidden">退出错题本</button>
      <button id="examBtn" class="primary">模拟考试</button>
      <button id="exitExamBtn" class="hidden">退出模拟</button>
      <span id="examInfo" class="muted"></span>
    </div>
  </section>

  <section id="questionPanel"></section>
</main>

<script>
const STORAGE_KEY = "modern_history_practice_state_v2";
let QUESTIONS = [];





const TYPE_NAME = {"single": "单选题", "multiple": "多选题", "fill": "填空题", "judge": "判断题", "short": "简答题", "essay": "论述题", "code": "代码题", "comprehensive": "综合应用题"};
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"answers":{},"wrong":{}}');
state.answers = state.answers || {};
state.wrong = state.wrong || {};
let current = 0;
let examMode = false;
let wrongMode = false;
let examQuestions = [];
const chapterFilter = document.getElementById("chapterFilter");
const typeFilter = document.getElementById("typeFilter");
const searchBox = document.getElementById("searchBox");
const shuffleBtn = document.getElementById("shuffleBtn");
const resetBtn = document.getElementById("resetBtn");
const wrongBtn = document.getElementById("wrongBtn");
const exitWrongBtn = document.getElementById("exitWrongBtn");
const examBtn = document.getElementById("examBtn");
const exitExamBtn = document.getElementById("exitExamBtn");
const examInfo = document.getElementById("examInfo");
const questionPanel = document.getElementById("questionPanel");

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function stemOf(q){ return q.stem || q.title || ""; }
function chapters(){
  const preferred = ["章节测验", "截图题库", "模拟试卷", "2023 B卷", "截图详解"];
  const seen = new Set(QUESTIONS.map(q => q.chapter || "未分章"));
  return [...preferred.filter(x => seen.has(x)), ...[...seen].filter(x => !preferred.includes(x))];
}
function optionEntries(q){
  if (q.type === "judge") return [["A", "对"], ["B", "错"]];
  if (Array.isArray(q.options)) return q.options.map(o => [o.label, o.text]);
  return Object.entries(q.options || {});
}
function normalizeAnswerKey(q, key){
  if (q.type !== "judge") return String(key);
  if (key === true || key === "true" || key === 1 || key === "1" || key === "A") return "A";
  if (key === false || key === "false" || key === 0 || key === "0" || key === "B") return "B";
  return String(key);
}
function correctKeys(q){ return (q.correct || []).map(k => normalizeAnswerKey(q, k)); }
function filtered(){
  const ch = chapterFilter.value;
  const ty = typeFilter.value;
  const kw = searchBox.value.trim().toLowerCase();
  return QUESTIONS.filter(q => (!ch || q.chapter === ch) && (!ty || q.type === ty) && (!kw || JSON.stringify(q).toLowerCase().includes(kw)));
}
function wrongList(){ return filtered().filter(q => Object.prototype.hasOwnProperty.call(state.wrong || {}, q.id)); }
function activeList(){ return examMode ? examQuestions : (wrongMode ? wrongList() : filtered()); }
function answerText(q){
  if (q.type === "fill") return (q.answers || (Array.isArray(q.answer) ? q.answer : [q.answer]).filter(Boolean)).join(" / ");
  if (q.type === "short" || q.type === "essay" || q.type === "code" || q.type === "comprehensive") return q.answer || "";
  const opts = Object.fromEntries(optionEntries(q));
  return correctKeys(q).map(k => opts[k] ? `${k}. ${opts[k]}` : k).join(" / ");
}
function hasKnownAnswer(q){ return Boolean(answerText(q)); }
function shuffleCopy(arr){
  const copy = arr.slice();
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}
function pick(pool, count){ return shuffleCopy(pool).slice(0, count); }
function buildModernExam(){
  const tagged = QUESTIONS.filter(q => (q.examTags || []).some(tag => String(tag).startsWith("modern-history-")) && hasKnownAnswer(q));
  const pool = tagged.length >= 58 ? tagged : QUESTIONS.filter(q => hasKnownAnswer(q));
  const byType = type => pool.filter(q => q.type === type);
  const latestByType = type => QUESTIONS
    .filter(q => q.type === type && (q.examTags || []).includes("modern-history-latest") && hasKnownAnswer(q))
    .sort((a,b) => (a.latestMockOrder || 9999) - (b.latestMockOrder || 9999));
  return [
    ...pick(byType("single"), 30),
    ...pick(byType("multiple"), 15),
    ...pick(byType("judge"), 10),
    ...(latestByType("short").length >= 2 ? latestByType("short").slice(0, 2) : pick(byType("short"), 2)),
    ...(latestByType("essay").length >= 1 ? latestByType("essay").slice(0, 1) : pick(byType("essay"), 1))
  ];
}
function buildLinuxExam(){
  const singles = QUESTIONS.filter(q => q.type === "single");
  const fills = QUESTIONS.filter(q => q.type === "fill");
  const judges = QUESTIONS.filter(q => q.type === "judge");
  const triangles = QUESTIONS.filter(q => q.examPool === "linux-triangle");
  const shortOther = QUESTIONS.filter(q => q.type === "short" && q.examPool !== "linux-triangle");
  const comprehensive = QUESTIONS.filter(q => q.type === "comprehensive");
  return [
    ...pick(singles, 25),
    ...pick(fills, 5),
    ...pick(judges, 10),
    ...pick(triangles, 1),
    ...pick(shortOther, 1),
    ...pick(comprehensive, 2)
  ];
}
function startExam(){
  examQuestions = buildModernExam();
  examMode = true;
  wrongMode = false;
  current = 0;
  chapterFilter.disabled = true;
  typeFilter.disabled = true;
  searchBox.disabled = true;
  wrongBtn.classList.add("hidden");
  exitWrongBtn.classList.add("hidden");
  examBtn.classList.add("hidden");
  exitExamBtn.classList.remove("hidden");
  examInfo.textContent = `模拟考试：${examQuestions.length} 题`;
  render();
}
function exitExam(){
  examMode = false;
  examQuestions = [];
  current = 0;
  chapterFilter.disabled = false;
  typeFilter.disabled = false;
  searchBox.disabled = false;
  wrongBtn.classList.remove("hidden");
  exitWrongBtn.classList.add("hidden");
  examBtn.classList.remove("hidden");
  exitExamBtn.classList.add("hidden");
  examInfo.textContent = "";
  render();
}
function enterWrong(){
  if (examMode) exitExam();
  wrongMode = true;
  current = 0;
  wrongBtn.classList.add("hidden");
  exitWrongBtn.classList.remove("hidden");
  examInfo.textContent = `错题本：${wrongList().length} 题`;
  render();
}
function exitWrong(){
  wrongMode = false;
  current = 0;
  wrongBtn.classList.remove("hidden");
  exitWrongBtn.classList.add("hidden");
  examInfo.textContent = "";
  render();
}
function render(){
  const list = activeList();
  if (wrongMode) examInfo.textContent = `错题本：${list.length} 题`;
  if (!list.length) {
    questionPanel.innerHTML = `<div class="card">${wrongMode ? "错题本暂无题目，或当前筛选条件下没有错题。" : "没有匹配题目。"}</div>`;
    return;
  }
  current = Math.max(0, Math.min(current, list.length - 1));
  const q = list[current];
  const saved = state.answers[q.id];
  let body = "";
  if (q.type === "single" || q.type === "judge") {
    body = optionEntries(q).map(([k,v]) => `<button class="option" data-answer="${esc(k)}"><b>${esc(k)}.</b> ${esc(v)}</button>`).join("");
  } else if (q.type === "multiple") {
    const savedSet = new Set(Array.isArray(saved) ? saved : []);
    body = optionEntries(q).map(([k,v]) => `<label class="option" data-option="${esc(k)}"><input type="checkbox" value="${esc(k)}" ${savedSet.has(k) ? "checked" : ""}> <b>${esc(k)}.</b> ${esc(v)}</label>`).join("");
  } else {
    body = `<textarea id="textAnswer" style="width:100%;min-height:150px">${esc(saved || "")}</textarea>`;
  }
  questionPanel.innerHTML = `<article class="card">
    <p class="muted">${examMode ? "模拟考试" : (wrongMode ? "错题本" : "学习模式")} · ${current + 1}/${list.length} · ${esc(q.source)} · ${esc(q.chapter)} · ${esc(TYPE_NAME[q.type] || q.type)}</p>
    <h2>${esc(stemOf(q))}</h2>
    ${body}
    <div class="row"><button class="primary" id="showBtn">提交/查看解析</button><button id="prevBtn">上一题</button><button id="nextBtn">下一题</button>${wrongMode ? '<button id="masterBtn">标记已掌握</button>' : ""}</div>
    <div id="analysis" class="analysis hidden"></div>
  </article>`;
  if (q.type === "single" || q.type === "judge") {
    questionPanel.querySelectorAll("[data-answer]").forEach(btn => btn.onclick = () => choose(q, btn.dataset.answer));
  }
  showBtn.onclick = () => submit(q);
  prevBtn.onclick = () => { current -= 1; render(); };
  nextBtn.onclick = () => { current += 1; render(); };
  const masterBtn = document.getElementById("masterBtn");
  if (masterBtn) masterBtn.onclick = () => { delete state.wrong[q.id]; save(); render(); };
}
function choose(q, value){
  state.answers[q.id] = value;
  const correct = correctKeys(q);
  if (correct.length) {
    const ok = correct.includes(value);
    if (ok) delete state.wrong[q.id]; else state.wrong[q.id] = value;
  } else {
    delete state.wrong[q.id];
  }
  save();
  show(q);
}
function submit(q){
  if (q.type === "multiple") {
    const selected = [...document.querySelectorAll('input[type="checkbox"]:checked')].map(x => x.value).sort();
    state.answers[q.id] = selected;
    const correct = [...correctKeys(q)].sort();
    if (correct.length) {
      const ok = selected.length === correct.length && selected.every((x, i) => x === correct[i]);
      if (ok) delete state.wrong[q.id]; else state.wrong[q.id] = selected;
    }
    save();
    show(q);
    return;
  }
  const text = document.getElementById("textAnswer");
  if (text) { state.answers[q.id] = text.value; save(); }
  show(q);
}
function show(q){
  const box = document.getElementById("analysis");
  const known = hasKnownAnswer(q);
  box.classList.remove("hidden");
  box.innerHTML = `<b>参考答案：</b><pre class="answer-code">${known ? esc(answerText(q)) : "待补充"}</pre><p>${esc(q.analysis || "")}</p>`;
  document.querySelectorAll(".option").forEach(el => {
    if (!known) return;
    const value = el.dataset.answer || el.dataset.option;
    if (correctKeys(q).includes(value)) el.classList.add("correct");
    else el.classList.add("wrong");
  });
}
function init(){
  chapterFilter.innerHTML = '<option value="">全部分类</option>' + chapters().map(x => `<option>${esc(x)}</option>`).join("");
  typeFilter.innerHTML = '<option value="">全部题型</option>' + Object.entries(TYPE_NAME).map(([k,v]) => `<option value="${k}">${v}</option>`).join("");
  [chapterFilter,typeFilter,searchBox].forEach(el => el.addEventListener("input", () => { current = 0; render(); }));
  shuffleBtn.onclick = () => { const list = activeList(); current = Math.floor(Math.random() * list.length); render(); };
  resetBtn.onclick = () => { const q = activeList()[current]; if (q) delete state.answers[q.id]; save(); render(); };
  wrongBtn.onclick = enterWrong;
  exitWrongBtn.onclick = exitWrong;
  examBtn.onclick = startExam;
  exitExamBtn.onclick = exitExam;
  render();
}
function practiceQuestionType(q){
  if(q.type === "single" || q.type === "multiple") return "choice";
  if(q.type === "judge") return "judge";
  if(q.type === "short") return "short";
  if(q.type === "essay") return "essay";
  if(q.type === "fill") return "fill";
  if(q.type === "code") return "code";
  if(q.type === "comprehensive") return "comprehensive";
  return "other";
}
window.studyHubPracticeStats=()=>{
  const done=Object.keys(state.answers||{}).length;
  const wrong=Object.keys(state.wrong||{}).length;
  const chapters=new Set(QUESTIONS.map(q=>q.chapter||"未分类")).size;
  const types=new Set(QUESTIONS.map(q=>practiceQuestionType(q))).size;
  return {total:QUESTIONS.length,done,wrong,extraLabel:"分类/题型",extraValue:`${chapters}/${types}`};
};
window.studyHubPracticeNav=()=>{
  const list=activeList();
  if(!list.length)return null;
  return {mode:'study',title:examMode?'模拟答题卡':(wrongMode?'错题答题卡':'答题卡'),current:current+1,items:list.map((q,i)=>({id:q.id,index:i+1,label:String(i+1),type:practiceQuestionType(q),done:state.answers[q.id]!==undefined,wrong:Boolean(state.wrong[q.id])})),jump(index){current=Math.max(0,Math.min(index-1,list.length-1));render();window.scrollTo(0,0);}};
};
studyHubLoadQuestions("data/modern-history.json", "中国近代史").then(data => { QUESTIONS = data; init(); });
</script>
</body>
</html>
