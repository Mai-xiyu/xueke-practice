<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>网络数据采集真题练习系统</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#e5e7eb;--pri:#2563eb;--pri2:#1d4ed8;--ok:#16a34a;--bad:#dc2626;--warn:#d97706;--code:#0f172a;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;line-height:1.55}.app{max-width:1180px;margin:0 auto;padding:22px}.top{display:flex;gap:16px;justify-content:space-between;align-items:flex-start;margin-bottom:16px}.title h1{margin:0;font-size:28px}.title p{margin:6px 0 0;color:var(--muted)}.statbar{display:flex;gap:10px;flex-wrap:wrap}.pill{background:#eef2ff;border:1px solid #dbeafe;color:#1e40af;padding:6px 10px;border-radius:999px;font-size:13px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.tab{border:1px solid var(--line);background:#fff;color:#111827;border-radius:10px;padding:9px 12px;cursor:pointer}.tab.active{background:var(--pri);border-color:var(--pri);color:#fff}.panel{display:none}.panel.active{display:block}.grid{display:grid;grid-template-columns:280px 1fr;gap:16px}.side,.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}.side{padding:14px;height:fit-content;position:sticky;top:12px}.card{padding:18px;margin-bottom:14px}label{display:block;font-size:13px;color:var(--muted);margin:10px 0 5px}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 10px;background:#fff;color:var(--text);font-family:inherit}textarea{min-height:150px;font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace}.row{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 12px;cursor:pointer;color:#111827}.btn.primary{background:var(--pri);border-color:var(--pri);color:#fff}.btn.danger{background:#fff1f2;color:#991b1b;border-color:#fecdd3}.btn.ok{background:#ecfdf5;color:#166534;border-color:#bbf7d0}.btn:disabled{opacity:.55;cursor:not-allowed}.qhead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.qid{font-size:13px;color:var(--muted)}.qstem{font-size:18px;font-weight:650;margin:10px 0 14px;white-space:pre-wrap}.option{display:block;width:100%;text-align:left;margin:8px 0;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer}.option:hover{border-color:#93c5fd;background:#eff6ff}.option.correct{border-color:#86efac;background:#f0fdf4;color:#14532d}.option.wrong{border-color:#fecaca;background:#fef2f2;color:#7f1d1d}.option.locked{cursor:default}.feedback{border-left:4px solid var(--pri);background:#f8fafc;padding:12px 14px;margin-top:14px;border-radius:10px}.feedback.ok{border-left-color:var(--ok)}.feedback.bad{border-left-color:var(--bad)}.expgrid{display:grid;gap:8px;margin-top:10px}.exp{padding:8px 10px;border-radius:10px;border:1px solid var(--line);background:#fff}.exp b{display:inline-block;min-width:24px}.note{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:10px;padding:10px 12px;margin-top:10px}.progress{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:12px 0}.progress>div{height:100%;background:var(--pri);width:0%}.small{font-size:13px;color:var(--muted)}.list{display:grid;gap:10px}.item{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px}.item h3{margin:0 0 8px;font-size:16px}.code{background:var(--code);color:#e5e7eb;border-radius:12px;padding:14px;overflow:auto;font-size:13px;white-space:pre-wrap}.kbd{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;background:#f1f5f9;border:1px solid #cbd5e1;border-radius:6px;padding:1px 5px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top}.table th{font-size:13px;color:var(--muted)}.hidden{display:none}.searchhit{background:#fef3c7}.modeTitle{font-size:20px;margin:0 0 8px}.footer{margin-top:26px;color:var(--muted);font-size:12px;text-align:center}@media(max-width:860px){.grid{grid-template-columns:1fr}.side{position:static}.top{display:block}.title h1{font-size:23px}}
</style>
<link rel="stylesheet" href="assets/common.css">
<script src="assets/question-loader.js"></script>
<script src="assets/session-sync.js" defer></script>
</head>
<body data-practice-shell="data-collection">
<aside id="practiceAnswerCard" class="practice-question-nav" aria-label="答题卡" hidden></aside>
<div class="app">
  <div class="top">
    <div class="title">
      <h1>网络数据采集真题练习系统</h1>
      <p>基于 A/B 卷真题整理，判断题由选择题生成，保留代码默写与请求爬虫示例。离线单文件运行。</p>
    </div>
    <div class="statbar">
      <span class="pill" id="totalPill"></span><span class="pill" id="donePill"></span><span class="pill" id="wrongPill"></span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="learn">学习模式</button>
    <button class="tab" data-tab="exam">模拟考试</button>
    <button class="tab" data-tab="code">代码默写</button>
    <button class="tab" data-tab="wrong">错题本</button>
    <button class="tab" data-tab="cards">速记卡片</button>
    <button class="tab" data-tab="browse">题库浏览</button>
  </div>

  <section class="panel active" id="learn">
    <div class="grid">
      <aside class="side">
        <h2 class="modeTitle">学习模式</h2>
        <label>来源</label><select id="learnSource"></select>
        <label>章节/专题</label><select id="learnChapter"></select>
        <label>题型</label><select id="learnType"><option value="all">全部</option><option value="single">单选</option><option value="tf">判断</option><option value="fill">填空</option><option value="short">简答</option><option value="code">代码</option></select>
        <label>搜索</label><input id="learnSearch" placeholder="如 XPath / Scrapy / Cookie" />
        <div class="row" style="margin-top:12px"><button class="btn primary" id="applyLearn">应用筛选</button><button class="btn" id="randomLearn">随机一题</button></div>
        <div class="progress"><div id="learnProgress"></div></div>
        <div class="small" id="learnInfo"></div>
      </aside>
      <main><div class="card" id="learnCard"></div></main>
    </div>
  </section>

  <section class="panel" id="exam">
    <div class="grid">
      <aside class="side">
        <h2 class="modeTitle">模拟考试</h2>
        <label>抽题范围</label><select id="examSource"></select>
        <label>题量</label><input id="examCount" type="number" min="5" max="120" value="40" />
        <label><input id="examIncludeFill" type="checkbox" style="width:auto;margin-right:6px">包含填空题</label>
        <div class="row" style="margin-top:12px"><button class="btn primary" id="startExam">开始/重抽</button><button class="btn danger" id="submitExam">交卷</button></div>
        <div class="small" style="margin-top:10px">模拟考试默认只抽单选/判断，适合快速刷分；勾选后加入填空题。</div>
      </aside>
      <main><div id="examArea"></div></main>
    </div>
  </section>

  <section class="panel" id="code">
    <div class="grid">
      <aside class="side">
        <h2 class="modeTitle">代码默写</h2>
        <label>筛选</label><select id="codeSource"><option value="all">全部</option></select>
        <button class="btn primary" id="refreshCode" style="margin-top:12px">刷新列表</button>
        <div class="small" style="margin-top:10px">代码题按关键词粗略检查，不运行代码。考试默写时优先保证骨架、库名、关键函数、参数位置。</div>
      </aside>
      <main><div id="codeArea"></div></main>
    </div>
  </section>

  <section class="panel" id="wrong"><div class="card"><h2 class="modeTitle">错题本</h2><div class="row"><button class="btn" id="clearWrong">清空错题</button><button class="btn" id="exportProgress">导出进度</button><button class="btn" id="importProgressBtn">导入进度</button><input id="importProgress" class="hidden" type="file" accept="application/json"></div><div id="wrongArea" style="margin-top:14px"></div></div></section>

  <section class="panel" id="cards"><div class="card"><h2 class="modeTitle">速记卡片</h2><div class="list" id="cardsArea"></div></div></section>

  <section class="panel" id="browse"><div class="card"><h2 class="modeTitle">题库浏览</h2><div class="row"><select id="browseSource" style="max-width:220px"></select><select id="browseType" style="max-width:160px"><option value="all">全部题型</option><option value="single">单选</option><option value="tf">判断</option><option value="fill">填空</option><option value="short">简答</option><option value="code">代码</option></select><input id="browseSearch" placeholder="搜索题干/选项/答案" style="max-width:360px"><button class="btn primary" id="doBrowse">搜索</button></div><div id="browseArea" style="margin-top:14px"></div></div></section>

  <div class="footer">本工具用于课程复习。涉及站点请求时，应控制频率并遵守授权、robots.txt、版权和平台规则。</div>
</div>

<script>
let QBANK = [];
const CARDS = [{"title": "requests + XPath 默写骨架", "body": "import requests；from lxml import etree；requests.get(url, headers, params, timeout)；设置 encoding；etree.HTML(resp.text)；html.xpath('表达式')。"}, {"title": "response 三件套", "body": "status_code 看状态码；text 是解码后的字符串；content 是原始字节；encoding 控制 text 解码。"}, {"title": "open 模式", "body": "r 读文本；w 写文本覆盖；a 追加；a+ 追加且可读；rb 读二进制；wb 写二进制，图片/视频必须用 wb。"}, {"title": "Cookie / Session", "body": "Cookie 通常保存在客户端；Session 数据通常保存在服务器端；requests.Session() 可自动保存并复用 Cookie。"}, {"title": "XPath 高频表达式", "body": "//div 取所有 div；//a/@href 取所有链接；//tag/text() 取文本；//*[@id='kw'] 按 id 定位；contains(@class,'item') 模糊匹配 class。"}, {"title": "Scrapy 工作流", "body": "Spider 产出 Request → Engine → Scheduler → Downloader → Response → Spider → Item → Item Pipeline。"}, {"title": "Scrapy 组件", "body": "Engine 核心协调；Scheduler 请求调度；Downloader 下载；Spider 解析；Item Pipeline 清洗/去重/入库；Middleware 扩展请求与响应处理。"}, {"title": "Feapder 内置爬虫", "body": "AirSpider 轻量；Spider 分布式/断点续爬；TaskSpider 任务型；BatchSpider 周期批次。旧课件可能只列 AirSpider、Spider、BatchSpider。"}, {"title": "数据存储选择", "body": "CSV/Excel 适合小规模表格；JSON 适合半结构化；MySQL/PostgreSQL 适合结构化关系数据；MongoDB 适合文档；Redis 适合缓存、队列、去重。"}, {"title": "反爬与合规", "body": "常见反爬：UA 检测、IP 频率、Cookie、验证码、JS 动态加载。合理做法：限速、遵守 robots/条款、不采集敏感或未授权数据。"}];
const META = {"title": "网络数据采集真题练习系统", "generated": "2026-06-19", "sources": ["2024-2025年度 第二学期 网络数据采集A卷", "2024-2025年度 第二学期 网络数据采集B卷"], "count": 72};
const STORAGE_KEY = 'crawler_practice_v1';
let state = loadState();
let learnList = [];
let learnIdx = 0;
let examList = [];
let examAnswers = {};
let examSubmitted = false;

function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {done:{}, wrong:{}, mastered:{}}}catch(e){return {done:{}, wrong:{}, mastered:{}}}}
function saveState(){localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); updatePills();}
function norm(s){return String(s||'').trim().toLowerCase().replace(/[\s　]+/g,'').replace(/[“”]/g,'"').replace(/[‘’]/g,"'");}
function qById(id){return QBANK.find(q=>q.id===id)}
function labelType(t){return {single:'单选',tf:'判断',fill:'填空',short:'简答',code:'代码'}[t]||t}
function sources(includeAll=true){let arr=[...new Set(QBANK.map(q=>q.source))]; return includeAll?['全部',...arr]:arr}
function chaptersFor(src){let list=QBANK.filter(q=>src==='全部'||src==='all'||q.source===src).map(q=>q.chapter); return ['全部',...[...new Set(list)].sort()]}
function escapeHtml(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function optionText(q,k){return q.options && q.options[k] ? q.options[k] : k}
function answerText(q){ if(q.type==='fill') return q.answers.join(' / '); if(q.type==='short'||q.type==='code') return q.answer; return q.correct.map(k=>`${k}. ${optionText(q,k)}`).join('；'); }
function containsText(q, kw){kw=norm(kw); if(!kw) return true; let blob=[q.id,q.source,q.chapter,q.type,q.stem,q.analysis,q.note,answerText(q), ...(q.options?Object.values(q.options):[])].join(' '); return norm(blob).includes(kw)}
function filterQuestions(src,chapter,type,kw){return QBANK.filter(q=>(src==='全部'||src==='all'||q.source===src)&&(chapter==='全部'||chapter==='all'||q.chapter===chapter)&&(type==='all'||q.type===type)&&containsText(q,kw));}
function updatePills(){document.getElementById('totalPill').textContent=`题库 ${QBANK.length} 题`;document.getElementById('donePill').textContent=`已练 ${Object.keys(state.done||{}).length} 题`;document.getElementById('wrongPill').textContent=`错题 ${Object.keys(state.wrong||{}).length} 题`;}
function initSelects(){
  for(const id of ['learnSource','examSource','browseSource']){let el=document.getElementById(id); el.innerHTML=sources(true).map(s=>`<option value="${s==='全部'?'all':escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');}
  document.getElementById('codeSource').innerHTML=['全部',...new Set(QBANK.filter(q=>q.type==='code').map(q=>q.source))].map(s=>`<option value="${s==='全部'?'all':escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
  updateChapterSelect();
}
function updateChapterSelect(){let src=document.getElementById('learnSource').value; let srcName=src==='all'?'全部':src; document.getElementById('learnChapter').innerHTML=chaptersFor(srcName).map(c=>`<option value="${c==='全部'?'all':escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');}
function renderLearn(){
  if(!learnList.length){document.getElementById('learnCard').innerHTML='<p>没有匹配题目。</p>'; return;}
  let q=learnList[learnIdx];
  document.getElementById('learnProgress').style.width=((learnIdx+1)/learnList.length*100).toFixed(1)+'%';
  document.getElementById('learnInfo').textContent=`第 ${learnIdx+1} / ${learnList.length} 题`;
  document.getElementById('learnCard').innerHTML=renderQuestion(q,'learn');
  bindQuestion(q,'learn');
}
function renderQuestion(q,ctx){
 let meta=`<div class="qid">${escapeHtml(q.id)} · ${escapeHtml(q.source)} · ${escapeHtml(q.chapter)} · ${labelType(q.type)}</div>`;
 let nav=ctx==='learn'?`<div class="row"><button class="btn" onclick="prevLearn()">上一题</button><button class="btn" onclick="nextLearn()">下一题</button><button class="btn ok" onclick="markMastered('${q.id}')">标记掌握</button></div>`:'';
 let body='';
 if(q.type==='single'||q.type==='tf'){
   body=Object.entries(q.options).map(([k,v])=>`<button class="option" data-answer="${k}" data-qid="${q.id}" data-ctx="${ctx}"><b>${k}</b>. ${escapeHtml(v)}</button>`).join('');
 } else if(q.type==='fill') {
   body=`<input data-fill="${q.id}" placeholder="输入答案，支持同义答案粗略匹配"><div class="row" style="margin-top:10px"><button class="btn primary" data-fill-submit="${q.id}" data-ctx="${ctx}">提交</button><button class="btn" data-show-answer="${q.id}" data-ctx="${ctx}">显示答案</button></div>`;
 } else if(q.type==='short') {
   body=`<textarea placeholder="先自己默写，再点显示答案"></textarea><div class="row" style="margin-top:10px"><button class="btn primary" data-show-answer="${q.id}" data-ctx="${ctx}">显示参考答案</button></div>`;
 } else if(q.type==='code') {
   body=`<textarea data-code-input="${q.id}" placeholder="先默写代码；再检查关键词或显示答案"></textarea><div class="row" style="margin-top:10px"><button class="btn primary" data-code-check="${q.id}" data-ctx="${ctx}">检查关键词</button><button class="btn" data-show-answer="${q.id}" data-ctx="${ctx}">显示参考代码</button></div>`;
 }
 return `<div class="qhead"><div>${meta}</div>${nav}</div><div class="qstem">${escapeHtml(q.stem)}</div>${q.note?`<div class="note">${escapeHtml(q.note)}</div>`:''}<div>${body}</div><div id="fb-${ctx}-${q.id}"></div>`;
}
function feedbackHtml(q, ok, chosen){
 let cls=ok?'ok':'bad'; let title=ok?'正确':'错误';
 let html=`<div class="feedback ${cls}"><b>${title}</b><div>正确答案：${escapeHtml(answerText(q))}</div>`;
 if(q.analysis) html+=`<div style="margin-top:6px">解析：${escapeHtml(q.analysis)}</div>`;
 if(q.explanations){ html+='<div class="expgrid">'+Object.entries(q.options).map(([k,v])=>`<div class="exp"><b>${k}</b> ${escapeHtml(v)}<br><span class="small">${escapeHtml(q.explanations[k]||'')}</span></div>`).join('')+'</div>'; }
 if(q.note) html+=`<div class="note">${escapeHtml(q.note)}</div>`;
 html+='</div>'; return html;
}
function bindQuestion(q,ctx){
 document.querySelectorAll(`[data-ctx="${ctx}"][data-qid="${q.id}"]`).forEach(btn=>btn.onclick=()=>gradeChoice(q,ctx,btn.dataset.answer));
 document.querySelectorAll(`[data-fill-submit="${q.id}"]`).forEach(btn=>btn.onclick=()=>gradeFill(q,ctx));
 document.querySelectorAll(`[data-show-answer="${q.id}"]`).forEach(btn=>btn.onclick=()=>showAnswer(q,ctx));
 document.querySelectorAll(`[data-code-check="${q.id}"]`).forEach(btn=>btn.onclick=()=>checkCode(q,ctx));
}
function gradeChoice(q,ctx,ans){
 let ok=q.correct.includes(ans); state.done[q.id]=Date.now(); if(ok) delete state.wrong[q.id]; else state.wrong[q.id]={at:Date.now(), chosen:ans}; saveState();
 document.querySelectorAll(`[data-ctx="${ctx}"][data-qid="${q.id}"]`).forEach(btn=>{btn.classList.add('locked'); btn.disabled=true; let a=btn.dataset.answer; if(q.correct.includes(a)) btn.classList.add('correct'); if(a===ans&&!q.correct.includes(a)) btn.classList.add('wrong');});
 document.getElementById(`fb-${ctx}-${q.id}`).innerHTML=feedbackHtml(q,ok,ans);
}
function gradeFill(q,ctx){
 let val=document.querySelector(`[data-fill="${q.id}"]`).value; let ok=q.answers.some(a=>norm(val)===norm(a)||norm(val).includes(norm(a))||norm(a).includes(norm(val))&&norm(val).length>1);
 state.done[q.id]=Date.now(); if(ok) delete state.wrong[q.id]; else state.wrong[q.id]={at:Date.now(), chosen:val}; saveState();
 document.getElementById(`fb-${ctx}-${q.id}`).innerHTML=feedbackHtml(q,ok,val);
}
function showAnswer(q,ctx){
 state.done[q.id]=Date.now(); saveState();
 let extra=''; if(q.type==='code') extra=`<pre class="code">${escapeHtml(q.answer)}</pre>`; else extra=`<div class="feedback"><b>参考答案</b><div style="margin-top:6px;white-space:pre-wrap">${escapeHtml(answerText(q))}</div>${q.analysis?`<div style="margin-top:8px">解析：${escapeHtml(q.analysis)}</div>`:''}</div>`;
 document.getElementById(`fb-${ctx}-${q.id}`).innerHTML=extra;
}
function checkCode(q,ctx){
 let input=document.querySelector(`[data-code-input="${q.id}"]`).value; let missing=(q.required||[]).filter(x=>!input.includes(x)); let ok=missing.length===0;
 if(!ok) state.wrong[q.id]={at:Date.now(), chosen:'代码关键词缺失：'+missing.join(', ')}; else delete state.wrong[q.id]; state.done[q.id]=Date.now(); saveState();
 document.getElementById(`fb-${ctx}-${q.id}`).innerHTML=`<div class="feedback ${ok?'ok':'bad'}"><b>${ok?'关键词基本齐全':'缺少关键内容'}</b><div>${ok?'可再对照参考代码检查语法和缩进。':'缺失：'+escapeHtml(missing.join('，'))}</div><pre class="code">${escapeHtml(q.answer)}</pre></div>`;
}
window.prevLearn=()=>{if(learnIdx>0){learnIdx--;renderLearn();}}
window.nextLearn=()=>{if(learnIdx<learnList.length-1){learnIdx++;renderLearn();}}
window.markMastered=(id)=>{state.mastered[id]=Date.now(); saveState(); alert('已标记掌握');}
function applyLearn(){let src=document.getElementById('learnSource').value, ch=document.getElementById('learnChapter').value, type=document.getElementById('learnType').value, kw=document.getElementById('learnSearch').value; learnList=filterQuestions(src==='all'?'全部':src,ch==='all'?'全部':ch,type,kw); learnIdx=0; renderLearn();}
function shuffle(arr){return arr.map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1])}
function startExam(){let src=document.getElementById('examSource').value; let includeFill=document.getElementById('examIncludeFill').checked; let types=includeFill?['single','tf','fill']:['single','tf']; let pool=QBANK.filter(q=>(src==='all'||q.source===src)&&types.includes(q.type)); let n=Math.min(parseInt(document.getElementById('examCount').value||40), pool.length); examList=shuffle(pool).slice(0,n); examAnswers={}; examSubmitted=false; renderExam();}
function renderExam(){document.getElementById('examArea').innerHTML=examList.map((q,i)=>`<div class="card"><div class="qid">${i+1}. ${escapeHtml(q.id)} · ${escapeHtml(q.source)} · ${labelType(q.type)}</div><div class="qstem">${escapeHtml(q.stem)}</div>${renderExamInput(q)}</div>`).join('')||'<div class="card">请点击开始。</div>';}
function renderExamInput(q){if(q.type==='fill') return `<input data-exam-fill="${q.id}" placeholder="填写答案">`; return Object.entries(q.options).map(([k,v])=>`<label style="font-size:15px;color:#111827"><input type="radio" name="ex-${q.id}" value="${k}" style="width:auto;margin-right:8px">${k}. ${escapeHtml(v)}</label>`).join('')}
function submitExam(){if(!examList.length) return; let correct=0; let details=[]; for(const q of examList){let ans=''; if(q.type==='fill'){ans=document.querySelector(`[data-exam-fill="${q.id}"]`)?.value||''; if(q.answers.some(a=>norm(ans)===norm(a)||norm(ans).includes(norm(a)))) correct++; else details.push({q,ans});} else {ans=document.querySelector(`input[name="ex-${q.id}"]:checked`)?.value||''; if(q.correct.includes(ans)) correct++; else details.push({q,ans});} state.done[q.id]=Date.now(); if(details.find(d=>d.q.id===q.id)) state.wrong[q.id]={at:Date.now(),chosen:ans}; else delete state.wrong[q.id]; } saveState(); let score=(correct/examList.length*100).toFixed(1); let html=`<div class="card"><h2>交卷结果：${correct}/${examList.length}，正确率 ${score}%</h2></div>`; html+=details.map(d=>`<div class="card"><div class="qid">${escapeHtml(d.q.id)} · 你的答案：${escapeHtml(d.ans||'未答')}</div><div class="qstem">${escapeHtml(d.q.stem)}</div>${feedbackHtml(d.q,false,d.ans)}</div>`).join('') || '<div class="card"><b>没有错题。</b></div>'; document.getElementById('examArea').innerHTML=html;}
function renderCode(){let src=document.getElementById('codeSource').value; let list=QBANK.filter(q=>q.type==='code'&&(src==='all'||q.source===src)); document.getElementById('codeArea').innerHTML=list.map(q=>`<div class="card">${renderQuestion(q,'codepage')}</div>`).join(''); list.forEach(q=>bindQuestion(q,'codepage'));}
function renderWrong(){let ids=Object.keys(state.wrong||{}); let area=document.getElementById('wrongArea'); if(!ids.length){area.innerHTML='<p>暂无错题。</p>';return;} area.innerHTML=ids.map(id=>{let q=qById(id); if(!q)return ''; return `<div class="item"><div class="qid">${escapeHtml(q.id)} · ${escapeHtml(q.source)} · ${labelType(q.type)}</div><h3>${escapeHtml(q.stem)}</h3><div class="small">上次：${escapeHtml(state.wrong[id].chosen||'')}</div><div style="margin-top:8px">正确答案：${escapeHtml(answerText(q))}</div><button class="btn" onclick="removeWrong('${id}')" style="margin-top:8px">移出错题</button></div>`}).join('');}
window.removeWrong=(id)=>{delete state.wrong[id]; saveState(); renderWrong();}
function renderCards(){document.getElementById('cardsArea').innerHTML=CARDS.map(c=>`<div class="item"><h3>${escapeHtml(c.title)}</h3><p>${escapeHtml(c.body)}</p></div>`).join('')}
function renderBrowse(){let src=document.getElementById('browseSource').value, type=document.getElementById('browseType').value, kw=document.getElementById('browseSearch').value; let list=filterQuestions(src==='all'?'全部':src,'全部',type,kw); document.getElementById('browseArea').innerHTML=`<p class="small">共 ${list.length} 题</p><table class="table"><thead><tr><th>ID</th><th>题目</th><th>答案</th><th>解析</th></tr></thead><tbody>${list.map(q=>`<tr><td>${escapeHtml(q.id)}<br><span class="small">${escapeHtml(q.source)} / ${labelType(q.type)}</span></td><td>${escapeHtml(q.stem)}</td><td>${escapeHtml(answerText(q)).replace(/\n/g,'<br>')}</td><td>${escapeHtml(q.analysis||q.note||'').replace(/\n/g,'<br>')}</td></tr>`).join('')}</tbody></table>`;}
window.studyHubPracticeStats=()=>{let done=Object.keys(state.done||{}).length, wrong=Object.keys(state.wrong||{}).length;let srcs=sources(false).length, chapters=new Set(QBANK.map(q=>q.chapter)).size;return {total:QBANK.length,done,wrong,extraLabel:'题库/专题',extraValue:`${srcs}/${chapters}`};};
function practiceQuestionType(q){return q.type==='tf'?'judge':q.type}
window.studyHubPracticeNav=()=>{
  if(document.querySelector('.tab.active')?.dataset.tab!=='learn'||!learnList.length)return null;
  return {mode:'study',title:'答题卡',current:learnIdx+1,items:learnList.map((q,i)=>({id:q.id,index:i+1,label:String(i+1),type:practiceQuestionType(q),done:Boolean(state.done?.[q.id]),wrong:Boolean(state.wrong?.[q.id]),marked:Boolean(state.mastered?.[q.id])})),jump(index){learnIdx=Math.max(0,Math.min(index-1,learnList.length-1));renderLearn();window.scrollTo(0,0);}};
};
document.querySelectorAll('.tab').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));btn.classList.add('active');document.getElementById(btn.dataset.tab).classList.add('active'); if(btn.dataset.tab==='wrong')renderWrong(); if(btn.dataset.tab==='cards')renderCards(); if(btn.dataset.tab==='browse')renderBrowse(); if(btn.dataset.tab==='code')renderCode();});
document.getElementById('learnSource').onchange=updateChapterSelect; document.getElementById('applyLearn').onclick=applyLearn; document.getElementById('randomLearn').onclick=()=>{if(!learnList.length)applyLearn(); learnIdx=Math.floor(Math.random()*learnList.length); renderLearn();}; document.getElementById('startExam').onclick=startExam; document.getElementById('submitExam').onclick=submitExam; document.getElementById('refreshCode').onclick=renderCode; document.getElementById('doBrowse').onclick=renderBrowse; document.getElementById('clearWrong').onclick=()=>{if(confirm('确定清空错题本？')){state.wrong={};saveState();renderWrong();}}; document.getElementById('exportProgress').onclick=()=>{let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='crawler_practice_progress.json';a.click();}; document.getElementById('importProgressBtn').onclick=()=>document.getElementById('importProgress').click(); document.getElementById('importProgress').onchange=e=>{let f=e.target.files[0]; if(!f)return; let r=new FileReader(); r.onload=()=>{try{state=JSON.parse(r.result);saveState();renderWrong();alert('导入完成')}catch(err){alert('导入失败')}}; r.readAsText(f);};
studyHubLoadQuestions("data/data-collection.json", "数据采集").then(data => { QBANK = data; initSelects(); updatePills(); applyLearn(); startExam(); renderCards(); renderCode(); renderBrowse(); });
</script>
</body>
