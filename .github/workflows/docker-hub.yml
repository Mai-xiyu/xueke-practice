name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate, test, and build
        run: npm run check

      - name: Resolve Docker image name
        id: image
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
        run: |
          image="$DOCKERHUB_IMAGE"
          if [ -z "$image" ] && [ -n "$DOCKERHUB_USERNAME" ]; then
            image="$DOCKERHUB_USERNAME/xueke-practice"
          fi
          if [ -z "$image" ] && [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            image="local/xueke-practice"
          fi
          if [ -z "$image" ]; then
            echo "Set repository variable DOCKERHUB_USERNAME or DOCKERHUB_IMAGE." >&2
            exit 1
          fi
          echo "name=$image" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Web Docker metadata
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Session API Docker metadata
        id: meta-session-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=session-api-latest,enable={{is_default_branch}}
            type=ref,event=branch,prefix=session-api-
            type=ref,event=tag,prefix=session-api-
            type=sha,prefix=session-api-sha-

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Validate web Docker build configuration
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          call: check

      - name: Validate session API Docker build configuration
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          call: check

      - name: Build and publish web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}

      - name: Build and publish session API
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-session-api.outputs.tags }}
          labels: ${{ steps.meta-session-api.outputs.labels }}
