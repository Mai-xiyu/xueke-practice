<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>网络信息安全模拟练习题库</title><style>
:root{--bg:#0f172a;--panel:#111827;--card:#ffffff;--muted:#64748b;--line:#e5e7eb;--text:#111827;--primary:#2563eb;--green:#16a34a;--red:#dc2626;--amber:#d97706}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:#f3f4f6;color:var(--text)}
header{background:linear-gradient(135deg,#111827,#1e3a8a);color:#fff;padding:22px 24px}header h1{margin:0 0 8px;font-size:24px}header p{margin:0;color:#dbeafe}
.wrap{max-width:1180px;margin:0 auto;padding:18px}.toolbar,.card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 22px rgba(15,23,42,.06)}.toolbar{padding:14px;display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px;align-items:end;margin-bottom:14px}
label{font-size:13px;color:#475569;display:block;margin-bottom:5px}select,input,button{width:100%;padding:10px 11px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;font-size:14px}button{cursor:pointer;border:none;background:#2563eb;color:#fff;font-weight:650}button.secondary{background:#334155}button.ghost{background:#eef2ff;color:#1e3a8a}button.danger{background:#dc2626}button.ok{background:#16a34a}button:disabled{opacity:.55;cursor:not-allowed}
.tabs{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}.tab{width:auto;padding:9px 14px;border-radius:999px;background:#e5e7eb;color:#111827}.tab.active{background:#2563eb;color:white}
.card{padding:18px;margin-bottom:14px}.qhead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}.badge{display:inline-block;background:#e0f2fe;color:#075985;border-radius:999px;padding:4px 9px;font-size:12px;margin-right:6px}.badge2{background:#fef3c7;color:#92400e}.stem{font-size:18px;line-height:1.65;white-space:pre-wrap;margin:12px 0}
.option{border:1px solid #d1d5db;border-radius:12px;padding:12px;margin:10px 0;cursor:pointer;background:#fff;line-height:1.55;display:flex;gap:10px}.option:hover{border-color:#2563eb;background:#f8fafc}.option.correct{border-color:#16a34a;background:#ecfdf5}.option.wrong{border-color:#dc2626;background:#fef2f2}.option .key{font-weight:800;min-width:24px}.option .txt{flex:1;white-space:pre-wrap}
.explain{border-left:4px solid #2563eb;background:#eff6ff;padding:12px;border-radius:10px;margin-top:12px;line-height:1.65}.optExplain{font-size:13px;color:#475569;margin-top:6px;padding-left:34px;line-height:1.5}.correctText{color:#15803d;font-weight:700}.wrongText{color:#b91c1c;font-weight:700}
.row{display:flex;gap:10px;flex-wrap:wrap}.row button{width:auto}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}.stat b{font-size:22px}.muted{color:#64748b}.listItem{border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin:10px 0;background:#fff}.hidden{display:none!important}.small{font-size:13px;color:#64748b}mark{background:#fef08a}
@media(max-width:860px){.toolbar{grid-template-columns:1fr 1fr}.stats{grid-template-columns:1fr 1fr}.qhead{display:block}}
</style><link rel="stylesheet" href="assets/common.css">
<script src="assets/question-loader.js"></script>
<script src="assets/session-sync.js" defer></script>
</head><body data-practice-shell="network-security"><aside id="practiceAnswerCard" class="practice-question-nav" aria-label="答题卡" hidden></aside><header><h1>网络信息安全模拟练习题库</h1><p>客观题训练 + 实验复习。模拟考试按 30 道单选、10 道判断自动组卷。</p></header><div class="wrap">
<div class="stats hidden" id="stats"></div>
<div class="toolbar"><div><label>题库范围</label><select id="source"></select></div><div><label>专题</label><select id="topic"></select></div><div><label>题量</label><input id="count" type="number" min="1" value="40"></div><div><label>顺序</label><select id="order"><option value="shuffle">随机</option><option value="seq">顺序</option><option value="wrong">只练错题</option></select></div><div><label>搜索</label><input id="kw" placeholder="题干/选项/解析"></div><div><button onclick="applyFilter()">应用筛选</button></div></div>
<div class="tabs"><button class="tab active" onclick="setMode('learn')">学习模式</button><button class="tab" onclick="setMode('exam')">模拟考试</button><button class="tab" onclick="setMode('browse')">题库浏览</button><button class="tab" onclick="setMode('wrong')">错题本</button><button class="tab" onclick="setMode('review')">复习要点</button></div>
<div id="learn" class="card"></div><div id="exam" class="card hidden"></div><div id="browse" class="card hidden"></div><div id="wrong" class="card hidden"></div><div id="review" class="card hidden"></div>
</div><script>
let QUESTIONS = [];
const LS='netsec_practice_v1';let state=JSON.parse(localStorage.getItem(LS)||'{}');if(!state.done)state={done:{},wrong:{},answerOverride:{},exam:null};
let mode='learn', pool=[], idx=0, answered=false, examAnswers={};
function save(){localStorage.setItem(LS,JSON.stringify(state));renderStats();}
function ansOf(q){return state.answerOverride[q.id]||q.answer}
function uniq(a){return [...new Set(a)].sort()}
function optionKeys(q){return Object.keys(q.options||{}).filter(k=>q.options[k]!==undefined&&q.options[k]!==null&&q.options[k]!=="")}
function byId(id){return QUESTIONS.find(q=>q.id===id)}
function initControls(){let s=document.getElementById('source');s.innerHTML='<option value="all">全部题库</option>'+uniq(QUESTIONS.map(q=>q.source)).map(x=>`<option>${x}</option>`).join('');let t=document.getElementById('topic');t.innerHTML='<option value="all">全部专题</option>'+uniq(QUESTIONS.map(q=>q.topic)).map(x=>`<option>${x}</option>`).join('');document.getElementById('count').max=QUESTIONS.length;}
function getFiltered(){let src=document.getElementById('source').value,tp=document.getElementById('topic').value,kw=document.getElementById('kw').value.trim().toLowerCase();let arr=QUESTIONS.filter(q=>(src==='all'||q.source===src)&&(tp==='all'||q.topic===tp));if(kw)arr=arr.filter(q=>(q.id+q.source+q.topic+q.stem+Object.values(q.options||{}).join('')+q.explain).toLowerCase().includes(kw));if(document.getElementById('order').value==='wrong')arr=arr.filter(q=>state.wrong[q.id]);return arr;}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function buildExamPool(arr){let order=document.getElementById('order').value,want=Number(document.getElementById('count').value)||40;let tfs=arr.filter(q=>q.type==='tf'),singles=arr.filter(q=>q.type!=='tf');if(order==='shuffle'){tfs=shuffle(tfs);singles=shuffle(singles)}let tfN=want>=40?10:Math.min(tfs.length,Math.floor(want/4));let singleN=Math.min(singles.length,want-tfN);let picked=singles.slice(0,singleN).concat(tfs.slice(0,Math.min(tfN,tfs.length)));if(picked.length<want)picked=picked.concat(arr.filter(q=>!picked.includes(q)).slice(0,want-picked.length));return order==='shuffle'?shuffle(picked):picked;}
function applyFilter(){let arr=getFiltered();let n=Math.min(Number(document.getElementById('count').value)||arr.length,arr.length);pool=mode==='exam'?buildExamPool(arr):(document.getElementById('order').value==='shuffle'?shuffle(arr).slice(0,n):arr.slice(0,n));idx=0;answered=false;examAnswers={};renderMode();}
function setMode(m){mode=m;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));[...document.querySelectorAll('.tab')].find(b=>b.textContent.includes({learn:'学习',exam:'模拟',browse:'浏览',wrong:'错题',review:'复习'}[m])).classList.add('active');['learn','exam','browse','wrong','review'].forEach(id=>document.getElementById(id).classList.toggle('hidden',id!==m));if(m==='exam'){pool=buildExamPool(getFiltered());idx=0;answered=false;examAnswers={};}renderMode();}
function optNote(q,k){return k===ansOf(q)?'正确。'+q.explain:'错误。该选项没有命中本题考点。本题考点：'+q.explain;}
function optionHtml(q,k,selected,show){let cls='option';if(show){if(k===ansOf(q))cls+=' correct'; if(selected===k&&k!==ansOf(q))cls+=' wrong';}return `<div class="${cls}" onclick="choose('${q.id}','${k}')"><div class="key">${k}.</div><div class="txt">${escapeHtml(q.options[k])}${show?`<div class="optExplain ${k===ansOf(q)?'correctText':'wrongText'}">解析：${escapeHtml(optNote(q,k))}</div>`:''}</div></div>`}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function qCard(q,selected=null,show=false){return `<div class="qhead"><div><span class="badge">${q.id}</span><span class="badge badge2">${escapeHtml(q.source)}</span><span class="badge">${escapeHtml(q.topic)}</span></div><div class="small">校准答案：${ansOf(q)} / 原答案：${q.answer}</div></div><div class="stem">${escapeHtml(q.stem)}</div>${optionKeys(q).map(k=>optionHtml(q,k,selected,show)).join('')}${show?`<div class="explain"><b>答案：${ansOf(q)}</b><br>${escapeHtml(q.explain)}<br><span class="small">Alt + 点击某个选项可把该题答案临时校准为该选项，按老师口径修正时用。</span></div>`:''}`}
function choose(id,k){let q=byId(id); if(event&&event.altKey){state.answerOverride[id]=k;save();renderMode();return} if(mode==='learn'){answered=true;let ok=k===ansOf(q);state.done[id]=true;if(!ok)state.wrong[id]=k;else delete state.wrong[id];save();document.getElementById('learn').innerHTML=learnHtml(k,true);}}
function learnHtml(selected=null,show=false){if(!pool.length)return '<p>没有匹配题目。调整筛选条件后点“应用筛选”。</p>';let q=pool[idx];return qCard(q,selected,show)+`<div class="row"><button class="secondary" onclick="idx=Math.max(0,idx-1);answered=false;renderLearn()">上一题</button><button onclick="idx=Math.min(pool.length-1,idx+1);answered=false;renderLearn()">下一题</button><button class="ghost" onclick="answered=true;document.getElementById('learn').innerHTML=learnHtml(null,true)">显示答案</button><button class="ghost" onclick="idx=Math.floor(Math.random()*pool.length);answered=false;renderLearn()">随机一题</button><span class="small">进度：${idx+1} / ${pool.length}</span></div>`}
function renderLearn(){document.getElementById('learn').innerHTML=learnHtml(null,false)}
function renderExam(){if(!pool.length)applyFilter();let html=`<h2>模拟考试</h2><p class="muted">当前试卷 ${pool.length} 题。选择后不会立即显示答案，交卷后显示得分、错题和解析。</p>`;pool.forEach((q,i)=>{html+=`<div class="listItem"><b>${i+1}. ${escapeHtml(q.stem)}</b>`;optionKeys(q).forEach(k=>{html+=`<label class="option"><input style="width:auto" type="radio" name="${q.id}" value="${k}" onchange="examAnswers['${q.id}']='${k}'"> <b>${k}.</b> ${escapeHtml(q.options[k])}</label>`});html+='</div>'});html+=`<button class="ok" onclick="submitExam()">交卷</button><div id="examResult"></div>`;document.getElementById('exam').innerHTML=html;}
function submitExam(){let correct=0, wrong=[];pool.forEach(q=>{let a=examAnswers[q.id];if(a===ansOf(q)){correct++;state.done[q.id]=true;delete state.wrong[q.id];}else{wrong.push([q,a||'未答']);state.wrong[q.id]=a||'未答';}});save();let html=`<div class="explain"><h2>成绩：${correct} / ${pool.length}，正确率 ${pool.length?Math.round(correct*100/pool.length):0}%</h2></div>`;if(wrong.length)html+='<h3>错题解析</h3>'+wrong.map(([q,a])=>`<div class="listItem"><p><b>${q.id}</b> 你的答案：<span class="wrongText">${a}</span>，正确答案：<span class="correctText">${ansOf(q)}</span></p>${qCard(q,a,true)}</div>`).join('');else html+='<p class="correctText">本次无错题。</p>';document.getElementById('examResult').innerHTML=html;}
function renderBrowse(){let arr=getFiltered();document.getElementById('browse').innerHTML=`<h2>题库浏览</h2><p class="muted">共 ${arr.length} 题。点击“显示解析”查看。</p>`+arr.map(q=>`<details class="listItem"><summary><b>${q.id}</b> [${escapeHtml(q.topic)}] ${escapeHtml(q.stem)}</summary>${qCard(q,null,true)}</details>`).join('')}
function renderWrong(){let arr=Object.keys(state.wrong).map(byId).filter(Boolean);document.getElementById('wrong').innerHTML=`<h2>错题本</h2><p class="muted">当前 ${arr.length} 题。</p>`+(arr.length?arr.map(q=>`<div class="listItem">${qCard(q,state.wrong[q.id],true)}<button class="ok" onclick="delete state.wrong['${q.id}'];save();renderWrong()">标记已掌握</button></div>`).join(''):'<p>暂无错题。</p>')}
function renderReview(){document.getElementById('review').innerHTML=`<h2>复习要点</h2>
<div class="explain"><h3>考试结构</h3><p><b>单选题 30 道：</b>从三次测试中的 150 道单选中抽取。</p><p><b>判断题 10 道：</b>从三次测试中的 150 道单选中抽取 10 道改写。</p><p><b>简答题 4 或 5 道：</b>以老师在书中划出的题目为主。</p><p><b>论述/问题 2 道：</b>来自课堂交流过的论述问题。</p><p><b>编程题 1 道：</b>从前四次实验中抽选，重点是能写出核心流程和解释。</p></div>
<div class="listItem"><b>实验1：密码学基础实验 - Caesar 加密</b><p>目标：掌握 Caesar 加密基本思想，能用 Python 实现加密/解密，理解暴力破解。</p><p>重点：移位代换、密钥空间小、穷举攻击、命令行参数 <code>-e/-d/-b/-k/-i/-o</code> 的处理。</p></div>
<div class="listItem"><b>实验2：单表、多表、乘积加密</b><p>目标：理解 Playfair、Vigenere、ADFGX 的原理，能用 Python/Java 实现在线加解密工具。</p><p>重点：Playfair 双字母处理、Vigenere 周期密钥、ADFGX 的替换与置换组合，以及 Web 页面输入明文/密文/密钥并显示结果。</p></div>
<div class="listItem"><b>实验3：基于 RC4 的流加密</b><p>目标：理解 RC4 的 KSA/PRGA 思路，能完成对数据文件的流加密和解密。</p><p>重点：密钥调度、伪随机密钥流、明文与密钥流异或、同一密钥流重复使用的风险。</p></div>
<div class="listItem"><b>实验4：分组加密实验</b><p>目标：掌握 ECB 与 CBC 两种分组加密模式，并能写出文件加解密工具。</p><p>重点：ECB 泄露明文模式；CBC 使用 IV 和链式异或；加密/解密核心代码、流程图和结果截图说明。</p></div>
<div class="listItem"><b>1-3章：</b>CIA安全目标；主动/被动攻击；散列函数性质；SPN的S盒/P盒、混淆与扩散；单表/多表替换；流加密；对称/公钥体制；混合加密/PGP；数字签名生成与验证。</div><div class="listItem"><b>4-6章：</b>Kerberos票据机制；PKI/CA/RA/证书链；证书验证流程；ACL与CL；EAP；802.1X；TLS与SSH。</div><div class="listItem"><b>剩余章节：</b>WEP/WPA/WAPI；S/MIME与PGP；IPSec传输/隧道模式；包过滤/状态检测防火墙；DMZ与防火墙模型；IDS/IPS；蜜罐/蜜网；恶意软件分类。</div><div class="explain">建议训练顺序：先刷单选，再刷判断；实验题按“原理、核心代码/流程、运行结果、风险或优缺点”四段准备。若老师PPT答案与通用口径不同，用 Alt+点击选项做本地答案校准。</div>`}
function renderStats(){let total=QUESTIONS.length, done=Object.keys(state.done).length, wrong=Object.keys(state.wrong).length;let srcs=uniq(QUESTIONS.map(q=>q.source)).length, topics=uniq(QUESTIONS.map(q=>q.topic)).length;document.getElementById('stats').innerHTML=`<div class="stat"><div class="muted">总题数</div><b>${total}</b></div><div class="stat"><div class="muted">已练</div><b>${done}</b></div><div class="stat"><div class="muted">错题</div><b>${wrong}</b></div><div class="stat"><div class="muted">题库/专题</div><b>${srcs}/${topics}</b></div>`}
window.studyHubPracticeStats=()=>{let total=QUESTIONS.length, done=Object.keys(state.done||{}).length, wrong=Object.keys(state.wrong||{}).length;let srcs=uniq(QUESTIONS.map(q=>q.source)).length, topics=uniq(QUESTIONS.map(q=>q.topic)).length;return {total,done,wrong,extraLabel:'题库/专题',extraValue:`${srcs}/${topics}`};};
function practiceQuestionType(q){return q.type==='tf'?'judge':'choice'}
window.studyHubPracticeNav=()=>mode==='learn'&&pool.length?{mode:'study',title:'答题卡',current:idx+1,items:pool.map((q,i)=>({id:q.id,index:i+1,label:String(i+1),type:practiceQuestionType(q),done:Boolean(state.done[q.id]),wrong:Boolean(state.wrong[q.id])})),jump(index){idx=Math.max(0,Math.min(index-1,pool.length-1));answered=false;renderLearn();window.scrollTo(0,0);}}:null;
function renderMode(){if(mode==='learn')renderLearn();if(mode==='exam')renderExam();if(mode==='browse')renderBrowse();if(mode==='wrong')renderWrong();if(mode==='review')renderReview();}
studyHubLoadQuestions("data/network-security.json", "网络安全").then(data => { QUESTIONS = data; initControls(); applyFilter(); renderStats(); });
</script></body></html>
