.row{display:flex;gap:10px;flex-wrap:wrap}.row button{width:auto}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}.stat b{font-size:22px}.muted{color:#64748b}.listItem{border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin:10px 0;background:#fff}.hidden{display:none!important}.small{font-size:13px;color:#64748b}mark{background:#fef08a}

const QUESTIONS=[{"id":"Q001","source":"原卷1-密码学与信息安全基础","topic":"密码学基础","stem":"从密码学概念来看，区分对称密码体制和非对称密码体制的最根本依据是？","options":{"A":"加密算法的复杂程度","B":"密钥长度的大小","C":"加密和解密操作使用的密钥是否相同","D":"加密速度的快慢"},"answer":"C","explain":"对称密码加解密通常使用同一密钥；非对称密码使用公钥和私钥。"},{"id":"Q002","source":"原卷1-密码学与信息安全基础","topic":"密码学基础","stem":"密码学的安全性主要依赖于？","options":{"A":"加密和解密算法的保密","B":"密钥的保密，而算法可以公开","C":"明文的长度和复杂性","D":"密文的不可读性"},"answer":"B","explain":"现代密码遵循 Kerckhoffs 原则：算法可公开，安全性主要依赖密钥保密。"},{"id":"Q003","source":"原卷1-密码学与信息安全基础","topic":"密码学发展","stem":"密码学在哪个阶段被明确地描述为从“艺术”转变为“科学”？","options":{"A":"第一阶段（古代到1949年）","B":"第二阶段（1949年到1975年）","C":"第三阶段（1976年以后）","D":"第四阶段（1990年以后）"},"answer":"B","explain":"1949年香农理论奠定现代密码学基础，密码学由经验艺术转向科学。"},{"id":"Q004","source":"原卷1-密码学与信息安全基础","topic":"密码学发展","stem":"古典密码与现代密码的一个核心区别在于？","options":{"A":"古典密码使用数字，现代密码使用字母","B":"古典密码没有坚实的数学理论基础，而现代密码建立在严格的数学和计算复杂性之上","C":"古典密码用于军事，现代密码用于商业","D":"古典密码的加密速度比现代密码快"},"answer":"B","explain":"现代密码以数学结构、信息论和计算复杂性为基础。"},{"id":"Q005","source":"原卷1-密码学与信息安全基础","topic":"古典密码","stem":"下列哪一项特性最能体现“代替”与“置换”这两种古典加密思想在本质上的区别？","options":{"A":"加密过程是否需要密钥","B":"加密后密文的长度是否发生变化","C":"加密操作的作用对象是信息单元的“身份”还是“位置”","D":"抗密码分析攻击的强度"},"answer":"C","explain":"代替改变符号身份，置换改变符号位置。"},{"id":"Q006","source":"原卷1-密码学与信息安全基础","topic":"对称密码","stem":"对称密钥体制最核心的特征是什么？","options":{"A":"加密和解密使用两个不同的密钥","B":"加密密钥可以公开","C":"加密和解密使用相同的密钥","D":"加密速度通常很慢"},"answer":"C","explain":"对称密码的核心是通信双方共享同一秘密密钥。"},{"id":"Q007","source":"原卷1-密码学与信息安全基础","topic":"对称密码","stem":"对称密钥体制面临的主要挑战是什么？","options":{"A":"加密强度通常较弱","B":"算法设计过于复杂","C":"密钥的管理和分发问题","D":"无法保护数据的机密性"},"answer":"C","explain":"对称密码本身可很强，但密钥安全分发和管理困难。"},{"id":"Q008","source":"原卷1-密码学与信息安全基础","topic":"古典密码","stem":"从密码学的角度来看，凯撒密码最主要的弱点是什么？","options":{"A":"它的密钥空间过大，难以管理。","B":"它的加密和解密过程计算复杂度太高。","C":"它的密钥空间非常小，只有25种有效密钥，极易通过穷举攻击破解。","D":"它需要通信双方预先交换一个长长的随机密钥。"},"answer":"C","explain":"凯撒密码有效移位数量很少，穷举成本极低。"},{"id":"Q009","source":"原卷1-密码学与信息安全基础","topic":"密码系统设计","stem":"在一个人员流动较大的组织中，使用受限算法会带来什么问题？","options":{"A":"加密速度会变慢","B":"离职人员可能泄露算法细节，导致整个系统需要重新设计","C":"算法会自动失效","D":"需要更长的密钥"},"answer":"B","explain":"受限算法依赖算法保密，一旦算法泄露就要重构系统。"},{"id":"Q010","source":"原卷1-密码学与信息安全基础","topic":"一次一密","stem":"一次一密在实际应用中最大的局限性或缺点是什么？","options":{"A":"加密和解密的速度非常缓慢，无法用于现代通信。","B":"它的加密算法非常脆弱，容易被发现漏洞。","C":"密钥的分发、保存和同步问题极其困难。","D":"它只能加密文本信息，无法加密数字文件。"},"answer":"C","explain":"一次一密要求真随机、等长、一次性密钥，密钥管理极其困难。"},{"id":"Q011","source":"原卷1-密码学与信息安全基础","topic":"乘积密码","stem":"乘积密码的基本设计思想是什么？","options":{"A":"使用极大的密钥空间来抵抗暴力破解","B":"将两种或两种以上的基本密码操作（如替换和置换）组合在一起","C":"通过增加加密轮数来线性地提高安全性","D":"将多个不同的明文混合在一起进行加密"},"answer":"B","explain":"乘积密码组合替换、置换等基本操作并多轮迭代。"},{"id":"Q012","source":"原卷1-密码学与信息安全基础","topic":"乘积密码","stem":"乘积密码的设计哲学与以下哪项比喻最为贴切？","options":{"A":"制造一把结构极其复杂、无法复制的锁芯","B":"建造一堵由多种不同材料层层交替构成的坚固墙壁","C":"设计一个只有一个极其隐蔽入口的迷宫","D":"创造一种只有特定接收器才能解码的复杂信号"},"answer":"B","explain":"乘积密码强调多层、多种操作交替组合形成整体强度。"},{"id":"Q013","source":"原卷1-密码学与信息安全基础","topic":"乘积密码","stem":"为什么说乘积密码思想为现代密码设计提供了“蓝图”？","options":{"A":"因为它详细规定了S盒和P盒的具体实现标准。","B":"因为它解决了密钥分发的世界性难题。","C":"因为它确立了通过迭代和组合简单操作来构建复杂密码系统的设计范式。","D":"因为它首次将密码学的安全性基于计算复杂性理论。"},"answer":"C","explain":"现代分组密码普遍采用多轮迭代和组合简单操作的结构。"},{"id":"Q014","source":"原卷1-密码学与信息安全基础","topic":"香农理论","stem":"根据香农的理论，乘积密码结构是实现哪两个核心密码学原则的有效方法？","options":{"A":"完整性和可用性","B":"认证和不可否认性","C":"混淆和扩散","D":"压缩和编码"},"answer":"C","explain":"香农提出混淆与扩散是构造强密码的重要原则。"},{"id":"Q015","source":"原卷1-密码学与信息安全基础","topic":"DES/3DES","stem":"在三重DES中，使用两个独立密钥（K1, K2）的密钥选项是？","options":{"A":"密钥选项 1：K1 = K2 = K3","B":"密钥选项 2：K1 ≠ K2, K3 = K1","C":"密钥选项 3：K1, K2, K3 互不相同","D":"密钥选项 4：K1 = K3, K2 不同"},"answer":"B","explain":"两密钥3DES通常为 K1、K2、K1，即 K1≠K2 且 K3=K1。"},{"id":"Q016","source":"原卷1-密码学与信息安全基础","topic":"密码分析","stem":"字母频率分析法对下面哪种密码算法最有效","options":{"A":"置换密码","B":"单表代换密码","C":"多表代换密码","D":"序列密码"},"answer":"B","explain":"单表代换保持自然语言字母频率对应关系。"},{"id":"Q017","source":"原卷1-密码学与信息安全基础","topic":"公钥密码","stem":"关于公钥和私钥在加密与签名中的作用，下列哪项总结是正确的？","options":{"A":"公钥既可用于加密，也可用于签名，视情况而定。","B":"私钥用于解密和验证签名，公钥用于加密和创建签名。","C":"公钥用于加密和验证签名，私钥用于解密和创建签名。","D":"私钥用于加密和创建签名，公钥用于解密和验证签名。"},"answer":"C","explain":"保密通信中公钥加密私钥解密；签名中私钥签名公钥验签。"},{"id":"Q018","source":"原卷1-密码学与信息安全基础","topic":"消息认证","stem":"消息认证所包含的两个重要方面是？","options":{"A":"加密与解密","B":"验证内容完整性与验证来源真实性","C":"访问控制与身份识别","D":"防止窃听与防止重放"},"answer":"B","explain":"消息认证关注完整性和来源真实性。"},{"id":"Q019","source":"原卷1-密码学与信息安全基础","topic":"消息认证","stem":"消息认证主要用于防止哪种类型的攻击？","options":{"A":"被动攻击","B":"主动攻击","C":"病毒攻击","D":"拒绝服务攻击"},"answer":"B","explain":"认证主要防止伪造、篡改、重放等主动攻击。"},{"id":"Q020","source":"原卷1-密码学与信息安全基础","topic":"消息认证","stem":"关于加密和消息认证的关系，以下哪种描述是最准确的？","options":{"A":"它们是相互排斥的，一个系统只能选择其一","B":"它们是等同的，实现加密就自然实现了认证","C":"它们是正交的，解决不同的安全问题，常结合使用","D":"它们是继承关系，认证是加密的一个子集"},"answer":"C","explain":"加密解决机密性，认证解决完整性和来源真实性。"},{"id":"Q021","source":"原卷1-密码学与信息安全基础","topic":"HMAC","stem":"HMAC（基于哈希的消息认证码）相比于普通哈希函数，其核心优势在于？","options":{"A":"计算速度更快","B":"能够抵抗长度扩展攻击等特定密码学攻击","C":"生成的摘要（Digest）更短","D":"不需要使用密钥"},"answer":"B","explain":"HMAC是带密钥认证结构，可抵抗普通哈希直接拼接带来的长度扩展等攻击。"},{"id":"Q022","source":"原卷1-密码学与信息安全基础","topic":"MAC","stem":"消息认证技术（如MAC）本身能否保证消息的机密性？","options":{"A":"能，因为认证过程混淆了消息内容","B":"能，因为认证码需要密钥生成，相当于加密","C":"不能，因为消息是以明文形式参与MAC计算的","D":"不能，因为认证码太短，无法隐藏消息"},"answer":"C","explain":"MAC产生认证标签，不隐藏消息内容。"},{"id":"Q023","source":"原卷1-密码学与信息安全基础","topic":"数字签名","stem":"生成数字签名时，对消息进行处理的常用方法是？","options":{"A":"使用接收者的公钥对整条消息加密","B":"使用发送者的私钥对整条消息加密，或对消息摘要（一种函数值）加密","C":"使用发送者的公钥对整条消息加密","D":"使用接收者的私钥对消息摘要加密"},"answer":"B","explain":"数字签名通常是发送者用私钥对消息摘要签名。"},{"id":"Q024","source":"原卷1-密码学与信息安全基础","topic":"数字签名","stem":"生成数字签名的典型过程是：","options":{"A":"用接收者的公钥加密消息","B":"用发送者的私钥加密消息的哈希值","C":"用接收者的私钥加密消息","D":"用发送者的公钥加密消息的哈希值"},"answer":"B","explain":"典型流程是消息求哈希，再用发送者私钥签名。"},{"id":"Q025","source":"原卷1-密码学与信息安全基础","topic":"数字签名","stem":"Alice希望向Bob发送一条消息，并让Bob确信这条消息确实来自她本人且未被篡改。她应该使用：","options":{"A":"Bob的公钥对消息进行加密","B":"Bob的私钥对消息进行加密","C":"Alice的公钥对消息进行加密","D":"Alice的私钥对消息生成数字签名"},"answer":"D","explain":"来源证明和完整性应使用Alice私钥生成数字签名。"},{"id":"Q026","source":"原卷1-密码学与信息安全基础","topic":"RSA","stem":"RSA算法的安全性主要基于以下哪个数学难题？","options":{"A":"离散对数问题","B":"大整数质因数分解问题","C":"椭圆曲线离散对数问题","D":"背包问题"},"answer":"B","explain":"RSA安全性依赖大整数质因数分解困难。"},{"id":"Q027","source":"原卷1-密码学与信息安全基础","topic":"对称密码局限","stem":"在一个四人共享同一对称密钥的群里，A收到一条用该密钥加密的消息。A成功解密后，能否认定该消息一定来源于B？","options":{"A":"能，因为加密密钥是保密的，只有B知道。","B":"不能，因为C或D同样拥有密钥，可以加密消息并冒充B。","C":"能，因为解密成功就验证了来源。","D":"不能，因为对称加密算法不能保证完整性。"},"answer":"B","explain":"多人共享同一密钥时任何持钥者都能生成合法密文。"},{"id":"Q028","source":"原卷1-密码学与信息安全基础","topic":"散列函数","stem":"Hash函数的“抗碰撞性”是指（）","options":{"A":"两个相同的输入不会产生碰撞。","B":"要找到两个不同的输入x和y，使得H(x) = H(y)，在计算上是不可行的。","C":"哈希值不会与输入值相同。","D":"哈希算法内部不会发生数据冲突。"},"answer":"B","explain":"抗碰撞性是难以找到任意两个不同输入产生同一哈希值。"},{"id":"Q029","source":"原卷1-密码学与信息安全基础","topic":"混合加密","stem":"用户Alice想给Bob发送一条既要保密又要能证明是自已发送的消息。她应该怎么做？","options":{"A":"用Bob的公钥加密消息，并附上用自己私钥签名的消息哈希值。","B":"用自己和Bob的共享对称密钥加密消息。","C":"用自已的私钥加密消息。","D":"用Bob的公钥加密消息，并附上用自己的公钥加密的消息哈希值。"},"answer":"A","explain":"保密用Bob公钥；来源和完整性用Alice私钥签名摘要。"},{"id":"Q030","source":"原卷1-密码学与信息安全基础","topic":"安全标准","stem":"TCSEC标准的另一个广为人知的名称是什么？","options":{"A":"通用准则 (Common Criteria)","B":"橙皮书 (Orange Book)","C":"红皮书 (Red Book)","D":"绿皮书 (Green Book)"},"answer":"B","explain":"TCSEC俗称橙皮书。"},{"id":"Q031","source":"原卷1-密码学与信息安全基础","topic":"攻击分类","stem":"下列哪一项是主动攻击最典型的特征？","options":{"A":"仅监听网络流量，不干扰通信","B":"旨在发现系统开放端口和服务","C":"试图改变系统资源或影响其操作","D":"收集信息以备后续攻击使用"},"answer":"C","explain":"主动攻击会修改、伪造、破坏或影响系统运行。"},{"id":"Q032","source":"原卷1-密码学与信息安全基础","topic":"攻击分类","stem":"以下哪种攻击类型属于典型的主动攻击？","options":{"A":"流量分析","B":"窃听","C":"重放攻击","D":"社会工程学（仅获取信息阶段）"},"answer":"C","explain":"重放会重新发送截获数据以影响系统操作。"},{"id":"Q033","source":"原卷1-密码学与信息安全基础","topic":"攻击分类","stem":"以下哪种情况属于典型的被动攻击？","options":{"A":"向网站服务器发送大量垃圾请求使其瘫痪","B":"使用软件捕获网络中传输的数据包","C":"伪造电子邮件地址发送钓鱼邮件","D":"修改数据库中的用户金额"},"answer":"B","explain":"抓包窃听通常不改变通信，属于被动攻击。"},{"id":"Q034","source":"原卷1-密码学与信息安全基础","topic":"安全威胁","stem":"一名员工利用其工作账号，查看并下载了公司财务数据库中本无权访问的员工薪酬记录。这种行为属于哪种威胁？","options":{"A":"假冒","B":"授权侵犯","C":"物理侵入","D":"业务欺骗"},"answer":"B","explain":"合法账号访问未授权资源属于授权侵犯/越权访问。"},{"id":"Q035","source":"原卷1-密码学与信息安全基础","topic":"安全威胁","stem":"以下哪两种威胁的结合，最可能导致“抵赖”这一威胁的发生？","options":{"A":"人员不慎 和 媒体废弃","B":"窃听 和 业务流分析","C":"陷阱门 和 计算机病毒","D":"假冒 和 破坏信息的完整性"},"answer":"D","explain":"假冒和完整性破坏会使事后难以确认真实主体与内容。"},{"id":"Q036","source":"原卷1-密码学与信息安全基础","topic":"机密性","stem":"公司需要确保存储在云服务器上的敏感文件即使被非法获取，其内容也无法被读取。实现这一目标最应优先采用的技术是？","options":{"A":"防火墙","B":"数据加密","C":"入侵检测系统","D":"访问控制列表"},"answer":"B","explain":"数据被非法获取后仍不可读，依赖加密。"},{"id":"Q037","source":"原卷1-密码学与信息安全基础","topic":"密码学基础","stem":"将明文转换为密文的数学过程或函数被称为？","options":{"A":"解密算法","B":"加密算法","C":"密钥","D":"密码方案"},"answer":"B","explain":"加密算法在密钥控制下把明文转换为密文。"},{"id":"Q038","source":"原卷1-密码学与信息安全基础","topic":"密码分析","stem":"穷举攻击法（又称暴力破解法）的基本原理是什么？","options":{"A":"利用加密算法的数学弱点进行破解","B":"尝试所有可能的密钥直到找到正确的那个","C":"分析密文的统计规律来推测明文","D":"通过社会工程学手段获取密钥"},"answer":"B","explain":"穷举攻击就是遍历可能密钥。"},{"id":"Q039","source":"原卷1-密码学与信息安全基础","topic":"安全层次","stem":"以下关于密码学安全层次的描述，错误的是：","options":{"A":"一次一密是无条件安全的典型代表","B":"计算上安全是大多数现代密码算法实际达到的安全标准","C":"可证明安全意味着算法在理论上可以被证明是绝对安全的","D":"无条件安全不依赖于攻击者的计算能力或资源限制"},"answer":"C","explain":"可证明安全通常相对于模型或数学假设，不等于绝对安全。"},{"id":"Q040","source":"原卷1-密码学与信息安全基础","topic":"安全层次","stem":"如果一个加密方案满足“破译的成本超过加密信息的价值，且破译的时间超过该信息有用的生命周期”，那么该方案属于：","options":{"A":"无条件安全","B":"计算上安全","C":"可证明安全","D":"绝对安全"},"answer":"B","explain":"这是计算上安全的典型描述。"},{"id":"Q041","source":"原卷2-认证、PKI、访问控制与TLS","topic":"标识与鉴别","stem":"信息安全中的“标识技术”(Identification) 其主要目的是什么？","options":{"A":"验证用户所声称的身份是否真实","B":"授予用户访问系统资源的权限","C":"确保实体在系统中的惟一性和可辨认性","D":"对用户的敏感数据进行加密保护"},"answer":"C","explain":"标识解决“你是谁”的唯一命名问题。"},{"id":"Q042","source":"原卷2-认证、PKI、访问控制与TLS","topic":"标识与鉴别","stem":"信息安全中的“鉴别技术”(Authentication) 其核心目标是什么？","options":{"A":"为用户分配一个唯一的系统标识符","B":"验证实体所声称身份的真实性","C":"决定用户拥有何种访问资源的权限","D":"记录用户的所有操作日志以备审计"},"answer":"B","explain":"鉴别验证身份声明是否真实。"},{"id":"Q043","source":"原卷2-认证、PKI、访问控制与TLS","topic":"认证机制","stem":"与直接认证相比，第三方认证的主要优点是什么？","options":{"A":"完全避免了所有安全风险","B":"大大简化了大规模网络中的密钥和信任管理","C":"认证速度总是最快","D":"无需任何预先的信任关系设置"},"answer":"B","explain":"可信第三方可降低多对多信任和密钥管理复杂度。"},{"id":"Q044","source":"原卷2-认证、PKI、访问控制与TLS","topic":"Kerberos","stem":"Kerberos协议通过引入一个“可信第三方”来集中管理认证，这主要是为了应对以下哪种管理上的挑战？","options":{"A":"降低网络带宽消耗。","B":"实现单点登录（SSO），减轻用户和管理员负担。","C":"提高加密和解密算法的计算速度。","D":"强制所有用户使用相同强度的密码。"},"answer":"B","explain":"Kerberos通过票据实现单点登录。"},{"id":"Q045","source":"原卷2-认证、PKI、访问控制与TLS","topic":"Kerberos","stem":"哲学上，Kerberos的设计遵循“最少披露原则”和“限定信任原则”。以下哪一点最能体现“限定信任原则”？","options":{"A":"用户密码从不通过网络传输。","B":"服务票据是针对特定服务的，不能用于访问其他服务。","C":"票据具有很短的有效期以防止重放攻击。","D":"认证器是一次性的。"},"answer":"B","explain":"服务票据被限定到特定服务，体现限定信任。"},{"id":"Q046","source":"原卷2-认证、PKI、访问控制与TLS","topic":"Kerberos","stem":"Kerberos协议的核心安全建立在“可信第三方”的概念上。在这个模型中，谁扮演了这个所有参与方都绝对信任的第三方角色？","options":{"A":"域控制器（Domain Controller）","B":"证书颁发机构（Certificate Authority）","C":"密钥分发中心（Key Distribution Center, KDC）","D":"票据授予服务（Ticket-Granting Service, TGS）"},"answer":"C","explain":"Kerberos中的可信第三方是KDC。"},{"id":"Q047","source":"原卷2-认证、PKI、访问控制与TLS","topic":"智能卡","stem":"智能卡（Smart Card）与普通存储IC卡（如预付费电话卡）最核心的区别是什么？","options":{"A":"智能卡的制造成本一定更低","B":"智能卡具有微处理器（CPU）和操作系统，能进行数据处理和计算","C":"普通存储IC卡的数据存储容量一定更大","D":"只有智能卡需要与读卡器接触才能工作"},"answer":"B","explain":"智能卡可在卡内进行计算和安全处理。"},{"id":"Q048","source":"原卷2-认证、PKI、访问控制与TLS","topic":"PKI","stem":"在整个数字证书信任体系中，根证书最核心的角色是什么？","options":{"A":"为所有网站提供最高强度的加密连接。","B":"作为信任的起点和锚点，是所有信任链验证的最终源头。","C":"直接加密用户浏览器与web服务器之间的通信数据。","D":"存储所有已签发服务器的私钥信息。"},"answer":"B","explain":"根证书是证书链验证的信任锚。"},{"id":"Q049","source":"原卷2-认证、PKI、访问控制与TLS","topic":"PKI","stem":"在数字世界中，通信双方素未谋面，却需要安全地传输机密信息。PKI基础设施最核心的作用是解决了以下哪个根本性问题？","options":{"A":"提高网络传输速度","B":"确保数据在传输过程中不可被篡改","C":"在非安全信道中建立信任关系并实现安全通信","D":"降低通信成本"},"answer":"C","explain":"PKI通过证书绑定身份和公钥，解决陌生实体信任建立。"},{"id":"Q050","source":"原卷2-认证、PKI、访问控制与TLS","topic":"PKI","stem":"在整个证书验证链条中，最终极的信任锚点（Trust Anchor）是什么？","options":{"A":"网站服务器本身的安全配置。","B":"操作系统中或浏览器内预置的受信任根证书颁发机构（Root CA）的证书。","C":"互联网服务提供商（ISP）的网络认证。","D":"网站服务器的IP地址是否在官方公布的范围内。"},"answer":"B","explain":"客户端信任库中的根CA证书是最终信任锚。"},{"id":"Q051","source":"原卷2-认证、PKI、访问控制与TLS","topic":"PKI","stem":"小李向公司的PKI系统申请数字证书，他需要提交个人身份证明给一个前台受理点进行审核。这个前台受理点在PKI中最标准的角色是？","options":{"A":"证书颁发机构 (CA)","B":"注册机构 (RA)","C":"目录服务 (Repository)","D":"最终用户 (End User)"},"answer":"B","explain":"RA负责注册受理和身份审核。"},{"id":"Q052","source":"原卷2-认证、PKI、访问控制与TLS","topic":"认证机制","stem":"与双向认证相比，单向认证的主要优点是什么？","options":{"A":"提供了更高的安全性","B":"简化了客户端的部署和管理","C":"加密强度更高","D":"完全避免了中间人攻击"},"answer":"B","explain":"单向认证只验证一方，部署更简单。"},{"id":"Q053","source":"原卷2-认证、PKI、访问控制与TLS","topic":"认证机制","stem":"用户登录一个使用“微信/支付宝快捷登录”的网站，该网站信任微信/支付宝提供的用户身份信息。这个过程体现了哪种认证思想？","options":{"A":"双向认证","B":"第三方认证","C":"匿名认证","D":"单向认证"},"answer":"B","explain":"网站信任微信/支付宝作为第三方身份提供方。"},{"id":"Q054","source":"原卷2-认证、PKI、访问控制与TLS","topic":"标识与鉴别","stem":"小明在登录网上银行时，首先输入了他的银行卡号，这一步骤属于认证过程中的哪个环节？","options":{"A":"鉴别","B":"授权","C":"标识","D":"审计"},"answer":"C","explain":"银行卡号是在声明身份，属于标识。"},{"id":"Q055","source":"原卷2-认证、PKI、访问控制与TLS","topic":"标识与鉴别","stem":"关于“标识”(Identification)和“鉴别”(Authentication)的关系，以下说法最准确的是？","options":{"A":"先有鉴别，后有标识。","B":"标识和鉴别是同一个概念，可以互换使用。","C":"先有标识，后有鉴别。","D":"标识的作用是验证身份的真实性"},"answer":"C","explain":"先声明身份，再验证身份。"},{"id":"Q056","source":"原卷2-认证、PKI、访问控制与TLS","topic":"标识与鉴别","stem":"在一个标准的登录流程中，“输入密码”这一步骤属于以下哪个过程？","options":{"A":"标识(Identification)","B":"鉴别(Authentication)","C":"授权(Authorization)","D":"审计(Auditing)"},"answer":"B","explain":"密码用于证明身份真实性。"},{"id":"Q057","source":"原卷2-认证、PKI、访问控制与TLS","topic":"数字证书","stem":"数字证书之所以能被信任，是因为？","options":{"A":"它使用了非常复杂的加密算法，无人能破解。","B":"它是由操作系统厂商（如Microsoft）预先安装的。","C":"它由证书颁发机构（CA）进行数字签名，而CA是受通信双方信任的第三方。","D":"它存储在网络中最安全的服务器上。"},"answer":"C","explain":"证书可信来自CA签名以及对CA的信任。"},{"id":"Q058","source":"原卷2-认证、PKI、访问控制与TLS","topic":"数字证书","stem":"数字证书最核心的作用是什么？","options":{"A":"加快互联网数据传输速度","B":"对数据进行高强度加密，使其无法被破解","C":"将公钥与持有者的身份信息进行权威绑定","D":"自动清除计算机中的病毒和恶意软件"},"answer":"C","explain":"证书的核心作用是身份和公钥的权威绑定。"},{"id":"Q059","source":"原卷2-认证、PKI、访问控制与TLS","topic":"PKI","stem":"公钥基础设施（PKI）所提供的一系列安全服务中，最核心的服务是下列哪一项？","options":{"A":"防火墙隔离","B":"信任建立与服务","C":"网络加速","D":"漏洞扫描"},"answer":"B","explain":"PKI核心是建立和管理公钥信任体系。"},{"id":"Q060","source":"原卷2-认证、PKI、访问控制与TLS","topic":"PKI","stem":"关于CA和RA的关系，以下哪种描述最准确？","options":{"A":"CA和RA是平级机构，可以互相签发证书。","B":"RA是CA的逻辑功能延伸和代理，代表CA与用户进行交互。","C":"RA负责最终决定是否签发证书，CA只负责执行签名操作。","D":"一个RA只能为一个CA服务，一个CA也只能有一个RA。"},"answer":"B","explain":"RA通常作为CA的注册审核代理。"},{"id":"Q061","source":"原卷2-认证、PKI、访问控制与TLS","topic":"PKI","stem":"员工小王到IT服务窗口现场办理数字证书申请，工作人员当面核验了他的工牌和身份证，并将材料扫描上传。这个IT服务窗口扮演的角色是？","options":{"A":"证书颁发机构 (CA)","B":"注册机构 (RA)","C":"地方注册机构 (LRA) 的功能","D":"密钥管理中心 (KMC)"},"answer":"C","explain":"现场核验点更像LRA；若课程不区分LRA，也可按RA理解。"},{"id":"Q062","source":"原卷2-认证、PKI、访问控制与TLS","topic":"证书链","stem":"在PKI信任链中，最终实体证书所处的位置是？","options":{"A":"信任链的顶端（Root）","B":"信任链的中间（Intermediate）","C":"信任链的末端（Leaf）","D":"独立于信任链之外"},"answer":"C","explain":"最终实体证书位于证书链末端，也称叶子证书。"},{"id":"Q063","source":"原卷2-认证、PKI、访问控制与TLS","topic":"证书链","stem":"关于最终实体证书和CA证书的区别，以下描述正确的是？","options":{"A":"最终实体证书的密钥长度必须比CA证书更长。","B":"最终实体证书也可以用于签署其他证书，只要其主题名称不同。","C":"最终实体证书的“密钥用法”（Key Usage）通常不包括keyCertSign。","D":"最终实体证书不需要被签名，因为是最终端。"},"answer":"C","explain":"最终实体证书通常不具备keyCertSign用途。"},{"id":"Q064","source":"原卷2-认证、PKI、访问控制与TLS","topic":"访问控制","stem":"下列哪种场景最适合使用能力表（CL）机制？","options":{"A":"需要频繁审计某一文件被哪些用户访问过的系统","B":"需要快速判断某一用户对某资源是否有权限的系统","C":"需要集中管理所有客体访问权限的系统","D":"需要频繁撤销某一客体对所有主体权限的系统"},"answer":"B","explain":"能力表以主体为中心，便于判断某用户拥有哪些权限。"},{"id":"Q065","source":"原卷2-认证、PKI、访问控制与TLS","topic":"RBAC","stem":"RBAC中的“最小权限原则”主要强调什么？","options":{"A":"尽可能多地给用户分配权限以提高工作效率","B":"只给角色分配完成其任务所必须的最小权限集","C":"让用户自动获得系统中的所有默认权限","D":"根据用户的资历级别分配权限"},"answer":"B","explain":"角色只应具备完成任务所需最小权限。"},{"id":"Q066","source":"原卷2-认证、PKI、访问控制与TLS","topic":"RBAC","stem":"在RBAC系统中，当需要修改某个职位的权限时，最有效的做法是？","options":{"A":"逐个修改相应用户的权限","B":"修改该职位对应角色的权限分配","C":"重新定义所有操作类型","D":"更改目标的安全级别"},"answer":"B","explain":"RBAC通过角色解耦用户和权限。"},{"id":"Q067","source":"原卷2-认证、PKI、访问控制与TLS","topic":"EAP","stem":"可扩展认证协议（EAP）的核心设计思想是什么？","options":{"A":"提供一种固定不变的强加密算法","B":"定义一种支持多种认证方法的通用认证框架","C":"替代所有的物理身份认证方式","D":"专门用于有线网络的身份验证"},"answer":"B","explain":"EAP是可承载多种认证方法的框架。"},{"id":"Q068","source":"原卷2-认证、PKI、访问控制与TLS","topic":"访问控制","stem":"在Unix/Linux文件系统中，使用ls -l命令可以看到类似-rw-r--r--的权限信息。这种权限管理方式本质上是一种？","options":{"A":"能力表（CL）的实现","B":"访问控制列表（ACL）的简化实现","C":"基于角色的访问控制（RBAC）","D":"强制访问控制（MAC）"},"answer":"B","explain":"Unix权限以文件为中心记录访问权限，可看作简化ACL。"},{"id":"Q069","source":"原卷2-认证、PKI、访问控制与TLS","topic":"访问控制","stem":"自主访问控制（DAC）策略的核心特征是什么？","options":{"A":"由系统强制实施，用户无法更改","B":"由数据的所有者自主决定其他用户对其资源的访问权限","C":"基于安全标签和系统安全策略来限制访问","D":"访问权限由中央管理员统一分配，用户无权干预"},"answer":"B","explain":"DAC由资源所有者自主授权。"},{"id":"Q070","source":"原卷2-认证、PKI、访问控制与TLS","topic":"访问控制","stem":"强制访问控制（MAC）的主要目标是解决自主访问控制（DAC）的什么不足？","options":{"A":"权限管理过于复杂","B":"权限可能被用户任意扩散，无法防止特洛伊木马等攻击","C":"访问决策速度太慢","D":"无法实现基本的权限管理"},"answer":"B","explain":"MAC由系统强制执行安全标签策略，限制权限任意扩散。"},{"id":"Q071","source":"原卷2-认证、PKI、访问控制与TLS","topic":"HTTPS/TLS","stem":"当你在浏览器中看到地址栏显示一个“锁”图标时，这主要表示什么？","options":{"A":"该网站的加载速度非常快","B":"你与该网站之间的连接是私密的，并且已通过TLS加密","C":"该网站的内容一定是合法且真实的","D":"该网站没有使用任何Cookie"},"answer":"B","explain":"锁图标通常表示HTTPS/TLS连接和证书验证通过。"},{"id":"Q072","source":"原卷2-认证、PKI、访问控制与TLS","topic":"HTTPS/TLS","stem":"HTTPS与TLS协议的正确关系是？","options":{"A":"HTTPS是TLS的升级版本，取代了TLS","B":"TLS是HTTPS的一个组成部分，负责加密邮件","C":"HTTPS是HTTP协议基于TLS协议的安全传输版本","D":"TLS协议仅在HTTPS建立连接初期使用，不加密数据"},"answer":"C","explain":"HTTPS是HTTP over TLS。"},{"id":"Q073","source":"原卷2-认证、PKI、访问控制与TLS","topic":"SSH","stem":"小明想使用SSH登录到IP地址为192.168.1.100的服务器，他的用户名是xiaoming。请问正确的命令是？","options":{"A":"ssh 192.168.1.100 -u xiaoming","B":"ssh xiaoming@192.168.1.100","C":"ssh connect 192.168.1.100 -l xiaoming","D":"ssh login xiaoming/192.168.1.100"},"answer":"B","explain":"SSH常用格式是 ssh 用户名@主机。"},{"id":"Q074","source":"原卷2-认证、PKI、访问控制与TLS","topic":"TLS","stem":"以下哪种应用场景中，最不适合使用TLS协议进行加密？","options":{"A":"网页浏览器与网上银行服务器之间的通信","B":"用户客户端与电子邮件服务器之间收发邮件（IMAPS, SMTPS）","C":"公司内部局域网中两台服务器之间传输高度机密数据","D":"实时在线游戏中对延迟极其敏感的UDP数据包加密"},"answer":"D","explain":"传统TLS配合TCP，UDP实时低延迟场景通常考虑DTLS/QUIC或专用机制。"},{"id":"Q075","source":"原卷2-认证、PKI、访问控制与TLS","topic":"HTTPS/TLS","stem":"HTTPS协议最核心的功能是什么？","options":{"A":"显著提升网页的加载和渲染速度","B":"对Web服务器和浏览器之间的通信进行加密和认证","C":"压缩传输数据以节省带宽","D":"允许服务器向客户端推送实时通知"},"answer":"B","explain":"HTTPS通过TLS提供加密、完整性和服务器认证。"},{"id":"Q076","source":"原卷2-认证、PKI、访问控制与TLS","topic":"SSH","stem":"SSH协议默认使用哪个端口进行通信？","options":{"A":"21","B":"22","C":"23","D":"80"},"answer":"B","explain":"SSH默认TCP 22端口。"},{"id":"Q077","source":"原卷2-认证、PKI、访问控制与TLS","topic":"802.1X","stem":"IEEE 802.1X协议的核心认证机制是基于什么？","options":{"A":"基于用户的身份认证","B":"基于端口的访问控制","C":"基于IP地址的过滤","D":"基于MAC地址的绑定"},"answer":"B","explain":"802.1X是基于端口的网络接入控制。"},{"id":"Q078","source":"原卷2-认证、PKI、访问控制与TLS","topic":"802.1X","stem":"在校园网环境中，部署802.1X的主要目的是？","options":{"A":"提高网络传输速度","B":"实现按流量计费","C":"防止未授权设备接入网络","D":"增强网络设备性能"},"answer":"C","explain":"802.1X用于控制未认证终端接入网络。"},{"id":"Q080","source":"原卷2-认证、PKI、访问控制与TLS","topic":"HTTPS/TLS","stem":"HTTPS协议默认使用哪个端口进行通信？","options":{"A":"80","B":"443","C":"8080","D":"53"},"answer":"B","explain":"HTTPS默认TCP 443端口。"},{"id":"Q081","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线安全","stem":"WEP协议在设计上存在一个根本性缺陷，导致其容易被破解，这个缺陷主要是什么？","options":{"A":"使用了过于简单的用户密码","B":"初始化向量（IV）太短且以明文传输，导致密钥流重用","C":"加密算法RC4本身存在无法修复的后门","D":"无法支持超过100兆的网络带宽"},"answer":"B","explain":"WEP的IV短且明文传输，容易重复并导致密钥流重用。"},{"id":"Q082","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线安全","stem":"由于WEP协议已被证明极不安全，以下哪个协议是IEEE正式制定的、用于永久替代它的标准？","options":{"A":"WPA","B":"WPA2","C":"802.1x","D":"TLS"},"answer":"B","explain":"WPA是过渡方案，WPA2对应IEEE 802.11i正式替代WEP。"},{"id":"Q083","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"WAPI","stem":"关于WAPI的国际地位和与IEEE标准的关系，以下描述正确的是？","options":{"A":"WAPI是IEEE 802.11i标准的官方组成部分，被全球广泛采用。","B":"WAPI是中国提出的自主知识产权标准，与IEEE 802.11系列标准并行，主要在中国强制推行。","C":"WAPI已被WPA3协议完全吸收并取代，不再具有使用价值。","D":"WAPI是Wi-Fi联盟为替代WEP而推出的临时过渡方案。"},"answer":"B","explain":"WAPI是中国提出的无线局域网安全标准，与802.11i体系不同。"},{"id":"Q084","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"WAPI","stem":"WAPI著名的“三元架构”（STA-AP-ASU）体现了怎样的设计理念？","options":{"A":"分布式信任理念：引入独立的第三方认证机构（ASU）作为可信仲裁者，实现彻底的双向认证","B":"去中心化理念：消除所有中心节点以增强网络的鲁棒性和抗摧毁能力","C":"负载均衡理念：将复杂的密码运算分散到三个实体上以提升处理效率","D":"兼容性理念：通过增加一个实体来同时兼容WEP和WPA两种旧标准"},"answer":"A","explain":"WAPI通过ASU作为认证服务单元实现基于证书的双向认证。"},{"id":"Q085","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线安全","stem":"关于无线接入点，面临的主要安全威胁是什么？","options":{"A":"信号强度不足","B":"网络的未认证入侵","C":"设备硬件老化","D":"传输速度过慢"},"answer":"B","explain":"无线介质开放，主要威胁是未授权接入和伪装接入。"},{"id":"Q086","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线规划","stem":"网络管理员发现公司无线网络附近存在大量未知的竞争信号。他可以采取以下哪项措施来优化自身无线环境？","options":{"A":"开启标识符广播以增强信号","B":"进行现场勘查，调整信道和信号强度","C":"为所有员工电脑安装杀毒软件","D":"将路由器默认密码改得更复杂"},"answer":"B","explain":"竞争信号问题应通过勘测、信道规划和功率控制处理。"},{"id":"Q087","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"WAPI","stem":"WAPI规范的设计哲学总体上反映了怎样的网络安全观？","options":{"A":"网络安全应主要依靠用户的安全意识和使用强密码","B":"网络安全是可以通过打补丁方式逐步完善的后置属性","C":"网络安全必须是内置的、基于硬件的、由协议本身基础结构保证的根本属性","D":"网络安全应追求性价比的平衡，为不同应用场景提供不同等级的安全选项"},"answer":"C","explain":"WAPI强调内生安全、双向认证和协议基础结构安全。"},{"id":"Q088","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线安全标准","stem":"在无线网络安全规范中有IEEE802.11i和WAPI两种规范，两者最根本的设计哲学分歧体现在对网络安全基石的抉择上，即：","options":{"A":"使用流密码还是分组密码","B":"依赖“共享密钥”还是信赖“数字身份”","C":"追求全球兼容还是区域标准","D":"采用软件升级还是硬件绑定"},"answer":"B","explain":"该题考查共享密钥/数字身份认证路线差异。"},{"id":"Q089","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线安全标准","stem":"无线网络安全标准IEEE802.11i和WAPI在设计目标上存在显著差异，这最终导致了不同的应用场景。其中：","options":{"A":"IEEE 802.11i致力于打造一个全球通用的、平衡安全与部署便利性的标准；WAPI旨在构建一个由强身份认证驱动的、可控的安全体系","B":"IEEE 802.11i旨在为企业服务，而WAPI旨在为家庭用户服务","C":"IEEE 802.11i追求极致的性能，而WAPI追求极致的兼容性","D":"IEEE 802.11i是开放标准，而WAPI是保密协议"},"answer":"A","explain":"802.11i强调全球通用与便利，WAPI强调强身份认证和可控安全。"},{"id":"Q090","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线安全","stem":"RSN（强健安全网络）的核心目标是什么？","options":{"A":"提高无线网络的传输速率和带宽","B":"替代原有的有线等效保密（WEP）协议，提供强大的安全性和数据保密性","C":"增加无线信号的覆盖范围和穿透能力","D":"管理无线网络的频段分配和信道选择"},"answer":"B","explain":"RSN是802.11i提出的强健安全网络，用于替代WEP。"},{"id":"Q091","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"邮件安全","stem":"MIME的主要设计目的是什么？","options":{"A":"加快电子邮件的传输速度","B":"对电子邮件内容进行加密，增强安全性","C":"扩展电子邮件标准，使其能够传输非ASCII码文本、二进制数据等多种格式的内容","D":"取代传统的SMTP邮件传输协议"},"answer":"C","explain":"MIME扩展邮件可携带多种内容类型和编码。"},{"id":"Q092","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"S/MIME","stem":"S/MIME协议实现其安全功能所依赖的核心技术基础是什么？","options":{"A":"对称加密算法（如AES）","B":"公钥基础设施（PKI）和X.509数字证书","C":"安全哈希算法（如SHA-256）","D":"防火墙和入侵检测系统（IDS）"},"answer":"B","explain":"S/MIME依赖X.509证书和PKI。"},{"id":"Q093","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"S/MIME/PGP","stem":"与另一个著名的电子邮件安全标准OpenPGP（如PGP/GPG）相比，S/MIME的一个典型区别是？","options":{"A":"S/MIME只能加密邮件，不能进行数字签名","B":"S/MIME通常依赖于由公认的证书颁发机构（CA）签发的数字证书，更容易与企业PKI集成","C":"S/MIME的加密强度远低于OpenPGP","D":"S/MIME是开源标准，而OpenPGP是专利技术"},"answer":"B","explain":"S/MIME典型使用CA/PKI模型，便于企业集成。"},{"id":"Q094","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"PGP","stem":"PGP的“信任网”（WoT）模型最核心的理念是什么？","options":{"A":"依赖一个中心化的证书颁发机构（CA）来验证所有用户的身份。","B":"通过用户之间相互签名其公钥来建立一种去中心化的身份信任关系网络。","C":"使用区块链技术来公开记录所有密钥的颁发和撤销信息。","D":"要求所有用户必须在线验证才能使用加密功能。"},"answer":"B","explain":"PGP通过用户相互签名公钥建立去中心化信任。"},{"id":"Q095","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"PGP","stem":"与S/MIME所采用的基于CA的PKI模型相比，PGP的信任网（WoT）的主要优势在于？","options":{"A":"验证身份的速度更快，无需复杂的密码学运算。","B":"它不依赖于任何可能收费或需要提交个人信息的单一中心化权威机构。","C":"它能够提供更强大的加密算法，破解难度更高。","D":"它自动集成在所有的电子邮件客户端中，无需额外配置。"},"answer":"B","explain":"WoT优势是去中心化，不依赖单一CA。"},{"id":"Q096","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"IPSec","stem":"IPSec协议簇的主要设计目标是：","options":{"A":"提高网络传输速度","B":"为IP层通信提供安全保护","C":"简化网络配置流程","D":"替代TCP协议"},"answer":"B","explain":"IPSec在网络层保护IP通信。"},{"id":"Q097","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"IPSec","stem":"IPSec协议体系主要由哪三大部分组成？","options":{"A":"加密算法、解密算法、密钥管理","B":"安全协议、安全关联、密钥管理","C":"用户认证、数据加密、流量控制","D":"隧道协议、路由协议、传输协议"},"answer":"B","explain":"IPSec核心包括AH/ESP、安全关联SA和密钥管理IKE。"},{"id":"Q098","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"VPN","stem":"一个员工在家中使用笔记本电脑需要安全地访问公司内网的文件服务器，最可能使用的IPSec应用形式是：","options":{"A":"远程访问VPN（Remote Access VPN）","B":"站点到站点VPN（Site-to-Site VPN）","C":"无线局域网保护","D":"电子邮件加密"},"answer":"A","explain":"单个远程用户访问企业内网是远程访问VPN。"},{"id":"Q099","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"IKE","stem":"IKE（Internet密钥交换）协议的主要作用是：","options":{"A":"传输加密后的用户数据","B":"自动协商和建立IPSec安全关联（SA）所需的密钥材料","C":"过滤网络攻击数据包","D":"压缩网络数据流量"},"answer":"B","explain":"IKE负责协商密钥材料和建立SA。"},{"id":"Q100","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"IPSec","stem":"从协议栈来看，IPSec主要工作在OSI模型的哪一层？","options":{"A":"应用层（Application Layer）","B":"传输层（Transport Layer）","C":"网络层（Network Layer）","D":"数据链路层（Data Link Layer）"},"answer":"C","explain":"IPSec保护IP包，属于网络层。"},{"id":"Q101","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"IPSec模式","stem":"IPSec的两种主要操作模式（传输模式和隧道模式）是从哪个层面进行区分的？","options":{"A":"加密算法的强度不同","B":"保护的数据范围不同","C":"使用的密钥长度不同","D":"支持的应用程序不同"},"answer":"B","explain":"传输模式保护IP负载；隧道模式保护整个原始IP包。"},{"id":"Q102","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"IPSec协议","stem":"ESP协议和AH协议的主要区别在于：","options":{"A":"ESP只提供认证，AH提供加密和认证","B":"ESP提供加密和认证，AH只提供认证","C":"两者功能完全相同","D":"ESP只用于传输模式，AH只用于隧道模式"},"answer":"B","explain":"ESP可加密并认证，AH只提供认证和完整性。"},{"id":"Q103","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"IPSec协议","stem":"如果需要同时实现对数据加密和完整性保护，应该使用：","options":{"A":"仅AH协议","B":"仅ESP协议","C":"AH和ESP同时使用","D":"不需要使用IPSec"},"answer":"B","explain":"ESP可同时提供机密性和完整性保护。"},{"id":"Q104","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"防火墙/DMZ","stem":"一家公司需要将自家的Web服务器（IP: 192.168.50.100）对外提供服务，但又要保护其不受直接攻击。最安全的防火墙部署方案是？","options":{"A":"将Web服务器放在内部办公网络，在防火墙上映射公网IP的80/443端口到该服务器。","B":"将Web服务器部署在一个独立的DMZ区域，在防火墙上只允许公网用户访问该服务器80/443端口，并严格限制从DMZ到内网的访问。","C":"将Web服务器直接连接在公网上，并关闭其除80/443之外的所有端口。","D":"不允许任何外部访问，只让内部员工使用。"},"answer":"B","explain":"对外服务器应放DMZ并限制DMZ到内网访问。"},{"id":"Q105","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"防火墙策略","stem":"防火墙策略中的“黑名单”机制通常意味着？","options":{"A":"默认拒绝所有流量，只允许明确指定的流量。","B":"默认允许所有流量，只拒绝明确指定的流量（如特定IP、端口）。","C":"对所有流量进行深度内容检测。","D":"自动加密所有允许通过的流量。"},"answer":"B","explain":"黑名单策略默认允许，显式拒绝已知对象。"},{"id":"Q106","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"防火墙","stem":"防火墙最核心、最基本的功能是？","options":{"A":"查杀病毒和恶意软件","B":"在网络边界实施访问控制，根据安全策略允许或拒绝流量通过","C":"加密内部网络的数据以防止窃听","D":"防止内部人员误操作"},"answer":"B","explain":"防火墙核心是在网络边界执行访问控制。"},{"id":"Q107","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"防火墙局限","stem":"关于防火墙的局限性，以下哪项描述是正确的？","options":{"A":"防火墙可以保证内部网络的绝对安全。","B":"防火墙无法有效防范来自网络内部的攻击和已经授权的通信中存在的恶意流量。","C":"防火墙能够识别并阻止所有类型的应用程序漏洞和零日攻击。","D":"防火墙的主要任务是管理用户权限。"},"answer":"B","explain":"防火墙对内部威胁和已授权通道中的恶意内容能力有限。"},{"id":"Q108","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"防火墙","stem":"状态检测防火墙相比简单包过滤防火墙的主要优势在于？","options":{"A":"能够解析应用层协议的内容","B":"能够跟踪TCP/UDP会话的状态，动态决定是否允许数据包通过","C":"能够对数据包进行病毒扫描","D":"能够为内部用户提供更快的网速"},"answer":"B","explain":"状态检测防火墙维护会话状态表。"},{"id":"Q109","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"防火墙策略","stem":"关于白名单策略，以下说法正确的是？","options":{"A":"它是一种“宽进严出”的策略，优先保证连接的便利性。","B":"它是一种“严进严出”的策略，任何未经明确允许的流量都会被拒绝，安全性高。","C":"它能够自动学习并允许新的、未知的合法流量通过。","D":"它主要用于封禁少数已知的恶意目标。"},"answer":"B","explain":"白名单默认拒绝，显式允许。"},{"id":"Q110","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"DMZ","stem":"将服务器放置在DMZ中的主要目的是？","options":{"A":"让服务器获得最快的互联网访问速度","B":"在允许外部访问的同时，隔离风险以保护内部网络安全","C":"降低服务器的硬件成本","D":"避免为服务器申请域名"},"answer":"B","explain":"DMZ用于承载对外服务并隔离内网风险。"},{"id":"Q111","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"IDS","stem":"入侵检测系统（IDS）的核心功能是？","options":{"A":"实时阻断所有网络攻击","B":"监控网络或系统活动，检测并警告潜在的安全违规行为","C":"对传输中的数据包进行加密","D":"提升网络带宽和传输速度"},"answer":"B","explain":"IDS以检测和告警为主。"},{"id":"Q112","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"IDS","stem":"当IDS检测到入侵行为后，通常不会通过以下哪种方式做出响应？","options":{"A":"在控制台界面生成可视化警报","B":"向管理员发送电子邮件或短信通知","C":"自动格式化被攻击主机的硬盘","D":"记录详细的日志以供审计"},"answer":"C","explain":"IDS不会执行格式化硬盘这类破坏性操作。"},{"id":"Q113","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"蜜罐/蜜网","stem":"蜜网（Honeynet）的本质是什么？","options":{"A":"一个经过特殊加固的、用于存放企业核心数据的高安全性网络","B":"一个包含多个蜜罐（Honeypot）的、经过高度控制的诱捕网络","C":"一种用于加速内部网络访问速度的缓存网络","D":"一种新型的虚拟化防火墙技术"},"answer":"B","explain":"蜜网是多个受控蜜罐组成的诱捕网络。"},{"id":"Q114","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"恶意代码","stem":"以下哪一项最准确地描述了“恶意代码”（Malware）的核心特征？","options":{"A":"任何存在编程错误（Bug）或设计缺陷的软件","B":"任何未经用户明确同意或知晓，意图破坏、扰乱、窃取或进行其他未经授权操作的代码","C":"专指通过网络传播的计算机病毒","D":"所有体积小于1MB的可执行程序"},"answer":"B","explain":"恶意代码关键是未经授权且具有破坏、窃取、扰乱或控制目的。"},{"id":"Q115","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"恶意代码","stem":"蠕虫（Worm）区别于传统计算机病毒（Virus）的最主要特征是？","options":{"A":"能够对系统文件造成破坏","B":"不需要寄生在宿主程序中，可以独立存在和自我复制","C":"会窃取用户的个人隐私数据","D":"必须通过用户双击才能激活运行"},"answer":"B","explain":"蠕虫可独立存在和自我传播。"},{"id":"Q116","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"恶意代码","stem":"以下关于“后门（Backdoor）”恶意代码的描述中，最准确的是？","options":{"A":"一种会加密用户文件并索要赎金的恶意软件。","B":"一种为系统或程序创建隐蔽访问通道，以绕过正常安全认证机制的恶意代码。","C":"一种伪装成正常软件，但会显示大量广告的应用程序。","D":"一种可以自我复制并通过网络传播，消耗大量资源的程序"},"answer":"B","explain":"后门用于绕过正常认证创建隐蔽访问通道。"},{"id":"Q117","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"恶意代码","stem":"Rootkit恶意代码最核心、最本质的技术目标是？","options":{"A":"大量复制自身，感染网络中的其他设备。","B":"加密用户文件，并索要赎金。","C":"将其自身、其他恶意代码或系统活动隐藏起来，以避免被用户和安全软件检测。","D":"窃取用户的所有密码和银行凭证。"},"answer":"C","explain":"Rootkit的本质是隐藏自身和恶意活动。"},{"id":"Q118","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"恶意代码","stem":"攻击者成功入侵一台服务器后，安装了一个程序，该程序的主要功能是为他创建一个无需输入密码即可远程登录的隐藏账户。这个程序最属于？","options":{"A":"Rootkit","B":"Trojan（木马）","C":"Backdoor（后门）","D":"Adware（广告软件）"},"answer":"C","explain":"隐藏免密登录入口属于后门。"},{"id":"Q119","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"恶意代码","stem":"一种脚本病毒通过Word文档传播，当用户打开文档并启用“宏”后，病毒代码会执行。这最属于哪种类型的脚本病毒？","options":{"A":"浏览器脚本病毒","B":"批处理病毒","C":"宏病毒","D":"Shell脚本病毒"},"answer":"C","explain":"Office宏中携带恶意代码属于宏病毒。"},{"id":"Q120","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"社会工程","stem":"一种垃圾邮件声称来自“IT部门”，要求全体员工立即点击链接进行“密码过期更新”。该链接指向一个与公司真实登录页面极其相似的虚假网站。这种手法被称为？","options":{"A":"水坑攻击","B":"蠕虫攻击","C":"钓鱼攻击（Phishing）","D":"勒索攻击"},"answer":"C","explain":"伪装可信来源诱导输入凭证是钓鱼攻击。"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"防火墙的组成通常可以是？","options":{"A":"普通的混凝土和砖块","B":"只能由专用硬件系统组成","C":"由专用硬件系统或软件系统组成","D":"只能由软件系统组成"},"answer":"C","explain":"防火墙既可以是专用硬件设备，也可以是运行在主机或网关上的软件系统。","id":"IMG-Q001"},{"source":"截图题库-网络信息安全-20260628","topic":"TLS/公钥密码","stem":"当浏览器访问以 https:// 开头的网站时，公钥密码体制在建立安全连接过程中最主要的作用是？","options":{"A":"防止病毒通过网页传播","B":"加密浏览器显示的所有网页内容","C":"加速网页加载和渲染速度","D":"对服务器身份进行认证并协商加密密钥"},"answer":"D","explain":"TLS 握手中证书和公钥密码用于认证服务器身份，并协商后续会话密钥。","id":"IMG-Q002"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"在以下哪种场景中，使用简单的包过滤防火墙可能仍然是合理选择？","options":{"A":"在不需要极高安全性的网络区段进行快速、简单的初步访问控制","B":"需要验证数据包内容是否被篡改","C":"需要深度检测并阻止隐藏在合法流量中的高级持续性威胁","D":"需要严格管控内部用户可以使用的具体应用程序"},"answer":"A","explain":"包过滤防火墙适合基于 IP、端口等字段做简单快速的边界访问控制。","id":"IMG-Q003"},{"source":"截图题库-网络信息安全-20260628","topic":"恶意代码","stem":"关于恶意代码的传播意图，下列描述正确的是？","options":{"A":"只有通过电子邮件传播的代码才是恶意代码","B":"不具备传播能力的代码一定不是恶意代码","C":"所有恶意代码都必须具备自我复制和传播能力","D":"恶意代码可以不具备主动传播能力，而依赖用户下载和执行"},"answer":"D","explain":"木马、后门、间谍软件等恶意代码不一定自我复制，仍可造成未授权操作或数据泄露。","id":"IMG-Q004"},{"source":"截图题库-网络信息安全-20260628","topic":"TLS","stem":"TLS 协议中，用于验证消息完整性、防止数据在传输中被篡改的机制是？","options":{"A":"非对称加密","B":"数字证书","C":"会话票证","D":"消息认证码 MAC"},"answer":"D","explain":"TLS 记录层通过 MAC 或 AEAD 认证标签验证记录完整性和真实性。","id":"IMG-Q005"},{"source":"截图题库-网络信息安全-20260628","topic":"TLS","stem":"TLS 记录协议需要将上层应用数据分割成片段的主要原因是？","options":{"A":"为了在不同网络路径上负载均衡","B":"TLS 记录负载长度存在上限，需要按记录分片处理","C":"为了在传输失败时只重传部分数据","D":"为了直接适配 TCP MSS 并避免所有 IP 分片"},"answer":"B","explain":"TLS 记录层会把上层数据分片为受最大记录长度限制的记录。","id":"IMG-Q006"},{"source":"截图题库-网络信息安全-20260628","topic":"TLS","stem":"下列哪项不属于 TLS 记录协议的主要功能？","options":{"A":"加密和消息认证","B":"压缩","C":"分段","D":"密钥交换"},"answer":"D","explain":"密钥交换属于 TLS 握手协议，记录协议负责分段、压缩、认证和加密等处理。","id":"IMG-Q007"},{"source":"截图题库-网络信息安全-20260628","topic":"认证","stem":"与单向认证相比，双向认证最大的优势是什么？","options":{"A":"能够同时验证客户端和服务器身份，提供更高级别的安全保障","B":"对客户端无需任何配置","C":"完全避免所有类型的网络攻击","D":"通信建立速度更快"},"answer":"A","explain":"双向认证要求通信双方都证明身份，可减少客户端或服务器被冒充的风险。","id":"IMG-Q008"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"状态检测防火墙相对于传统包过滤防火墙的关键技术演进是？","options":{"A":"引入了加密所有流量的功能","B":"能够自动生成防火墙规则，无需人工配置","C":"能够跟踪和维护网络连接状态，如 TCP 会话状态","D":"能够识别并拦截所有病毒"},"answer":"C","explain":"状态检测防火墙依据连接状态表判断返回流量是否属于合法会话。","id":"IMG-Q009"},{"source":"截图题库-网络信息安全-20260628","topic":"恶意代码","stem":"下列哪一类恶意代码的主要特点是无需寄生在其他程序上，能够独立运行并自我复制？","options":{"A":"蠕虫","B":"勒索软件","C":"特洛伊木马","D":"病毒"},"answer":"A","explain":"蠕虫通常不需要宿主程序，可利用网络自动复制和传播。","id":"IMG-Q010"},{"source":"截图题库-网络信息安全-20260628","topic":"堡垒主机","stem":"双宿主堡垒主机如果被攻破，最主要的安全风险是？","options":{"A":"可能成为攻击者进一步攻击内部网络的跳板","B":"会自动关闭所有安全防护","C":"会导致网络速度变得极慢","D":"完全无法提供任何网络服务"},"answer":"A","explain":"堡垒主机位于安全边界，一旦被攻破，可能被用于横向进入内部网络。","id":"IMG-Q011"},{"source":"截图题库-网络信息安全-20260628","topic":"公钥密码","stem":"公钥密码体制最核心的特征是？","options":{"A":"加密和解密都使用相同的密钥","B":"加密和解密使用两个不同但数学相关的密钥","C":"加密速度一定比对称密码快","D":"密钥不需要分发，可以完全保密"},"answer":"B","explain":"公钥密码体制使用公钥和私钥两个数学相关但用途不同的密钥。","id":"IMG-Q012"},{"source":"截图题库-网络信息安全-20260628","topic":"入侵检测","stem":"从防御者视角看，基于网络的入侵检测系统 NIDS 难以检测高级后门的原因，最不可能包括哪一项？","options":{"A":"后门程序文件大小超过了 NIDS 的扫描能力上限","B":"后门通信使用强加密，导致深度包检测失效","C":"后门把数据隐藏在 DNS、HTTP 等常见协议的正常请求中","D":"后门使用域名生成算法，使基于黑名单域名或 IP 的检测方法失效"},"answer":"A","explain":"NIDS主要观察网络流量，文件大小不是其难以检测后门通信的核心原因。","id":"IMG-Q013"},{"source":"截图题库-网络信息安全-20260628","topic":"公钥密码","stem":"根据 Diffie 和 Hellman 的贡献，公钥密码思想的主要特点是什么？","options":{"A":"基于数学函数构造，而不是传统密码中简单的比特模式操作","B":"密钥管理不再需要任何保密措施","C":"只能用于加密，不能用于认证","D":"必须依赖同一个共享密钥"},"answer":"A","explain":"Diffie-Hellman 开创了基于数学难题和非对称思想的公钥密码方向。","id":"IMG-Q014"},{"source":"截图题库-网络信息安全-20260628","topic":"认证协议","stem":"PAP 认证协议最大的特点是？","options":{"A":"使用数字证书进行身份验证","B":"使用挑战应答避免口令传输","C":"用户名和口令以明文形式发送","D":"必须基于一次性口令"},"answer":"C","explain":"PAP 的主要安全问题是口令明文传输，容易被窃听。","id":"IMG-Q015"},{"source":"截图题库-网络信息安全-20260628","topic":"后门","stem":"后门程序为了能够长期潜伏在系统中，最需要具备的特性是？","options":{"A":"高速网络传输能力","B":"隐蔽性和持久化能力","C":"主动向用户展示运行状态","D":"必须具备自我复制能力"},"answer":"B","explain":"后门的核心目标是隐蔽保留未授权访问通道，并在重启后仍能保持。","id":"IMG-Q016"},{"source":"截图题库-网络信息安全-20260628","topic":"IPSec","stem":"IPSec 传输模式的主要特点是？","options":{"A":"仅用于路由器之间的通信","B":"保护上层协议负载，通常保留原始 IP 头","C":"会重新封装整个原始 IP 数据包并添加新 IP 头","D":"只能用于无线局域网"},"answer":"B","explain":"传输模式保护 IP 负载部分，隧道模式才会封装整个原始 IP 包。","id":"IMG-Q017"},{"source":"截图题库-网络信息安全-20260628","topic":"密码学基础","stem":"加密算法输出的、经过加密处理后的杂乱信息被称为？","options":{"A":"密文","B":"明文","C":"数字签名","D":"密钥"},"answer":"A","explain":"明文经过加密算法和密钥处理后得到密文。","id":"IMG-Q018"},{"source":"截图题库-网络信息安全-20260628","topic":"TLS","stem":"服务器在 TLS 握手过程中向客户端发送数字证书的主要目的是什么？","options":{"A":"为了验证客户端身份","B":"为了获取客户端公钥","C":"为了与客户端协商使用的压缩算法","D":"为了让客户端能够验证服务器身份"},"answer":"D","explain":"服务器证书把服务器身份和公钥绑定起来，客户端据此验证服务器身份。","id":"IMG-Q019"},{"source":"截图题库-网络信息安全-20260628","topic":"密码学基础","stem":"未经加密处理的原始信息，在密码学中被称为？","options":{"A":"密文","B":"算法","C":"密钥","D":"明文"},"answer":"D","explain":"明文是加密前的原始可读信息。","id":"IMG-Q020"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"从整体安全体系角度看，关于防火墙地位的说法最准确的是？","options":{"A":"防火墙已经过时，可以完全被云安全服务替代","B":"防火墙是重要的边界防护组件，但不能替代全部安全措施","C":"只要部署防火墙，内部系统就不需要加固","D":"防火墙只能用于个人电脑，不能用于企业网络"},"answer":"B","explain":"防火墙是纵深防御的一部分，还需要身份认证、终端安全、审计、加密等措施配合。","id":"IMG-Q021"},{"source":"截图题库-网络信息安全-20260628","topic":"恶意代码","stem":"与蠕虫相比，计算机病毒的一个显著弱点是？","options":{"A":"通常需要寄生在宿主程序或依赖用户活动传播","B":"不能破坏文件系统","C":"不能复制自身","D":"只能感染无线网络"},"answer":"A","explain":"传统病毒通常依赖宿主程序或用户触发传播，而蠕虫可独立通过网络传播。","id":"IMG-Q022"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"防火墙的访问控制功能可以作用于 TCP/IP 协议栈的哪些层次？","options":{"A":"只能作用于应用层","B":"只能作用于物理层","C":"可根据防火墙类型作用于网络层、传输层或应用层","D":"只能作用于数据链路层"},"answer":"C","explain":"包过滤、状态检测、应用层网关等防火墙可在不同层次实施访问控制。","id":"IMG-Q023"},{"source":"截图题库-网络信息安全-20260628","topic":"TLS","stem":"TLS 协议的主要设计目标是什么？","options":{"A":"提高网络传输速度","B":"为两个通信应用程序之间提供加密、认证和完整性保护","C":"替代 IP 协议","D":"只用于压缩网页内容"},"answer":"B","explain":"TLS 提供机密性、完整性和身份认证，是 HTTPS 等安全通信的基础。","id":"IMG-Q024"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"链路层网关防火墙最主要的局限性是？","options":{"A":"缺乏高层协议的智能判断能力","B":"无法转发任何数据帧","C":"只能部署在无线网络中","D":"不能隐藏内部网络结构"},"answer":"A","explain":"链路层网关主要在较低层透明转发和控制，对应用层语义理解有限。","id":"IMG-Q025"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙策略","stem":"防火墙策略中的白名单机制通常意味着什么？","options":{"A":"对所有流量进行病毒扫描","B":"默认拒绝流量，只允许明确列入许可清单的流量通过","C":"默认允许所有流量，只阻止已知恶意目标","D":"只记录日志，不进行访问控制"},"answer":"B","explain":"白名单策略采用默认拒绝原则，安全性较高但维护成本也更高。","id":"IMG-Q026"},{"source":"截图题库-网络信息安全-20260628","topic":"TLS","stem":"在 TLS 握手开始时，客户端发送 ClientHello 消息通常包含什么？","options":{"A":"客户端随机数和支持的密码套件等参数","B":"服务器私钥","C":"最终应用层明文数据","D":"服务器证书撤销列表的完整副本"},"answer":"A","explain":"ClientHello 会携带客户端随机数、协议版本、支持的密码套件和扩展等信息。","id":"IMG-Q027"},{"source":"截图题库-网络信息安全-20260628","topic":"恶意代码","stem":"历史上 Conficker 蠕虫和 WannaCry 蠕虫的共同传播特点是？","options":{"A":"主要利用系统或网络服务漏洞自动传播","B":"只能通过用户复制 U 盘传播","C":"只能感染手机系统","D":"必须依赖宏文档才能运行"},"answer":"A","explain":"这类蠕虫常利用网络服务漏洞实现大规模自动传播。","id":"IMG-Q028"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"防火墙实现访问控制的核心依据通常是什么？","options":{"A":"网络安全策略和规则","B":"用户显示器分辨率","C":"硬盘容量","D":"网页字体大小"},"answer":"A","explain":"防火墙依据预设安全策略，对源/目的地址、端口、协议、状态或应用内容等进行判断。","id":"IMG-Q029"},{"source":"截图题库-网络信息安全-20260628","topic":"恶意代码","stem":"以下哪项是病毒最常见的传播方式？","options":{"A":"依赖用户活动，例如使用 U 盘、下载运行文件或打开邮件附件","B":"通过电源线传导","C":"通过显示器亮度变化传播","D":"只通过防火墙规则传播"},"answer":"A","explain":"传统病毒常依附文件或介质，依赖用户复制、运行或打开感染载体。","id":"IMG-Q030"},{"source":"截图题库-网络信息安全-20260628","topic":"恶意代码","stem":"与病毒相比，蠕虫对网络基础设施构成的最大威胁在于？","options":{"A":"消耗大量网络带宽和系统资源，造成拒绝服务影响","B":"只能修改单个本地文件","C":"无法跨主机传播","D":"必须由管理员手动复制"},"answer":"A","explain":"蠕虫可自动扫描和复制，容易形成大范围流量和资源消耗。","id":"IMG-Q031"},{"source":"截图题库-网络信息安全-20260628","topic":"恶意代码","stem":"一个伪装成有用软件但暗中窃取用户数据的程序，最可能被归类为？","options":{"A":"蠕虫","B":"计算机病毒","C":"特洛伊木马","D":"防火墙"},"answer":"C","explain":"木马通常伪装成正常或有用程序，诱导用户执行后实施恶意行为。","id":"IMG-Q032"},{"source":"截图题库-网络信息安全-20260628","topic":"标识与鉴别","stem":"用户登录系统时输入“用户名”这一操作属于认证流程中的哪个步骤？","options":{"A":"审计","B":"标识","C":"授权","D":"加密"},"answer":"B","explain":"用户名用于声明和标识主体身份；验证该身份真实性才是鉴别。","id":"IMG-Q033"},{"source":"截图题库-网络信息安全-20260628","topic":"IPSec","stem":"IPSec 隧道模式的一个主要优点是？","options":{"A":"可以绕过所有防火墙限制","B":"不会增加数据包大小","C":"能够保护整个原始 IP 数据包并隐藏内部地址信息","D":"不需要任何加密算法"},"answer":"C","explain":"隧道模式封装整个原始 IP 包，常用于站点到站点 VPN，并可隐藏内部网络结构。","id":"IMG-Q034"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙策略","stem":"与黑名单策略相比，白名单策略的显著特点是？","options":{"A":"无法有效防御已知威胁","B":"默认拒绝未明确允许的对象，安全性较高但维护成本较高","C":"默认允许所有未知流量","D":"不需要管理员维护"},"answer":"B","explain":"白名单更接近最小权限原则，但需要准确维护允许清单。","id":"IMG-Q035"},{"source":"截图题库-网络信息安全-20260628","topic":"TLS","stem":"TLS 握手过程中的 ChangeCipherSpec 消息表示什么？","options":{"A":"后续通信将使用协商好的密码套件和密钥保护","B":"服务器证书无效","C":"客户端关闭连接","D":"开始重新解析 DNS"},"answer":"A","explain":"ChangeCipherSpec 表示之后发送的记录将使用已协商的安全参数进行保护。","id":"IMG-Q036"},{"source":"截图题库-网络信息安全-20260628","topic":"后门","stem":"后门进程把通信流量伪装成访问常见云存储服务，这种做法主要体现了什么技术意图？","options":{"A":"利用合法服务作为隐蔽的命令控制或数据传输通道","B":"提高 CPU 主频","C":"自动修复系统漏洞","D":"降低磁盘占用"},"answer":"A","explain":"高级后门常滥用常见云服务、DNS 或 HTTP 流量隐藏 C2 通信。","id":"IMG-Q037"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"以下哪种场景最适合部署应用层网关防火墙？","options":{"A":"仅需要基本连通性的物联网设备网络","B":"需要对 HTTP、FTP 等应用协议内容进行细粒度审查和控制","C":"只需要按 MAC 地址转发数据帧","D":"完全不允许任何代理处理"},"answer":"B","explain":"应用层网关以代理方式理解应用协议，适合细粒度内容检查和访问控制。","id":"IMG-Q038"},{"source":"截图题库-网络信息安全-20260628","topic":"恶意代码","stem":"蠕虫通常利用以下哪种途径进行大规模快速传播？","options":{"A":"依赖用户手动拷贝 U 盘","B":"利用网络漏洞或弱口令在主机间自动传播","C":"只能通过纸质文件传播","D":"只通过显示器信号传播"},"answer":"B","explain":"蠕虫的核心传播方式是自动扫描并利用网络服务漏洞或弱凭证扩散。","id":"IMG-Q039"},{"source":"截图题库-网络信息安全-20260628","topic":"认证","stem":"安全通信中的单向认证主要含义是什么？","options":{"A":"只有客户端验证服务器身份，服务器不一定验证客户端身份","B":"只有服务器验证客户端身份","C":"双方都必须使用客户端证书","D":"不验证任何身份"},"answer":"A","explain":"典型 HTTPS 中客户端验证服务器证书，而服务器不一定验证客户端证书。","id":"IMG-Q040"},{"source":"截图题库-网络信息安全-20260628","topic":"堡垒主机","stem":"为增强单宿主堡垒主机的安全性，最重要的措施是？","options":{"A":"安装多个不同操作系统","B":"最小化服务、及时加固补丁并实施严格访问控制","C":"关闭所有日志","D":"允许所有外部主机直接登录"},"answer":"B","explain":"堡垒主机暴露在边界位置，应减少攻击面并强化监控和访问控制。","id":"IMG-Q041"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"对于全新的未知攻击手法或零日漏洞攻击，传统防火墙通常会怎样？","options":{"A":"可以百分之百成功拦截","B":"可能无法识别，除非攻击行为匹配已有策略或异常检测规则","C":"会自动修复受害主机","D":"会删除攻击者硬盘"},"answer":"B","explain":"传统防火墙依赖策略、状态和已知特征，对未知漏洞攻击无法保证拦截。","id":"IMG-Q042"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"传统防火墙的核心功能最准确地说是？","options":{"A":"管理用户身份认证和授权","B":"查杀病毒、木马等恶意软件","C":"在网络边界实施访问控制","D":"替代所有加密协议"},"answer":"C","explain":"传统防火墙的基本任务是在不同网络区域之间按照策略控制流量。","id":"IMG-Q043"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"应用层网关防火墙相比包过滤防火墙的一个独特优势是？","options":{"A":"完全不需要维护状态表","B":"可以理解并检查应用层协议内容","C":"只能处理二层帧","D":"不能记录日志"},"answer":"B","explain":"应用层网关能够代理应用连接并解析应用层协议，控制粒度更细。","id":"IMG-Q044"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙策略","stem":"以下哪种场景中采用黑名单策略可能更合适？","options":{"A":"需要临时阻断少数已知恶意 IP、域名或特征，同时保持大部分业务连通","B":"高安全内网只允许固定主机访问固定服务","C":"要求默认拒绝所有未知连接","D":"存放核心机密数据且访问对象极少"},"answer":"A","explain":"黑名单适合快速阻断已知恶意对象，但不能作为高安全场景的唯一控制手段。","id":"IMG-Q045"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"应用层网关防火墙的一个主要缺点是？","options":{"A":"无法识别任何应用层协议","B":"配置过于简单","C":"对网络性能影响较大，可能成为性能瓶颈","D":"会自动允许所有内部发起的连接"},"answer":"C","explain":"代理和应用层解析会带来额外处理开销。","id":"IMG-Q046"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙策略","stem":"采用白名单策略的一个主要优点是？","options":{"A":"显著提升网络传输速度和带宽","B":"能减少未知或未授权对象进入系统的机会","C":"不需要任何维护","D":"默认允许所有未知流量"},"answer":"B","explain":"白名单只允许明确可信对象，符合最小权限原则。","id":"IMG-Q047"},{"source":"截图题库-网络信息安全-20260628","topic":"公钥密码","stem":"关于公钥密码体制中的密钥，以下说法正确的是？","options":{"A":"公钥必须通过绝对安全的秘密信道分发","B":"公钥可以公开，私钥必须由拥有者保密","C":"公钥和私钥可以随意互换且都必须公开","D":"私钥可以公开，公钥必须保密"},"answer":"B","explain":"公钥用于公开分发，私钥必须严格保密。","id":"IMG-Q048"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"与更先进的防火墙类型相比，包过滤防火墙的主要优势是？","options":{"A":"配置过程极其复杂","B":"结构简单、速度快、成本较低","C":"能深度理解所有应用协议","D":"可以自动清除病毒"},"answer":"B","explain":"包过滤防火墙基于头部字段判断，处理速度快但控制粒度有限。","id":"IMG-Q049"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙策略","stem":"在哪种场景中采用白名单策略最为必要和合适？","options":{"A":"需要对外提供大量未知服务的测试环境","B":"鼓励自由访问的开放讨论区","C":"存放核心数据且访问对象和服务较固定的高安全区域","D":"临时封禁少数已知恶意地址"},"answer":"C","explain":"访问对象稳定且安全要求高时，白名单能有效落实最小权限控制。","id":"IMG-Q050"},{"source":"截图题库-网络信息安全-20260628","topic":"密码学发展","stem":"现代密码学诞生的标志通常被认为是什么？","options":{"A":"密码学长期缺乏数学理论基础","B":"香农发表《保密系统的通信理论》，奠定现代密码学理论基础","C":"凯撒密码被发明","D":"所有密码算法都转为硬件实现"},"answer":"B","explain":"1949 年香农论文使密码学建立在信息论和数学分析基础上。","id":"IMG-Q051"},{"source":"截图题库-网络信息安全-20260628","topic":"恶意代码","stem":"病毒将恶意代码附加到正常可执行文件上，这通常被称为？","options":{"A":"数据加密","B":"文件感染病毒","C":"防火墙过滤","D":"数字签名"},"answer":"B","explain":"文件感染型病毒通过附加、插入或修改可执行文件传播。","id":"IMG-Q052"},{"source":"截图题库-网络信息安全-20260628","topic":"APT/持久化","stem":"以下哪项技术通常可被高级持续性威胁用于维持长期驻留？","options":{"A":"将自身添加为 Windows 注册表 Run 键或类似自启动项","B":"主动通知用户卸载程序","C":"关闭所有网络连接","D":"删除自身所有持久化配置"},"answer":"A","explain":"APT 常通过自启动项、计划任务、服务、Rootkit 等方式实现持久化。","id":"IMG-Q053"},{"source":"截图题库-网络信息安全-20260628","topic":"密码学基础","stem":"加密算法、解密算法以及所有可能的明文、密文、密钥的集合共同构成什么？","options":{"A":"加密函数","B":"密码系统","C":"数字证书","D":"访问控制列表"},"answer":"B","explain":"密码系统通常由明文空间、密文空间、密钥空间、加密算法和解密算法等组成。","id":"IMG-Q054"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"防火墙部署在网络边界所起的主要作用是？","options":{"A":"在网络边界实施集中式访问控制，简化安全策略执行","B":"提升显示器分辨率","C":"替代所有主机补丁","D":"保证所有攻击都不可能发生"},"answer":"A","explain":"边界防火墙通过集中控制内外网流量降低暴露面。","id":"IMG-Q055"},{"source":"截图题库-网络信息安全-20260628","topic":"密码学基础","stem":"所有可能被加密的原始信息的集合，被称为？","options":{"A":"明文空间","B":"密钥空间","C":"算法空间","D":"密文空间"},"answer":"A","explain":"明文空间是所有可能明文消息的集合。","id":"IMG-Q056"},{"source":"截图题库-网络信息安全-20260628","topic":"恶意代码","stem":"一款软件在用户不知情的情况下上传浏览历史用于商业分析，根据恶意代码定义，它属于？","options":{"A":"不属于恶意代码，因为没有破坏系统","B":"间谍软件或隐私窃取类恶意代码","C":"防火墙","D":"正常系统补丁"},"answer":"B","explain":"未经用户知情同意收集并上传隐私数据，属于未授权的信息窃取行为。","id":"IMG-Q057"},{"source":"截图题库-网络信息安全-20260628","topic":"TLS","stem":"在使用 RSA 密钥交换的 TLS 握手中，预主密钥通常如何生成和传输？","options":{"A":"由服务器生成并用客户端公钥加密后发送","B":"由客户端生成并用服务器公钥加密后发送给服务器","C":"由第三方路由器明文广播","D":"由 DNS 服务器随机下发"},"answer":"B","explain":"传统 RSA 密钥交换中客户端生成预主密钥，并用服务器证书中的公钥加密发送。","id":"IMG-Q058"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"应用层网关防火墙实现安全控制的主要方式是？","options":{"A":"只监听流量但不进行任何干预","B":"作为通信双方的代理，解析应用层协议并按策略控制","C":"只检查以太网电压","D":"只根据电源状态过滤数据"},"answer":"B","explain":"应用层网关通过代理应用连接理解协议语义，从而实施更细的安全控制。","id":"IMG-Q059"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"状态检测防火墙通过什么机制来智能管理返回流量？","options":{"A":"默认允许所有外部返回流量","B":"维护连接状态表，只允许属于已建立合法会话的返回流量","C":"删除所有 TCP 报文","D":"只比较网页标题"},"answer":"B","explain":"连接状态表记录已建立会话，返回流量必须匹配状态表才能通过。","id":"IMG-Q060"},{"source":"截图题库-网络信息安全-20260628","topic":"公钥密码","stem":"公钥密码相比传统对称密码的一个关键优势应用是？","options":{"A":"可以支持数字签名和更灵活的密钥分发","B":"一定比对称加密速度更快","C":"不需要任何数学基础","D":"只能用于压缩文件"},"answer":"A","explain":"公钥密码支持加密、密钥交换和数字签名，缓解对称密钥分发困难。","id":"IMG-Q061"},{"source":"截图题库-网络信息安全-20260628","topic":"密码学发展","stem":"关于密码体制发展历史，下列描述正确的是？","options":{"A":"现代公钥密码体制缓解了传统对称密码的密钥分发难题","B":"古典密码主要依赖复杂的计算复杂性理论","C":"一次一密在实际中没有任何密钥管理问题","D":"公钥密码要求通信双方永远共享同一个秘密密钥"},"answer":"A","explain":"公钥密码通过公开公钥、保密私钥，为密钥分发和数字签名提供新思路。","id":"IMG-Q062"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"包过滤防火墙主要工作在什么网络层次？","options":{"A":"仅应用层","B":"主要依据网络层和传输层头部字段过滤","C":"仅物理层","D":"仅用户界面层"},"answer":"B","explain":"包过滤通常检查 IP 地址、协议类型、端口号等网络层和传输层字段。","id":"IMG-Q063"},{"source":"截图题库-网络信息安全-20260628","topic":"防火墙","stem":"互联网上的防火墙如何平衡安全与访问需求？","options":{"A":"完全隔离内外网，禁止任何访问","B":"按照安全策略允许合法业务流量，同时阻止未授权或危险流量","C":"允许所有流量，不进行任何过滤","D":"只检查文件名，不检查网络流量"},"answer":"B","explain":"防火墙的目标不是简单断网，而是在业务连通与风险控制之间按策略取舍。","id":"IMG-Q064"},{"source":"截图题库-网络信息安全-20260628","topic":"IPSec/VPN","stem":"公司总部和分支机构需要通过互联网安全连接内部网络，最合适的 IPSec 应用模式是？","options":{"A":"隧道模式","B":"混合模式","C":"明文模式","D":"广播模式"},"answer":"A","explain":"站点到站点 VPN 通常使用 IPSec 隧道模式保护整个内部 IP 数据包。","id":"IMG-Q065"},{"source":"截图题库-网络信息安全-20260628","topic":"恶意代码","stem":"一个程序伪装成正常游戏外挂，诱导用户运行后实施恶意操作，它最可能属于？","options":{"A":"特洛伊木马","B":"防火墙","C":"数字证书","D":"哈希函数"},"answer":"A","explain":"木马常通过伪装成正常程序诱导用户执行。","id":"IMG-Q066"},{"id":"J-Q001","source":"原卷1-密码学与信息安全基础","topic":"密码学基础","type":"tf","stem":"在题目“从密码学概念来看，区分对称密码体制和非对称密码体制的最根本依据是？”中，选项 C“加密和解密操作使用的密钥是否相同”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q001 改写生成。对称密码加解密通常使用同一密钥；非对称密码使用公钥和私钥。"},{"id":"J-Q002","source":"原卷1-密码学与信息安全基础","topic":"密码学基础","type":"tf","stem":"在题目“密码学的安全性主要依赖于？”中，选项 A“加密和解密算法的保密”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q002 改写生成。现代密码遵循 Kerckhoffs 原则：算法可公开，安全性主要依赖密钥保密。"},{"id":"J-Q003","source":"原卷1-密码学与信息安全基础","topic":"密码学发展","type":"tf","stem":"在题目“密码学在哪个阶段被明确地描述为从“艺术”转变为“科学”？”中，选项 B“第二阶段（1949年到1975年）”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q003 改写生成。1949年香农理论奠定现代密码学基础，密码学由经验艺术转向科学。"},{"id":"J-Q004","source":"原卷1-密码学与信息安全基础","topic":"密码学发展","type":"tf","stem":"在题目“古典密码与现代密码的一个核心区别在于？”中，选项 A“古典密码使用数字，现代密码使用字母”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q004 改写生成。现代密码以数学结构、信息论和计算复杂性为基础。"},{"id":"J-Q005","source":"原卷1-密码学与信息安全基础","topic":"古典密码","type":"tf","stem":"在题目“下列哪一项特性最能体现“代替”与“置换”这两种古典加密思想在本质上的区别？”中，选项 C“加密操作的作用对象是信息单元的“身份”还是“位置””是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q005 改写生成。代替改变符号身份，置换改变符号位置。"},{"id":"J-Q006","source":"原卷1-密码学与信息安全基础","topic":"对称密码","type":"tf","stem":"在题目“对称密钥体制最核心的特征是什么？”中，选项 A“加密和解密使用两个不同的密钥”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q006 改写生成。对称密码的核心是通信双方共享同一秘密密钥。"},{"id":"J-Q007","source":"原卷1-密码学与信息安全基础","topic":"对称密码","type":"tf","stem":"在题目“对称密钥体制面临的主要挑战是什么？”中，选项 C“密钥的管理和分发问题”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q007 改写生成。对称密码本身可很强，但密钥安全分发和管理困难。"},{"id":"J-Q008","source":"原卷1-密码学与信息安全基础","topic":"古典密码","type":"tf","stem":"在题目“从密码学的角度来看，凯撒密码最主要的弱点是什么？”中，选项 A“它的密钥空间过大，难以管理。”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q008 改写生成。凯撒密码有效移位数量很少，穷举成本极低。"},{"id":"J-Q009","source":"原卷1-密码学与信息安全基础","topic":"密码系统设计","type":"tf","stem":"在题目“在一个人员流动较大的组织中，使用受限算法会带来什么问题？”中，选项 B“离职人员可能泄露算法细节，导致整个系统需要重新设计”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q009 改写生成。受限算法依赖算法保密，一旦算法泄露就要重构系统。"},{"id":"J-Q010","source":"原卷1-密码学与信息安全基础","topic":"一次一密","type":"tf","stem":"在题目“一次一密在实际应用中最大的局限性或缺点是什么？”中，选项 A“加密和解密的速度非常缓慢，无法用于现代通信。”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q010 改写生成。一次一密要求真随机、等长、一次性密钥，密钥管理极其困难。"},{"id":"J-Q041","source":"原卷2-认证、PKI、访问控制与TLS","topic":"标识与鉴别","type":"tf","stem":"在题目“信息安全中的“标识技术”(Identification) 其主要目的是什么？”中，选项 C“确保实体在系统中的惟一性和可辨认性”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q041 改写生成。标识解决“你是谁”的唯一命名问题。"},{"id":"J-Q042","source":"原卷2-认证、PKI、访问控制与TLS","topic":"标识与鉴别","type":"tf","stem":"在题目“信息安全中的“鉴别技术”(Authentication) 其核心目标是什么？”中，选项 A“为用户分配一个唯一的系统标识符”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q042 改写生成。鉴别验证身份声明是否真实。"},{"id":"J-Q043","source":"原卷2-认证、PKI、访问控制与TLS","topic":"认证机制","type":"tf","stem":"在题目“与直接认证相比，第三方认证的主要优点是什么？”中，选项 B“大大简化了大规模网络中的密钥和信任管理”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q043 改写生成。可信第三方可降低多对多信任和密钥管理复杂度。"},{"id":"J-Q044","source":"原卷2-认证、PKI、访问控制与TLS","topic":"Kerberos","type":"tf","stem":"在题目“Kerberos协议通过引入一个“可信第三方”来集中管理认证，这主要是为了应对以下哪种管理上的挑战？”中，选项 A“降低网络带宽消耗。”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q044 改写生成。Kerberos通过票据实现单点登录。"},{"id":"J-Q045","source":"原卷2-认证、PKI、访问控制与TLS","topic":"Kerberos","type":"tf","stem":"在题目“哲学上，Kerberos的设计遵循“最少披露原则”和“限定信任原则”。以下哪一点最能体现“限定信任原则”？”中，选项 B“服务票据是针对特定服务的，不能用于访问其他服务。”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q045 改写生成。服务票据被限定到特定服务，体现限定信任。"},{"id":"J-Q046","source":"原卷2-认证、PKI、访问控制与TLS","topic":"Kerberos","type":"tf","stem":"在题目“Kerberos协议的核心安全建立在“可信第三方”的概念上。在这个模型中，谁扮演了这个所有参与方都绝对信任的第三方角色？”中，选项 A“域控制器（Domain Controller）”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q046 改写生成。Kerberos中的可信第三方是KDC。"},{"id":"J-Q047","source":"原卷2-认证、PKI、访问控制与TLS","topic":"智能卡","type":"tf","stem":"在题目“智能卡（Smart Card）与普通存储IC卡（如预付费电话卡）最核心的区别是什么？”中，选项 B“智能卡具有微处理器（CPU）和操作系统，能进行数据处理和计算”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q047 改写生成。智能卡可在卡内进行计算和安全处理。"},{"id":"J-Q048","source":"原卷2-认证、PKI、访问控制与TLS","topic":"PKI","type":"tf","stem":"在题目“在整个数字证书信任体系中，根证书最核心的角色是什么？”中，选项 A“为所有网站提供最高强度的加密连接。”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q048 改写生成。根证书是证书链验证的信任锚。"},{"id":"J-Q049","source":"原卷2-认证、PKI、访问控制与TLS","topic":"PKI","type":"tf","stem":"在题目“在数字世界中，通信双方素未谋面，却需要安全地传输机密信息。PKI基础设施最核心的作用是解决了以下哪个根本性问题？”中，选项 C“在非安全信道中建立信任关系并实现安全通信”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q049 改写生成。PKI通过证书绑定身份和公钥，解决陌生实体信任建立。"},{"id":"J-Q050","source":"原卷2-认证、PKI、访问控制与TLS","topic":"PKI","type":"tf","stem":"在题目“在整个证书验证链条中，最终极的信任锚点（Trust Anchor）是什么？”中，选项 A“网站服务器本身的安全配置。”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q050 改写生成。客户端信任库中的根CA证书是最终信任锚。"},{"id":"J-Q081","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线安全","type":"tf","stem":"在题目“WEP协议在设计上存在一个根本性缺陷，导致其容易被破解，这个缺陷主要是什么？”中，选项 B“初始化向量（IV）太短且以明文传输，导致密钥流重用”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q081 改写生成。WEP的IV短且明文传输，容易重复并导致密钥流重用。"},{"id":"J-Q082","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线安全","type":"tf","stem":"在题目“由于WEP协议已被证明极不安全，以下哪个协议是IEEE正式制定的、用于永久替代它的标准？”中，选项 A“WPA”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q082 改写生成。WPA是过渡方案，WPA2对应IEEE 802.11i正式替代WEP。"},{"id":"J-Q083","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"WAPI","type":"tf","stem":"在题目“关于WAPI的国际地位和与IEEE标准的关系，以下描述正确的是？”中，选项 B“WAPI是中国提出的自主知识产权标准，与IEEE 802.11系列标准并行，主要在中国强制推行。”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q083 改写生成。WAPI是中国提出的无线局域网安全标准，与802.11i体系不同。"},{"id":"J-Q084","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"WAPI","type":"tf","stem":"在题目“WAPI著名的“三元架构”（STA-AP-ASU）体现了怎样的设计理念？”中，选项 B“去中心化理念：消除所有中心节点以增强网络的鲁棒性和抗摧毁能力”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q084 改写生成。WAPI通过ASU作为认证服务单元实现基于证书的双向认证。"},{"id":"J-Q085","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线安全","type":"tf","stem":"在题目“关于无线接入点，面临的主要安全威胁是什么？”中，选项 B“网络的未认证入侵”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q085 改写生成。无线介质开放，主要威胁是未授权接入和伪装接入。"},{"id":"J-Q086","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线规划","type":"tf","stem":"在题目“网络管理员发现公司无线网络附近存在大量未知的竞争信号。他可以采取以下哪项措施来优化自身无线环境？”中，选项 A“开启标识符广播以增强信号”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q086 改写生成。竞争信号问题应通过勘测、信道规划和功率控制处理。"},{"id":"J-Q087","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"WAPI","type":"tf","stem":"在题目“WAPI规范的设计哲学总体上反映了怎样的网络安全观？”中，选项 C“网络安全必须是内置的、基于硬件的、由协议本身基础结构保证的根本属性”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q087 改写生成。WAPI强调内生安全、双向认证和协议基础结构安全。"},{"id":"J-Q088","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线安全标准","type":"tf","stem":"在题目“在无线网络安全规范中有IEEE802.11i和WAPI两种规范，两者最根本的设计哲学分歧体现在对网络安全基石的抉择上，即：”中，选项 A“使用流密码还是分组密码”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q088 改写生成。该题考查共享密钥/数字身份认证路线差异。"},{"id":"J-Q089","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线安全标准","type":"tf","stem":"在题目“无线网络安全标准IEEE802.11i和WAPI在设计目标上存在显著差异，这最终导致了不同的应用场景。其中：”中，选项 A“IEEE 802.11i致力于打造一个全球通用的、平衡安全与部署便利性的标准；WAPI旨在构建一个由强身份认证驱动的、可控的安全体系”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"A","explain":"由选择题 Q089 改写生成。802.11i强调全球通用与便利，WAPI强调强身份认证和可控安全。"},{"id":"J-Q090","source":"原卷3-无线安全、IPSec、防火墙与恶意代码","topic":"无线安全","type":"tf","stem":"在题目“RSN（强健安全网络）的核心目标是什么？”中，选项 A“提高无线网络的传输速率和带宽”是正确答案。","options":{"A":"正确","B":"错误"},"answer":"B","explain":"由选择题 Q090 改写生成。RSN是802.11i提出的强健安全网络，用于替代WEP。"}];
const LS='netsec_practice_v1';let state=JSON.parse(localStorage.getItem(LS)||'{}');if(!state.done)state={done:{},wrong:{},answerOverride:{},exam:null};
let mode='learn', pool=[], idx=0, answered=false, examAnswers={};
function save(){localStorage.setItem(LS,JSON.stringify(state));renderStats();}
function ansOf(q){return state.answerOverride[q.id]||q.answer}
function uniq(a){return [...new Set(a)].sort()}
function optionKeys(q){return Object.keys(q.options||{}).filter(k=>q.options[k]!==undefined&&q.options[k]!==null&&q.options[k]!=="")}
function byId(id){return QUESTIONS.find(q=>q.id===id)}
function initControls(){let s=document.getElementById('source');s.innerHTML='<option value="all">全部题库</option>'+uniq(QUESTIONS.map(q=>q.source)).map(x=>`<option>${x}</option>`).join('');let t=document.getElementById('topic');t.innerHTML='<option value="all">全部专题</option>'+uniq(QUESTIONS.map(q=>q.topic)).map(x=>`<option>${x}</option>`).join('');document.getElementById('count').max=QUESTIONS.length;}
function getFiltered(){let src=document.getElementById('source').value,tp=document.getElementById('topic').value,kw=document.getElementById('kw').value.trim().toLowerCase();let arr=QUESTIONS.filter(q=>(src==='all'||q.source===src)&&(tp==='all'||q.topic===tp));if(kw)arr=arr.filter(q=>(q.id+q.source+q.topic+q.stem+Object.values(q.options||{}).join('')+q.explain).toLowerCase().includes(kw));if(document.getElementById('order').value==='wrong')arr=arr.filter(q=>state.wrong[q.id]);return arr;}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function buildExamPool(arr){let order=document.getElementById('order').value,want=Number(document.getElementById('count').value)||40;let tfs=arr.filter(q=>q.type==='tf'),singles=arr.filter(q=>q.type!=='tf');if(order==='shuffle'){tfs=shuffle(tfs);singles=shuffle(singles)}let tfN=want>=40?10:Math.min(tfs.length,Math.floor(want/4));let singleN=Math.min(singles.length,want-tfN);let picked=singles.slice(0,singleN).concat(tfs.slice(0,Math.min(tfN,tfs.length)));if(picked.length<want)picked=picked.concat(arr.filter(q=>!picked.includes(q)).slice(0,want-picked.length));return order==='shuffle'?shuffle(picked):picked;}
function applyFilter(){let arr=getFiltered();let n=Math.min(Number(document.getElementById('count').value)||arr.length,arr.length);pool=mode==='exam'?buildExamPool(arr):(document.getElementById('order').value==='shuffle'?shuffle(arr).slice(0,n):arr.slice(0,n));idx=0;answered=false;examAnswers={};renderMode();}
function setMode(m){mode=m;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));[...document.querySelectorAll('.tab')].find(b=>b.textContent.includes({learn:'学习',exam:'模拟',browse:'浏览',wrong:'错题',review:'复习'}[m])).classList.add('active');['learn','exam','browse','wrong','review'].forEach(id=>document.getElementById(id).classList.toggle('hidden',id!==m));if(m==='exam'){pool=buildExamPool(getFiltered());idx=0;answered=false;examAnswers={};}renderMode();}
function optNote(q,k){return k===ansOf(q)?'正确。'+q.explain:'错误。该选项没有命中本题考点。本题考点：'+q.explain;}
function optionHtml(q,k,selected,show){let cls='option';if(show){if(k===ansOf(q))cls+=' correct'; if(selected===k&&k!==ansOf(q))cls+=' wrong';}return `<div class="${cls}" onclick="choose('${q.id}','${k}')"><div class="key">${k}.</div><div class="txt">${escapeHtml(q.options[k])}${show?`<div class="optExplain ${k===ansOf(q)?'correctText':'wrongText'}">解析：${escapeHtml(optNote(q,k))}</div>`:''}</div></div>`}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function qCard(q,selected=null,show=false){return `<div class="qhead"><div><span class="badge">${q.id}</span><span class="badge badge2">${escapeHtml(q.source)}</span><span class="badge">${escapeHtml(q.topic)}</span></div><div class="small">校准答案：${ansOf(q)} / 原答案：${q.answer}</div></div><div class="stem">${escapeHtml(q.stem)}</div>${optionKeys(q).map(k=>optionHtml(q,k,selected,show)).join('')}${show?`<div class="explain"><b>答案：${ansOf(q)}</b><br>${escapeHtml(q.explain)}<br><span class="small">Alt + 点击某个选项可把该题答案临时校准为该选项，按老师口径修正时用。</span></div>`:''}`}
function choose(id,k){let q=byId(id); if(event&&event.altKey){state.answerOverride[id]=k;save();renderMode();return} if(mode==='learn'){answered=true;let ok=k===ansOf(q);state.done[id]=true;if(!ok)state.wrong[id]=k;else delete state.wrong[id];save();document.getElementById('learn').innerHTML=learnHtml(k,true);}}
function learnHtml(selected=null,show=false){if(!pool.length)return '<p>没有匹配题目。调整筛选条件后点“应用筛选”。</p>';let q=pool[idx];return qCard(q,selected,show)+`<div class="row"><button class="secondary" onclick="idx=Math.max(0,idx-1);answered=false;renderLearn()">上一题</button><button onclick="idx=Math.min(pool.length-1,idx+1);answered=false;renderLearn()">下一题</button><button class="ghost" onclick="answered=true;document.getElementById('learn').innerHTML=learnHtml(null,true)">显示答案</button><button class="ghost" onclick="idx=Math.floor(Math.random()*pool.length);answered=false;renderLearn()">随机一题</button><span class="small">进度：${idx+1} / ${pool.length}</span></div>`}
function renderLearn(){document.getElementById('learn').innerHTML=learnHtml(null,false)}
function renderExam(){if(!pool.length)applyFilter();let html=`<h2>模拟考试</h2><p class="muted">当前试卷 ${pool.length} 题。选择后不会立即显示答案，交卷后显示得分、错题和解析。</p>`;pool.forEach((q,i)=>{html+=`<div class="listItem"><b>${i+1}. ${escapeHtml(q.stem)}</b>`;optionKeys(q).forEach(k=>{html+=`<label class="option"><input style="width:auto" type="radio" name="${q.id}" value="${k}" onchange="examAnswers['${q.id}']='${k}'"> <b>${k}.</b> ${escapeHtml(q.options[k])}</label>`});html+='</div>'});html+=`<button class="ok" onclick="submitExam()">交卷</button><div id="examResult"></div>`;document.getElementById('exam').innerHTML=html;}
function submitExam(){let correct=0, wrong=[];pool.forEach(q=>{let a=examAnswers[q.id];if(a===ansOf(q)){correct++;state.done[q.id]=true;delete state.wrong[q.id];}else{wrong.push([q,a||'未答']);state.wrong[q.id]=a||'未答';}});save();let html=`<div class="explain"><h2>成绩：${correct} / ${pool.length}，正确率 ${pool.length?Math.round(correct*100/pool.length):0}%</h2></div>`;if(wrong.length)html+='<h3>错题解析</h3>'+wrong.map(([q,a])=>`<div class="listItem"><p><b>${q.id}</b> 你的答案：<span class="wrongText">${a}</span>，正确答案：<span class="correctText">${ansOf(q)}</span></p>${qCard(q,a,true)}</div>`).join('');else html+='<p class="correctText">本次无错题。</p>';document.getElementById('examResult').innerHTML=html;}
function renderBrowse(){let arr=getFiltered();document.getElementById('browse').innerHTML=`<h2>题库浏览</h2><p class="muted">共 ${arr.length} 题。点击“显示解析”查看。</p>`+arr.map(q=>`<details class="listItem"><summary><b>${q.id}</b> [${escapeHtml(q.topic)}] ${escapeHtml(q.stem)}</summary>${qCard(q,null,true)}</details>`).join('')}
function renderWrong(){let arr=Object.keys(state.wrong).map(byId).filter(Boolean);document.getElementById('wrong').innerHTML=`<h2>错题本</h2><p class="muted">当前 ${arr.length} 题。</p>`+(arr.length?arr.map(q=>`<div class="listItem">${qCard(q,state.wrong[q.id],true)}<button class="ok" onclick="delete state.wrong['${q.id}'];save();renderWrong()">标记已掌握</button></div>`).join(''):'<p>暂无错题。</p>')}
function renderReview(){document.getElementById('review').innerHTML=`<h2>复习要点</h2>
<div class="explain"><h3>考试结构</h3><p><b>单选题 30 道：</b>从三次测试中的 150 道单选中抽取。</p><p><b>判断题 10 道：</b>从三次测试中的 150 道单选中抽取 10 道改写。</p><p><b>简答题 4 或 5 道：</b>以老师在书中划出的题目为主。</p><p><b>论述/问题 2 道：</b>来自课堂交流过的论述问题。</p><p><b>编程题 1 道：</b>从前四次实验中抽选，重点是能写出核心流程和解释。</p></div>
<div class="listItem"><b>实验1：密码学基础实验 - Caesar 加密</b><p>目标：掌握 Caesar 加密基本思想，能用 Python 实现加密/解密，理解暴力破解。</p><p>重点：移位代换、密钥空间小、穷举攻击、命令行参数 <code>-e/-d/-b/-k/-i/-o</code> 的处理。</p></div>
<div class="listItem"><b>实验2：单表、多表、乘积加密</b><p>目标：理解 Playfair、Vigenere、ADFGX 的原理，能用 Python/Java 实现在线加解密工具。</p><p>重点：Playfair 双字母处理、Vigenere 周期密钥、ADFGX 的替换与置换组合，以及 Web 页面输入明文/密文/密钥并显示结果。</p></div>
<div class="listItem"><b>实验3：基于 RC4 的流加密</b><p>目标：理解 RC4 的 KSA/PRGA 思路，能完成对数据文件的流加密和解密。</p><p>重点：密钥调度、伪随机密钥流、明文与密钥流异或、同一密钥流重复使用的风险。</p></div>
<div class="listItem"><b>实验4：分组加密实验</b><p>目标：掌握 ECB 与 CBC 两种分组加密模式，并能写出文件加解密工具。</p><p>重点：ECB 泄露明文模式；CBC 使用 IV 和链式异或；加密/解密核心代码、流程图和结果截图说明。</p></div>
<div class="listItem"><b>1-3章：</b>CIA安全目标；主动/被动攻击；散列函数性质；SPN的S盒/P盒、混淆与扩散；单表/多表替换；流加密；对称/公钥体制；混合加密/PGP；数字签名生成与验证。</div><div class="listItem"><b>4-6章：</b>Kerberos票据机制；PKI/CA/RA/证书链；证书验证流程；ACL与CL；EAP；802.1X；TLS与SSH。</div><div class="listItem"><b>剩余章节：</b>WEP/WPA/WAPI；S/MIME与PGP；IPSec传输/隧道模式；包过滤/状态检测防火墙；DMZ与防火墙模型；IDS/IPS；蜜罐/蜜网；恶意软件分类。</div><div class="explain">建议训练顺序：先刷单选，再刷判断；实验题按“原理、核心代码/流程、运行结果、风险或优缺点”四段准备。若老师PPT答案与通用口径不同，用 Alt+点击选项做本地答案校准。</div>`}
function renderStats(){let total=QUESTIONS.length, done=Object.keys(state.done).length, wrong=Object.keys(state.wrong).length;let srcs=uniq(QUESTIONS.map(q=>q.source)).length, topics=uniq(QUESTIONS.map(q=>q.topic)).length;document.getElementById('stats').innerHTML=`<div class="stat"><div class="muted">总题数</div><b>${total}</b></div><div class="stat"><div class="muted">已练</div><b>${done}</b></div><div class="stat"><div class="muted">错题</div><b>${wrong}</b></div><div class="stat"><div class="muted">题库/专题</div><b>${srcs}/${topics}</b></div>`}
window.studyHubPracticeStats=()=>{let total=QUESTIONS.length, done=Object.keys(state.done||{}).length, wrong=Object.keys(state.wrong||{}).length;let srcs=uniq(QUESTIONS.map(q=>q.source)).length, topics=uniq(QUESTIONS.map(q=>q.topic)).length;return {total,done,wrong,extraLabel:'题库/专题',extraValue:`${srcs}/${topics}`};};
function practiceQuestionType(q){return q.type==='tf'?'judge':'choice'}
window.studyHubPracticeNav=()=>mode==='learn'&&pool.length?{mode:'study',title:'答题卡',current:idx+1,items:pool.map((q,i)=>({id:q.id,index:i+1,label:String(i+1),type:practiceQuestionType(q),done:Boolean(state.done[q.id]),wrong:Boolean(state.wrong[q.id])})),jump(index){idx=Math.max(0,Math.min(index-1,pool.length-1));answered=false;renderLearn();window.scrollTo(0,0);}}:null;
function renderMode(){if(mode==='learn')renderLearn();if(mode==='exam')renderExam();if(mode==='browse')renderBrowse();if(mode==='wrong')renderWrong();if(mode==='review')renderReview();}
initControls();applyFilter();renderStats();
</script></body></html>
