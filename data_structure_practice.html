<style>
:root { --bg:#f6f7fb; --card:#fff; --text:#111827; --muted:#6b7280; --line:#e5e7eb; --primary:#2563eb; --green:#16a34a; --red:#dc2626; --amber:#d97706; }
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',Arial,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}

main{max-width:1180px;margin:0 auto;padding:18px;display:grid;grid-template-columns:270px 1fr;gap:18px}
.sidebar{position:sticky;top:76px;align-self:start;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
.stat{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0} .stat div{background:#f9fafb;border:1px solid var(--line);border-radius:10px;padding:10px}

.controls{display:grid;gap:10px} select,input{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:#fff} textarea{width:100%;min-height:110px;padding:10px;border:1px solid var(--line);border-radius:10px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px} .tabs button{background:#fff;color:#111827;border:1px solid var(--line)} .tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px} .pill{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3} .pill.gray{background:#f3f4f6;color:#4b5563} .pill.green{background:#dcfce7;color:#166534} .pill.amber{background:#fef3c7;color:#92400e}
.q-title{font-size:17px;line-height:1.55;margin:6px 0 12px;white-space:pre-wrap}
.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:8px 0;background:#fff;cursor:pointer}
.option input{width:auto;margin-top:3px} .option.correct{border-color:#86efac;background:#f0fdf4} .option.wrong{border-color:#fca5a5;background:#fef2f2} .label{font-weight:700;min-width:22px}
.explain{border-top:1px solid var(--line);margin-top:12px;padding-top:12px;display:none} .explain.show{display:block}
.explain .row{padding:8px 10px;border-radius:10px;background:#f9fafb;margin:6px 0;line-height:1.55}
.footer-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.result{font-size:16px;line-height:1.7} .result strong{font-size:22px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.code{white-space:pre-wrap;font-family:Consolas,'Courier New',monospace;background:#111827;color:#e5e7eb;border-radius:12px;padding:12px;line-height:1.45;overflow:auto}
.hidden{display:none!important}
.badge-red{color:var(--red);font-weight:700} .badge-green{color:var(--green);font-weight:700}

</style>

ions":[],"answer":["数据域","指针域"],"explanations":[{"label":"参考答案","text":"数据域；指针域"}],"tags":["第二章 线性表","fill"],"difficulty":"基础"},{"id":"第二章 线性表-14","source":"原题","chapter":"第二章 线性表","type":"fill","title":"顺序表中，逻辑上相邻的元素在物理存储位置上也是____的;链表中，逻辑上相邻的元素在物理存储位置上____。","options":[],"answer":["相邻","不一定相邻(或可以任意)"],"explanations":[{"label":"参考答案","text":"相邻；不一定相邻(或可以任意)"}],"tags":["第二章 线性表","fill"],"difficulty":"基础"},{"id":"第二章 线性表-15","source":"原题","chapter":"第二章 线性表","type":"fill","title":"线性表中数据元素的个数称为线性表的______，当n=0时称为______。","options":[],"answer":["长度","空表"],"explanations":[{"label":"参考答案","text":"长度；空表"}],"tags":["第二章 线性表","fill"],"difficulty":"基础"},{"id":"第二章 线性表-16","source":"原题","chapter":"第二章 线性表","type":"fill","title":"两个长度为n的有序顺序表合并成一个有序顺序表，最坏情况下的时间复杂度为____。","options":[],"answer":["O(n)"],"explanations":[{"label":"参考答案","text":"O(n)"}],"tags":["第二章 线性表","fill"],"difficulty":"基础"},{"id":"第二章 线性表-17","source":"原题","chapter":"第二章 线性表","type":"fill","title":"对于顺序存储的线性表，访问任意位置元素的时间复杂度为____;对于链式存储的线性表，访问任意位置元素的时间复杂度为____。","options":[],"answer":["O(1)","O(n)"],"explanations":[{"label":"参考答案","text":"O(1)；O(n)"}],"tags":["第二章 线性表","fill"],"difficulty":"基础"},{"id":"第二章 线性表-18","source":"原题","chapter":"第二章 线性表","type":"fill","title":"静态链表是用____来描述链式存储结构，其游标指示的是____。","options":[],"answer":["数组","数组下标(或游标)"],"explanations":[{"label":"参考答案","text":"数组；数组下标(或游标)"}],"tags":["第二章 线性表","fill"],"difficulty":"基础"},{"id":"第二章 线性表-19","source":"原题","chapter":"第二章 线性表","type":"fill","title":"在长度为n的顺序表中，删除第i个元素(1≤i≤n)需要移动____个元素。","options":[],"answer":["n-i"],"explanations":[{"label":"参考答案","text":"n-i"}],"tags":["第二章 线性表","fill"],"difficulty":"基础"},{"id":"第二章 线性表-20","source":"原题","chapter":"第二章 线性表","type":"fill","title":"在循环链表中，尾结点的next指针指向____。","options":[],"answer":["头结点(或第一个结点)"],"explanations":[{"label":"参考答案","text":"头结点(或第一个结点)"}],"tags":["第二章 线性表","fill"],"difficulty":"基础"},{"id":"第二章 线性表-31","source":"原题","chapter":"第二章 线性表","type":"short","title":"什么是循环链表?它有什么优点?","options":[],"answer":"循环链表是最后一个结点的指针指向头结点(或第一个结点)的链表。优点是从任意结点出发都能遍历整个链表。","explanations":[{"label":"参考答案","text":"循环链表是最后一个结点的指针指向头结点(或第一个结点)的链表。优点是从任意结点出发都能遍历整个链表。"}],"tags":["第二章 线性表","short"],"difficulty":"中等"},{"id":"第二章 线性表-32","source":"原题","chapter":"第二章 线性表","type":"short","title":"给定一个单链表，如何判断它是否有环?请简述方法。","options":[],"answer":"快慢指针法:设置两个指针，慢指针每次一步，快指针每次两步，若相遇则有环，若快指针到达NULL则无环。","explanations":[{"label":"参考答案","text":"快慢指针法:设置两个指针，慢指针每次一步，快指针每次两步，若相遇则有环，若快指针到达NULL则无环。"}],"tags":["第二章 线性表","short"],"difficulty":"中等"},{"id":"第二章 线性表-33","source":"原题","chapter":"第二章 线性表","type":"short","title":"对于一个长度为n的顺序表，写出在第i个位置插入一个元素的时间复杂度分析过程。","options":[],"answer":"在第i个位置插入需将第i到第n个元素后移，共移动n-i+1个元素。平均移动次数为n/2，时间复杂度O(n)。","explanations":[{"label":"参考答案","text":"在第i个位置插入需将第i到第n个元素后移，共移动n-i+1个元素。平均移动次数为n/2，时间复杂度O(n)。"}],"tags":["第二章 线性表","short"],"difficulty":"中等"},{"id":"第二章 线性表-34","source":"原题","chapter":"第二章 线性表","type":"short","title":"解释头结点的作用，并说明带头结点的单链表与不带头结点的单链表在插入和删除操作上的区别。","options":[],"answer":"头结点是在第一个结点之前附加的一个结点，其数据域可以不存储信息。作用:使在第一个位置上的插入删除操作与其他位置一致，无需特殊处理。不带头的链表在操作首结点时需要修改头指针。","explanations":[{"label":"参考答案","text":"头结点是在第一个结点之前附加的一个结点，其数据域可以不存储信息。作用:使在第一个位置上的插入删除操作与其他位置一致，无需特殊处理。不带头的链表在操作首结点时需要修改头指针。"}],"tags":["第二章 线性表","short"],"difficulty":"中等"},{"id":"第二章 线性表-35","source":"原题","chapter":"第二章 线性表","type":"short","title":"比较顺序存储结构和链式存储结构的主要优缺点。","options":[],"answer":"顺序存储:优点是可随机存取、存储密度高;缺点是插入删除需移动大量元素，存储空间固定不易扩充。链式存储:优点是插入删除方便，空间动态分配;缺点是存储密度低，只能顺序存取。","explanations":[{"label":"参考答案","text":"顺序存储:优点是可随机存取、存储密度高;缺点是插入删除需移动大量元素，存储空间固定不易扩充。链式存储:优点是插入删除方便，空间动态分配;缺点是存储密度低，只能顺序存取。"}],"tags":["第二章 线性表","short"],"difficulty":"中等"},{"id":"第二章 线性表-36","source":"原题","chapter":"第二章 线性表","type":"short","title":"在单链表中，每个结点包含两个域:和。","options":[],"answer":"数据域;指针域","explanations":[{"label":"参考答案","text":"数据域;指针域"}],"tags":["第二章 线性表","short"],"difficulty":"中等"},{"id":"第三章 栈与队列-1","source":"原题","chapter":"第三章 栈与队列","type":"single","title":"下列关于栈的叙述中，正确的是(   )","options":[{"la ，输出序列的第一个元素为i，则第j个输出元素____(填“一定”或“不一定”)为i+j-1。","options":[],"answer":["不一定"],"explanations":[{"label":"参考答案","text":"不一定"}],"tags":["第三章 栈与队列","fill"],"difficulty":"基础"},{"id":"第三章 栈与队列-22","source":"原题","chapter":"第三章 栈与队列","type":"fill","title":"若用不带头结点的单链表表示链队列，则队头指针front指向____，队尾指针rear指向____。","options":[],"answer":["第一个结点","最后一个结点"],"explanations":[{"label":"参考答案","text":"第一个结点；最后一个结点"}],"tags":["第三章 栈与队列","fill"],"difficulty":"基础"},{"id":"第三章 栈与队列-23","source":"原题","chapter":"第三章 栈与队列","type":"fill","title":"栈是限定仅在____进行插入和删除操作的线性表。","options":[],"answer":["表尾"],"explanations":[{"label":"参考答案","text":"表尾"}],"tags":["第三章 栈与队列","fill"],"difficulty":"基础"},{"id":"第三章 栈与队列-24","source":"原题","chapter":"第三章 栈与队列","type":"fill","title":"循环队列中，用数组Q[0..m-1]存储元素，设front指向队头元素的前一个位置，rear指向队尾元素，则队列中元素个数的计算公式为____。","options":[],"answer":["(rear - front + m) % m"],"explanations":[{"label":"参考答案","text":"(rear - front + m) % m"}],"tags":["第三章 栈与队列","fill"],"difficulty":"基础"},{"id":"第三章 栈与队列-25","source":"原题","chapter":"第三章 栈与队列","type":"fill","title":"链栈的入栈操作(不带头结点)中，若栈顶指针为top，新结点为s，则执行____和____。","options":[],"answer":["s->next = top","top = s"],"explanations":[{"label":"参考答案","text":"s->next = top；top = s"}],"tags":["第三章 栈与队列","fill"],"difficulty":"基础"},{"id":"第三章 栈与队列-26","source":"原题","chapter":"第三章 栈与队列","type":"fill","title":"队列是限定在____进行插入，在____进行删除的线性表。","options":[],"answer":["队尾","队头"],"explanations":[{"label":"参考答案","text":"队尾；队头"}],"tags":["第三章 栈与队列","fill"],"difficulty":"基础"},{"id":"第三章 栈与队列-27","source":"原题","chapter":"第三章 栈与队列","type":"fill","title":"在表达式求值中，中缀表达式转换为后缀表达式时需要用到____栈，计算后缀表达式时需要用到____栈。","options":[],"answer":["运算符","操作数"],"explanations":[{"label":"参考答案","text":"运算符；操作数"}],"tags":["第三章 栈与队列","fill"],"difficulty":"基础"},{"id":"第三章 栈与队列-38","source":"原题","chapter":"第三章 栈与队列","type":"short","title":"什么是循环队列?为什么要引入循环队列?","options":[],"answer":"循环队列是将顺序队列的存储空间在逻辑上视为一个环，即当队尾指针到达数组末尾时，若队头前有空闲空间，则队尾指针可以循环到数组开头。引入循环队列的目的是解决顺序队列中“假溢出”问题(即队头仍有空间但队尾已到数组末尾，无法继续入队)。","explanations":[{"label":"参考答案","text":"循环队列是将顺序队列的存储空间在逻辑上视为一个环，即当队尾指针到达数组末尾时，若队头前有空闲空间，则队尾指针可以循环到数组开头。引入循环队列的目的是解决顺序队列中“假溢出”问题(即队头仍有空间但队尾已到数组末尾，无法继续入队)。"}],"tags":["第三章 栈与队列","short"],"difficulty":"中等"},{"id":"第三章 栈与队列-39","source":"原题","chapter":"第三章 栈与队列","type":"short","title":"如何判断一个字符序列是否是回文(正反读相同)?请说明利用栈和队列的算法思路。","options":[],"answer":"将字符序列依次压入栈中，同时依次入队。然后依次从栈中弹出字符和从队列中取出字符进行比较。若所有字符均相等，则是回文;否则不是。这里栈提供了逆序，队列提供了原序，通过比较二者实现。","explanations":[{"label":"参考答案","text":"将字符序列依次压入栈中，同时依次入队。然后依次从栈中弹出字符和从队列中取出字符进行比较。若所有字符均相等，则是回文;否则不是。这里栈提供了逆序，队列提供了原序，通过比较二者实现。"}],"tags":["第三章 栈与队列","short"],"difficulty":"中等"},{"id":"第三章 栈与队列-40","source":"原题","chapter":"第三章 栈与队列","type":"short","title":"若输入序列为1,2,3，经过栈后输出序列为3,2,1，则栈的容量至少为3。","options":[],"answer":"对-","explanations":[{"label":"参考答案","text":"对-"}],"tags":["第三章 栈与队列","short"],"difficulty":"中等"},{"id":"第四章 稀疏矩阵与广义表-1","source":"原题","chapter":"第四章 稀疏矩阵与广义表","type":"single","title":"稀疏矩阵一般采用(   )进行压缩存储。","options":[{"label":"A","text":"链式存储"},{"label":"B","text":"顺序存储"},{"label":"C","text":"二维数组"},{"label":"D","text":"三元组表"}],"answer":"D","explanations":[{"label":"A","text":"错误：链式存储 与本题考点不符，或混淆了相近概念。"},{"label":"B","text":"错误：顺序存储 与本题考点不符，或混淆了相近概念。"},{"label":"C","text":"错误：二维数组 与本题考点不符，或混淆了相近概念。"},{"label":"D","text":"正确：三元组表 是本题对应概念或操作。"}],"tags":["第四章 稀疏矩阵与广义表","single"],"difficulty":"基础"},{"id":"第四章 稀疏矩阵与广义表-2","source":"原题","chapter":"第四章 稀疏矩阵与广义表","type":"single","title":"广义表 (a,(b,c),d) 的表头是(   )","options":[{"label":"A","text":"(a,(b,c),d)"},{"label":"B","text":"a"},{"label":"C","text":"(b,c)"},{"label":"D","text":"(a)"}],"answer":"B","explanations":[{"label":"A","text":"错误：(a,(b,c),d) 与本题考点不符，或混淆了相近概念。"},{"label":"B","text":"正确：a 是本题对应概念或操作。"},{"label":"C","text":"错误：(b,c) 与本题考点不符，或混淆了相近概念。"},{"label":"D","text":"错误：(a) 与本题考点不符，或混淆了相近概念。"}],"tags":["第四章 稀疏矩阵与广义表","single"],"difficulty":"基础"},{"id":"第四章 稀疏矩阵与广义表-3","source":"原题","chapter":"第四章 稀疏矩阵与广义表","type":"single","title":"稀疏矩阵采用三元组表存储后，其矩阵加法运算的时间复杂度 置后的行序)插入到新三元组表中。由于每次都要寻找合适位置，通常采用按列优先扫描原表的方法。时间复杂度为O(m×n)，其中m、n为行、列数。"}],"tags":["第四章 稀疏矩阵与广义表","short"],"difficulty":"中等"},{"id":"第四章 稀疏矩阵与广义表-34","source":"原题","chapter":"第四章 稀疏矩阵与广义表","type":"short","title":"什么是稀疏矩阵?为什么要对稀疏矩阵进行压缩存储?","options":[],"answer":"稀疏矩阵是指非零元个数远少于零元个数的矩阵。压缩存储可以节省存储空间，避免存储大量零元素，同时某些运算(如加法、转置)可以只处理非零元，提高效率。","explanations":[{"label":"参考答案","text":"稀疏矩阵是指非零元个数远少于零元个数的矩阵。压缩存储可以节省存储空间，避免存储大量零元素，同时某些运算(如加法、转置)可以只处理非零元，提高效率。"}],"tags":["第四章 稀疏矩阵与广义表","short"],"difficulty":"中等"},{"id":"第四章 稀疏矩阵与广义表-35","source":"原题","chapter":"第四章 稀疏矩阵与广义表","type":"short","title":"什么是广义表?广义表与线性表有何联系与区别?","options":[],"answer":"广义表是线性表的推广，其元素可以是原子(单个数据元素)也可以是子表(广义表)。线性表是广义表的特例(所有元素均为原子)。区别:广义表允许元素为表，具有递归结构;线性表元素是原子。","explanations":[{"label":"参考答案","text":"广义表是线性表的推广，其元素可以是原子(单个数据元素)也可以是子表(广义表)。线性表是广义表的特例(所有元素均为原子)。区别:广义表允许元素为表，具有递归结构;线性表元素是原子。"}],"tags":["第四章 稀疏矩阵与广义表","short"],"difficulty":"中等"},{"id":"DS-DOCX-01","source":"原题","chapter":"图","type":"short","title":"简述Dijkstra算法求单源最短路径的基本思想，以及它为什么不能处理负权边。","options":[],"answer":"Dijkstra算法从源点开始，维护已确定最短距离的顶点集合和未确定集合。每次选择当前距离最小的未确定顶点加入确定集合，并用该顶点的出边松弛相邻顶点距离。它依赖“当前最小距离一旦确定就不会再变”的贪心性质；负权边可能在后续通过负权路径把已确定顶点的距离降低，因此该性质失效，不能正确处理负权边。","explanations":[{"label":"参考答案","text":"Dijkstra算法从源点开始，维护已确定最短距离的顶点集合和未确定集合。每次选择当前距离最小的未确定顶点加入确定集合，并用该顶点的出边松弛相邻顶点距离。它依赖“当前最小距离一旦确定就不会再变”的贪心性质；负权边可能在后续通过负权路径把已确定顶点的距离降低，因此该性质失效，不能正确处理负权边。"}],"tags":["图","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-02","source":"原题","chapter":"排序","type":"short","title":"简述排序算法中“内部排序”与“外部排序”的区别。","options":[],"answer":"内部排序是指待排序数据量能够全部装入内存，排序过程主要在内存中完成，如直接插入排序、快速排序、堆排序、归并排序等。外部排序用于数据量大于内存容量的场景，需要借助磁盘等外存，核心开销是外存读写，常见方法是多路归并排序。","explanations":[{"label":"参考答案","text":"内部排序是指待排序数据量能够全部装入内存，排序过程主要在内存中完成，如直接插入排序、快速排序、堆排序、归并排序等。外部排序用于数据量大于内存容量的场景，需要借助磁盘等外存，核心开销是外存读写，常见方法是多路归并排序。"}],"tags":["排序","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-03","source":"原题","chapter":"树与二叉树","type":"short","title":"简述二叉排序树的定义、核心特性，以及其在数据查找中的优势。","options":[],"answer":"二叉排序树也称二叉搜索树。对任一结点，其左子树所有结点关键字小于该结点关键字，右子树所有结点关键字大于该结点关键字，左右子树也分别是二叉排序树。中序遍历可得到有序序列；查找时每次根据比较结果只进入一侧子树，平均时间复杂度为O(log n)，但退化成单链时最坏为O(n)。","explanations":[{"label":"参考答案","text":"二叉排序树也称二叉搜索树。对任一结点，其左子树所有结点关键字小于该结点关键字，右子树所有结点关键字大于该结点关键字，左右子树也分别是二叉排序树。中序遍历可得到有序序列；查找时每次根据比较结果只进入一侧子树，平均时间复杂度为O(log n)，但退化成单链时最坏为O(n)。"}],"tags":["树与二叉树","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-04","source":"原题","chapter":"树与二叉树","type":"short","title":"简述完全二叉树和满二叉树的区别，以及完全二叉树的存储优势。","options":[],"answer":"满二叉树是每一层结点数都达到最大值的二叉树，若深度为k，则共有2^k-1个结点。完全二叉树除最后一层外各层都满，最后一层结点从左到右连续排列。完全二叉树适合顺序存储，父子结点下标可直接计算，空间利用率高，堆就是典型应用。","explanations":[{"label":"参考答案","text":"满二叉树是每一层结点数都达到最大值的二叉树，若深度为k，则共有2^k-1个结点。完全二叉树除最后一层外各层都满，最后一层结点从左到右连续排列。完全二叉树适合顺序存储，父子结点下标可直接计算，空间利用率高，堆就是典型应用。"}],"tags":["树与二叉树","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-05","source":"原题","chapter":"串","type":"short","title":"简述串的两种基本存储方式（定长顺序存储和堆分配存储）的区别。","options":[],"answer":"定长顺序存储使用固定长度数组保存字符，结构简单、访问快，但最大长度固定，容易截断或浪费空间。堆分配存储在运行时按串长动态申请空间，长度更灵活、空间利用较好，但需要额外的动态内存管理。","explanations":[{"label":"参考答案","text":"定长顺序存储使用固定长度数组保存字符，结构简单、访问快，但最大长度固定，容易截断或浪费空间。堆分配存储在运行时按串长动态申请空间，长度更灵活、空间利用较好，但需要额外的动态内存管理。"}],"tags":["串","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-06","source":"原题","chapter":"树与二叉树","type":"short","title":"简述线索二叉树的基本概念，以及引入线索二叉树的目的与应用价值。","options":[],"answer":"线索二叉树利用二叉链表中的空指针域存放遍历序列中前驱或后继结点的线索，并用标志位区分孩子指针和线索。引入线索的目的是提高遍历效率，使某些遍历可在不使用递归栈或辅助栈的情况下找到前驱、后继，适合频繁遍历但结构较少变化的二叉树。","explanations":[{"label":"参考答案","text":"线索二叉树利用二叉链表中的空指针域存放遍历序列中前驱或后继结点的线索，并用标志位区分孩子指针和线索。引入线索的目的是提高遍历效率，使某些遍历可在不使用递归栈或辅助栈的情况下找到前驱、后继，适合频繁遍历但结构较少变化的二叉树。"}],"tags":["树与二叉树","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-07","source":"原题","chapter":"栈与队列","type":"short","title":"简述队列的特性、核心操作，并举出两个计算机领域的典型应用场景。","options":[],"answer":"队列是先进先出（FIFO）的线性结构，只允许在队尾入队、队头出队。核心操作包括初始化、判空、入队、出队、取队头元素等。典型应用包括操作系统中的任务排队、打印队列、网络缓冲区、广度优先搜索和二叉树层序遍历。","explanations":[{"label":"参考答案","text":"队列是先进先出（FIFO）的线性结构，只允许在队尾入队、队头出队。核心操作包括初始化、判空、入队、出队、取队头元素等。典型应用包括操作系统中的任务排队、打印队列、网络缓冲区、广度优先搜索和二叉树层序遍历。"}],"tags":["栈与队列","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-08","source":"原题","chapter":"绪论","type":"short","title":"简述顺序存储结构与链式存储结构的主要区别。","options":[],"answer":"顺序存储用一组连续存储单元保存元素，支持按下标随机访问，访问时间为O(1)，但插入删除常需移动元素且容量扩展受限。链式存储通过指针连接结点，不要求连续空间，插入删除只需修改指针，但不能随机访问，查找第i个元素通常需要O(n)。","explanations":[{"label":"参考答案","text":"顺序存储用一组连续存储单元保存元素，支持按下标随机访问，访问时间为O(1)，但插入删除常需移动元素且容量扩展受限。链式存储通过指针连接结点，不要求连续空间，插入删除只需修改指针，但不能随机访问，查找第i个元素通常需要O(n)。"}],"tags":["绪论","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-09","source":"原题","chapter":"树与二叉树","type":"short","title":"简述二叉树的顺序存储结构与链式存储结构各自的优缺点及适用场景。","options":[],"answer":"顺序存储用数组按层次编号保存结点，适合完全二叉树和满二叉树，父子下标计算方便、访问快；但对稀疏二叉树会浪费大量空间。链式存储用结点和指针表示左右孩子，适合一般二叉树，空间按实际结点分配，结构灵活；缺点是需要指针开销，不能直接按下标定位。","explanations":[{"label":"参考答案","text":"顺序存储用数组按层次编号保存结点，适合完全二叉树和满二叉树，父子下标计算方便、访问快；但对稀疏二叉树会浪费大量空间。链式存储用结点和指针表示左右孩子，适合一般二叉树，空间按实际结点分配，结构灵活；缺点是需要指针开销，不能直接按下标定位。"}],"tags":["树与二叉树","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-10","source":"原题","chapter":"查找","type":"short","title":"简述哈希冲突的产生原因，并说明开放定址法解决冲突的核心原理。","options":[],"answer":"哈希冲突是指不同关键字经过哈希函数计算得到相同地址。开放定址法在冲突发生时，不使用额外链表，而是在哈希表内部按照某种探测序列寻找下一个空位置，如线性探测、二次探测、伪随机探测。查找时必须按同一探测序列继续比较，直到找到目标或遇到空位置。","explanations":[{"label":"参考答案","text":"哈希冲突是指不同关键字经过哈希函数计算得到相同地址。开放定址法在冲突发生时，不使用额外链表，而是在哈希表内部按照某种探测序列寻找下一个空位置，如线性探测、二次探测、伪随机探测。查找时必须按同一探测序列继续比较，直到找到目标或遇到空位置。"}],"tags":["查找","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-11","source":"原题","chapter":"图","type":"short","title":"简述关键路径的基本概念及其在工程管理中的实际应用价值。","options":[],"answer":"关键路径是AOE网中从源点到汇点路径长度最长的路径，路径上的活动称为关键活动。关键路径决定整个工程的最短完成时间，关键活动延误会直接导致工期延误。工程管理中可用关键路径识别瓶颈、安排资源、控制进度和评估工期风险。","explanations":[{"label":"参考答案","text":"关键路径是AOE网中从源点到汇点路径长度最长的路径，路径上的活动称为关键活动。关键路径决定整个工程的最短完成时间，关键活动延误会直接导致工期延误。工程管理中可用关键路径识别瓶颈、安排资源、控制进度和评估工期风险。"}],"tags":["图","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-12","source":"原题","chapter":"图","type":"short","title":"简述图的深度优先遍历（DFS）和广度优先遍历（BFS）的区别。","options":[],"answer":"DFS从某个顶点出发沿一条路径尽可能深入，不能继续时回溯，通常用递归或栈实现。BFS从起点按距离层次逐层访问相邻顶点，通常用队列实现。DFS适合连通性、拓扑排序、回溯搜索等问题；BFS适合无权图最短路径、层次遍历等问题。","explanations":[{"label":"参考答案","text":"DFS从某个顶点出发沿一条路径尽可能深入，不能继续时回溯，通常用递归或栈实现。BFS从起点按距离层次逐层访问相邻顶点，通常用队列实现。DFS适合连通性、拓扑排序、回溯搜索等问题；BFS适合无权图最短路径、层次遍历等问题。"}],"tags":["图","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-13","source":"原题","chapter":"树与二叉树","type":"short","title":"简述二叉树的三种遍历方式，并说明各自的应用场景。","options":[],"answer":"二叉树三种常见深度遍历为先序、中序、后序。先序按根、左、右访问，适合复制树、输出表达式前缀形式；中序按左、根、右访问，在二叉排序树中可得到有序序列；后序按左、右、根访问，适合释放树、计算表达式树等需要先处理子树的问题。","explanations":[{"label":"参考答案","text":"二叉树三种常见深度遍历为先序、中序、后序。先序按根、左、右访问，适合复制树、输出表达式前缀形式；中序按左、根、右访问，在二叉排序树中可得到有序序列；后序按左、右、根访问，适合释放树、计算表达式树等需要先处理子树的问题。"}],"tags":["树与二叉树","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-14","source":"原题","chapter":"栈与队列","type":"short","title":"简述递归算法的优缺点，以及栈结构在递归执行过程中的核心作用。","options":[],"answer":"递归算法表达简洁，适合具有自相似结构的问题，如树遍历、分治和回溯；缺点是函数调用开销较大，递归层数过深可能导致栈溢出，部分问题会重复计算。递归执行时系统调用栈保存每一层函数的参数、局部变量、返回地址和执行现场，保证递归返回后能继续上一层计算。","explanations":[{"label":"参考答案","text":"递归算法表达简洁，适合具有自相似结构的问题，如树遍历、分治和回溯；缺点是函数调用开销较大，递归层数过深可能导致栈溢出，部分问题会重复计算。递归执行时系统调用栈保存每一层函数的参数、局部变量、返回地址和执行现场，保证递归返回后能继续上一层计算。"}],"tags":["栈与队列","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-15","source":"原题","chapter":"排序","type":"short","title":"简述堆排序的基本思想及其优缺点。","options":[],"answer":"堆排序先把待排序序列建成大根堆或小根堆，然后反复取堆顶元素与堆尾交换，并对剩余元素调整堆，最终得到有序序列。它的时间复杂度为O(n log n)，空间复杂度为O(1)，不依赖初始序列，适合原地排序；缺点是不稳定，常数开销较大，缓存局部性通常不如快速排序。","explanations":[{"label":"参考答案","text":"堆排序先把待排序序列建成大根堆或小根堆，然后反复取堆顶元素与堆尾交换，并对剩余元素调整堆，最终得到有序序列。它的时间复杂度为O(n log n)，空间复杂度为O(1)，不依赖初始序列，适合原地排序；缺点是不稳定，常数开销较大，缓存局部性通常不如快速排序。"}],"tags":["排序","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-16","source":"原题","chapter":"图","type":"short","title":"简述最小生成树的概念及其两种经典算法（Prim算法和Kruskal算法）的核心思想。","options":[],"answer":"最小生成树是在连通无向带权图中连接所有顶点、无回路且边权总和最小的生成树。Prim算法从一个顶点开始，每次选择连接已选顶点集合与未选顶点集合的最小边，逐步扩展树。Kruskal算法将边按权值从小到大排序，依次选择不会形成回路的边，直到选出n-1条边。","explanations":[{"label":"参考答案","text":"最小生成树是在连通无向带权图中连接所有顶点、无回路且边权总和最小的生成树。Prim算法从一个顶点开始，每次选择连接已选顶点集合与未选顶点集合的最小边，逐步扩展树。Kruskal算法将边按权值从小到大排序，依次选择不会形成回路的边，直到选出n-1条边。"}],"tags":["图","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-17","source":"原题","chapter":"栈与队列","type":"short","title":"简述栈和队列的区别与联系。","options":[],"answer":"栈和队列都是操作受限的线性表。栈只允许在栈顶插入和删除，遵循后进先出（LIFO）；队列在队尾插入、队头删除，遵循先进先出（FIFO）。二者都可用顺序存储或链式存储实现，也都常用于控制程序执行顺序和任务调度。","explanations":[{"label":"参考答案","text":"栈和队列都是操作受限的线性表。栈只允许在栈顶插入和删除，遵循后进先出（LIFO）；队列在队尾插入、队头删除，遵循先进先出（FIFO）。二者都可用顺序存储或链式存储实现，也都常用于控制程序执行顺序和任务调度。"}],"tags":["栈与队列","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-18","source":"原题","chapter":"图","type":"short","title":"简述AOE网中关键路径的求解思路。","options":[],"answer":"先对AOE网进行拓扑排序，计算每个事件的最早发生时间ve；再按逆拓扑序计算每个事件的最迟发生时间vl。对每条活动边<i,j>，计算活动最早开始时间e=ve[i]和最迟开始时间l=vl[j]-weight(i,j)。若e=l，则该活动为关键活动，由关键活动组成的从源点到汇点的路径就是关键路径。","explanations":[{"label":"参考答案","text":"先对AOE网进行拓扑排序，计算每个事件的最早发生时间ve；再按逆拓扑序计算每个事件的最迟发生时间vl。对每条活动边<i,j>，计算活动最早开始时间e=ve[i]和最迟开始时间l=vl[j]-weight(i,j)。若e=l，则该活动为关键活动，由关键活动组成的从源点到汇点的路径就是关键路径。"}],"tags":["图","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-19","source":"原题","chapter":"线性表","type":"short","title":"简述线性表链式存储结构的优缺点，并说明链式存储为何不支持随机存取？","options":[],"answer":"线性表链式存储不要求元素在内存中连续，插入删除时通常只需修改指针，容量扩展灵活；缺点是每个结点需要额外指针域，存储密度较低，查找效率不如顺序表。链表结点只保存后继或前驱指针，不能通过下标直接计算元素地址，因此访问第i个元素必须从头结点沿指针逐个查找，不支持随机存取。","explanations":[{"label":"参考答案","text":"线性表链式存储不要求元素在内存中连续，插入删除时通常只需修改指针，容量扩展灵活；缺点是每个结点需要额外指针域，存储密度较低，查找效率不如顺序表。链表结点只保存后继或前驱指针，不能通过下标直接计算元素地址，因此访问第i个元素必须从头结点沿指针逐个查找，不支持随机存取。"}],"tags":["线性表","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-20","source":"原题","chapter":"查找","type":"short","title":"简述哈希查找中“装填因子”的概念、对查找效率的影响，以及常用的冲突解决方法。","options":[],"answer":"装填因子通常定义为表中已存记录数与哈希表长度的比值。装填因子越大，冲突概率越高，平均查找长度通常增加；装填因子过小则空间浪费。常用冲突解决方法包括开放定址法、链地址法、再哈希法和建立公共溢出区。","explanations":[{"label":"参考答案","text":"装填因子通常定义为表中已存记录数与哈希表长度的比值。装填因子越大，冲突概率越高，平均查找长度通常增加；装填因子过小则空间浪费。常用冲突解决方法包括开放定址法、链地址法、再哈希法和建立公共溢出区。"}],"tags":["查找","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-21","source":"原题","chapter":"串","type":"short","title":"简述串的模式匹配中，KMP算法相对于朴素匹配算法的改进之处。","options":[],"answer":"朴素匹配在失配后通常将模式串右移一位并回退主串位置，可能重复比较。KMP算法通过模式串的next或nextval数组记录前缀与后缀的匹配信息，失配时只移动模式串，不回退主串指针，从而避免重复比较，时间复杂度可达到O(n+m)。","explanations":[{"label":"参考答案","text":"朴素匹配在失配后通常将模式串右移一位并回退主串位置，可能重复比较。KMP算法通过模式串的next或nextval数组记录前缀与后缀的匹配信息，失配时只移动模式串，不回退主串指针，从而避免重复比较，时间复杂度可达到O(n+m)。"}],"tags":["串","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-22","source":"原题","chapter":"图","type":"short","title":"简述拓扑排序的核心思想与执行步骤，并说明其适用场景。","options":[],"answer":"拓扑排序用于有向无环图。核心思想是不断选择入度为0的顶点输出，并删除该顶点及其出边，更新相邻顶点入度，直到所有顶点输出或发现仍有顶点但无入度为0顶点。它适用于课程先修关系、任务依赖分析、工程流程调度等需要满足偏序约束的场景。","explanations":[{"label":"参考答案","text":"拓扑排序用于有向无环图。核心思想是不断选择入度为0的顶点输出，并删除该顶点及其出边，更新相邻顶点入度，直到所有顶点输出或发现仍有顶点但无入度为0顶点。它适用于课程先修关系、任务依赖分析、工程流程调度等需要满足偏序约束的场景。"}],"tags":["图","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-23","source":"原题","chapter":"查找","type":"short","title":"简述折半查找的查找过程、前提条件，并说明为什么要求顺序存储且有序。","options":[],"answer":"折半查找先取有序表中间元素与目标关键字比较，若相等则成功；若目标较小则继续在左半区间查找，否则在右半区间查找，直到区间为空。前提是线性表按关键字有序并采用顺序存储。要求有序是为了通过比较排除一半元素，要求顺序存储是为了能O(1)访问中间位置。","explanations":[{"label":"参考答案","text":"折半查找先取有序表中间元素与目标关键字比较，若相等则成功；若目标较小则继续在左半区间查找，否则在右半区间查找，直到区间为空。前提是线性表按关键字有序并采用顺序存储。要求有序是为了通过比较排除一半元素，要求顺序存储是为了能O(1)访问中间位置。"}],"tags":["查找","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-24","source":"原题","chapter":"树与二叉树","type":"short","title":"简述二叉排序树的核心特性及其查找优势（补充）。","options":[],"answer":"二叉排序树的核心特性是任一结点左子树关键字均小于该结点，右子树关键字均大于该结点，且左右子树也满足该性质。查找时从根开始比较，目标较小进入左子树，较大进入右子树，每次比较都缩小搜索范围。树较平衡时查找、插入、删除平均为O(log n)，但树退化时最坏为O(n)。","explanations":[{"label":"参考答案","text":"二叉排序树的核心特性是任一结点左子树关键字均小于该结点，右子树关键字均大于该结点，且左右子树也满足该性质。查找时从根开始比较，目标较小进入左子树，较大进入右子树，每次比较都缩小搜索范围。树较平衡时查找、插入、删除平均为O(log n)，但树退化时最坏为O(n)。"}],"tags":["树与二叉树","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-25","source":"原题","chapter":"图","type":"short","title":"简述图的邻接矩阵和邻接表两种存储结构的优缺点及适用场景。","options":[],"answer":"邻接矩阵用二维数组表示顶点之间是否有边或边权，判断两点是否相邻为O(1)，适合稠密图；缺点是空间复杂度O(n^2)，遍历邻边也可能较慢。邻接表为每个顶点维护边表，空间复杂度约为O(n+e)，适合稀疏图，遍历邻边高效；缺点是判断两点是否相邻需要扫描对应边表。","explanations":[{"label":"参考答案","text":"邻接矩阵用二维数组表示顶点之间是否有边或边权，判断两点是否相邻为O(1)，适合稠密图；缺点是空间复杂度O(n^2)，遍历邻边也可能较慢。邻接表为每个顶点维护边表，空间复杂度约为O(n+e)，适合稀疏图，遍历邻边高效；缺点是判断两点是否相邻需要扫描对应边表。"}],"tags":["图","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-26","source":"原题","chapter":"广义表","type":"short","title":"简述广义表的定义、表头和表尾的概念，以及广义表的应用价值。","options":[],"answer":"广义表是线性表的推广，其元素可以是原子，也可以是另一个广义表，因此具有递归结构。非空广义表的第一个元素称为表头，除表头外其余元素组成的广义表称为表尾，表尾一定是广义表。广义表可用于表示层次结构、递归数据、符号表达式和多维稀疏结构。","explanations":[{"label":"参考答案","text":"广义表是线性表的推广，其元素可以是原子，也可以是另一个广义表，因此具有递归结构。非空广义表的第一个元素称为表头，除表头外其余元素组成的广义表称为表尾，表尾一定是广义表。广义表可用于表示层次结构、递归数据、符号表达式和多维稀疏结构。"}],"tags":["广义表","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-27","source":"原题","chapter":"树与二叉树","type":"short","title":"简述平衡二叉树（AVL树）的定义与平衡调整的基本思想。","options":[],"answer":"AVL树是一种二叉排序树，要求任一结点左右子树高度差的绝对值不超过1。插入或删除后若破坏平衡，需要沿回溯路径找到失衡结点，并通过旋转调整恢复平衡。常见调整包括LL右旋、RR左旋、LR先左旋后右旋、RL先右旋后左旋。","explanations":[{"label":"参考答案","text":"AVL树是一种二叉排序树，要求任一结点左右子树高度差的绝对值不超过1。插入或删除后若破坏平衡，需要沿回溯路径找到失衡结点，并通过旋转调整恢复平衡。常见调整包括LL右旋、RR左旋、LR先左旋后右旋、RL先右旋后左旋。"}],"tags":["树与二叉树","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-28","source":"原题","chapter":"树与二叉树","type":"short","title":"简述二叉树中叶子结点与度为2的结点之间的数量关系（n₀ = n₂ + 1），并说明如何通过实例验证。","options":[],"answer":"设二叉树中叶子结点数为n0，度为1的结点数为n1，度为2的结点数为n2。总结点数n=n0+n1+n2；边数为n-1。按度数统计边数又有n1+2n2，因此n0+n1+n2-1=n1+2n2，化简得n0=n2+1。可用任意二叉树实例统计叶子和度为2的结点验证该关系。","explanations":[{"label":"参考答案","text":"设二叉树中叶子结点数为n0，度为1的结点数为n1，度为2的结点数为n2。总结点数n=n0+n1+n2；边数为n-1。按度数统计边数又有n1+2n2，因此n0+n1+n2-1=n1+2n2，化简得n0=n2+1。可用任意二叉树实例统计叶子和度为2的结点验证该关系。"}],"tags":["树与二叉树","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-29","source":"原题","chapter":"排序","type":"short","title":"简述简单选择排序的基本思想及其稳定性。","options":[],"answer":"简单选择排序第i趟从待排序区间中选择最小或最大元素，与区间第一个位置交换，逐步扩大有序区间。时间复杂度始终为O(n^2)，比较次数固定，移动次数较少。由于交换可能改变相同关键字元素的相对次序，简单选择排序是不稳定排序。","explanations":[{"label":"参考答案","text":"简单选择排序第i趟从待排序区间中选择最小或最大元素，与区间第一个位置交换，逐步扩大有序区间。时间复杂度始终为O(n^2)，比较次数固定，移动次数较少。由于交换可能改变相同关键字元素的相对次序，简单选择排序是不稳定排序。"}],"tags":["排序","short","docx简答题"],"difficulty":"中等"},{"id":"DS-DOCX-30","source":"原题","chapter":"排序","type":"short","title":"简述直接插入排序的基本思想，并用一个实例说明其排序过程。","options":[],"answer":"直接插入排序把序列分为有序区和无序区，每次取无序区第一个元素，向前在有序区中寻找合适位置并移动元素后插入。例：对3,1,4,2排序，先将1插入到3前得到1,3,4,2；4已在正确位置；再将2插入到1和3之间，得到1,2,3,4。其最好时间复杂度为O(n)，平均和最坏为O(n^2)，稳定。","explanations":[{"label":"参考答案","text":"直接插入排序把序列分为有序区和无序区，每次取无序区第一个元素，向前在有序区中寻找合适位置并移动元素后插入。例：对3,1,4,2排序，先将1插入到3前得到1,3,4,2；4已在正确位置；再将2插入到1和3之间，得到1,2,3,4。其最好时间复杂度为O(n)，平均和最坏为O(n^2)，稳定。"}],"tags":["排序","short","docx简答题"],"difficulty":"中等"},{"id":"J-第一章 绪论-1","source":"原题","chapter":"第一章 绪论","type":"judge","title":"在题目“下列属于逻辑结构的是( )?”中，选项 A“树形结构”是正确答案。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":"对","explanations":[{"label":"解析","text":"由选择题 第一章 绪论-1 改写生成。正确：树形结构 是本题对应概念或操作。 错误：链式存储结构 与本题考点不符，或混淆了相近概念。 错误：顺序表 与本题考点不符，或混淆了相近概念。 错误：顺序存储结构 与本题考点不符，或混淆了相近概念。"}],"tags":["第一章 绪论","single","judge","选择题生成"],"difficulty":"基础"},{"id":"J-第一章 绪论-2","source":"原题","chapter":"第一章 绪论","type":"judge","title":"在题目“数据结构研究的核心问题是( )?”中，选项 B“数据存储地址”是正确答案。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":"错","explanations":[{"label":"解析","text":"由选择题 第一章 绪论-2 改写生成。正确：数据之间的关系 是本题对应概念或操作。 错误：数据存储地址 与本题考点不符，或混淆了相近概念。 错误：数据类型 与本题考点不符，或混淆了相近概念。 错误：数据大小 与本题考点不符，或混淆了相近概念。"}],"tags":["第一章 绪论","single","judge","选择题生成"],"difficulty":"基础"},{"id":"J-第一章 绪论-3","source":"原题","chapter":"第一章 绪论","type":"judge","title":"在题目“算法分析通常采用( )?”中，选项 A“渐进分析”是正确答案。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":"对","explanations":[{"label":"解析","text":"由选择题 第一章 绪论-3 改写生成。正确：渐进分析 是本题对应概念或操作。 错误：具体数值 与本题考点不符，或混淆了相近概念。 错误：编译时间 与本题考点不符，或混淆了相近概念。 错误：实际运行时间 与本题考点不符，或混淆了相近概念。"}],"tags":["第一章 绪论","single","judge","选择题生成"],"difficulty":"基础"},{"id":"J-第一章 绪论-4","source":"原题","cha const TYPE_NAME = {single:'单选题',multiple:'多选题',fill:'填空题',judge:'判断题',short:'简答/代码题'};
let state = JSON.parse(localStorage.getItem('dsPracticeState') || '{"answers":{},"wrong":[],"exam":{}}');
let mode='study';
let shuffled=false;
function save(){localStorage.setItem('dsPracticeState', JSON.stringify(state)); document.getElementById('saveState').textContent='已保存 '+new Date().toLocaleTimeString(); updateStats();}
function norm(s){return String(s||'').replace(/\s+/g,'').replace(/[；;，,。\.]/g,'').toLowerCase();}
function isCorrect(q, val){
  if(q.type==='single'||q.type==='judge') return val===q.answer;
  if(q.type==='multiple') return [...val].sort().join('') === [...q.answer].sort().join('');
  if(q.type==='fill') {
    if(!Array.isArray(val)) return false; const ans=q.answer||[]; if(val.length<ans.length) return false;
    return ans.every((a,i)=> norm(val[i]).includes(norm(a)) || norm(a).includes(norm(val[i])));
  }
  return null;
}
function filteredQuestions(){
  const c=document.getElementById('chapterFilter').value, t=document.getElementById('typeFilter').value, s=document.getElementById('sourceFilter').value, kw=document.getElementById('searchBox').value.trim().toLowerCase();
  let arr=QUESTIONS.filter(q=>(!c||q.chapter===c)&&(!t||q.type===t)&&(!s||q.source===s));
  if(kw) arr=arr.filter(q=>JSON.stringify(q).toLowerCase().includes(kw));
  if(mode==='wrong') arr=arr.filter(q=>state.wrong.includes(q.id));
  if(shuffled) arr=[...arr].sort(()=>Math.random()-0.5);
  return arr;
}
function initFilters(){
  const chapters=[...new Set(QUESTIONS.map(q=>q.chapter))];
  chapterFilter.innerHTML='<option value="">全部章节</option>'+chapters.map(x=>`<option>${x}</option>`).join('');
  typeFilter.innerHTML='<option value="">全部题型</option>'+Object.entries(TYPE_NAME).map(([k,v])=>`<option value="${k}">${v}</option>`).join('');
  sourceFilter.innerHTML='<option value="">全部来源</option>'+[...new Set(QUESTIONS.map(q=>q.source))].map(x=>`<option>${x}</option>`).join('');
}
function renderMeta(q,i){return `<div class="meta"><span class="pill gray">${i+1}</span><span class="pill">${q.chapter}</span><span class="pill gray">${TYPE_NAME[q.type]}</span><span class="pill ${q.source==='原题'?'green':'amber'}">${q.source}</span><span class="pill gray">${q.difficulty||''}</span></div>`}
function answerText(q){
  if(q.type==='single'||q.type==='multiple') return q.answer;
  if(q.type==='judge') return q.answer;
  if(q.type==='fill') return (q.answer||[]).join('；');
  return q.answer;
}
function renderQuestion(q,i, exam=false){
  const saved = exam ? (state.exam.answers||{})[q.id] : state.answers[q.id];
  const checked = saved !== undefined;
  let body='';
  if(q.type==='single'||q.type==='judge'){
    body=q.options.map(o=>`<label class="option" data-label="${o.label}"><input type="radio" name="q_${q.id}" value="${o.label}" ${saved===o.label?'checked':''}> <span class="label">${o.label}</span><span>${o.text}</span></label>`).join('');
  } else if(q.type==='multiple'){
    const set=new Set(String(saved||'').split(''));
    body=q.options.map(o=>`<label class="option" data-label="${o.label}"><input type="checkbox" name="q_${q.id}" value="${o.label}" ${set.has(o.label)?'checked':''}> <span class="label">${o.label}</span><span>${o.text}</span></label>`).join('');
  } else if(q.type==='fill'){
    const arr=Array.isArray(saved)?saved:[];
    const blanks=Math.max((q.answer||[]).length, (q.title.match(/_(2,)/g)||[]).length, 1);
    body=Array.from({length:blanks},(_,k)=>`<input class="fill-input" data-index="${k}" placeholder="第${k+1}空" value="${arr[k]||''}">`).join('');
  } else {
    body=`<textarea class="short-input" placeholder="先自己写，再查看参考答案。">${saved||''}</textarea>`;
  }
  return `<div class="card q-card" data-id="${q.id}">${renderMeta(q,i)}<div class="q-title">${q.title}</div>${body}<div class="footer-actions"><button class="checkBtn">${exam?'保存答案':'提交/查看解析'}</button>${q.type==='short'?'<button class="showRef ghost">查看参考答案</button>':''}<button class="markWrong ghost">加入/移出错题</button></div><div class="explain"><div class="row"><b>正确答案：</b><span class="badge-green">${answerText(q)}</span></div>${(q.explanations||[]).map(e=>`<div class="row"><b>${e.label}：</b>${escapeHtml(e.text)}</div>`).join('')}</div></div>`
}
function escapeHtml(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function applyMark(card,q,val,show){
  if(!show) return;
  card.querySelectorAll('.option').forEach(el=>{
    const lab=el.dataset.label; el.classList.remove('correct','wrong');
    const ok = q.type==='multiple' ? q.answer.includes(lab) : q.answer===lab;
    const chosen = q.type==='multiple' ? String(val||'').includes(lab) : val===lab;
    if(ok) el.classList.add('correct');
    if(chosen && !ok) el.classList.add('wrong');
  });
  card.querySelector('.explain').classList.add('show');
}
function getCardAnswer(card,q){
  if(q.type==='single'||q.type==='judge') return (card.querySelector(`input[name="q_${q.id}"]:checked`)||{}).value || '';
  if(q.type==='multiple') return [...card.querySelectorAll(`input[name="q_${q.id}"]:checked`)].map(x=>x.value).sort().join('');
  if(q.type==='fill') return [...card.querySelectorAll('.fill-input')].map(x=>x.value.trim());
  return (card.querySelector('.short-input')||{}).value || '';
}
function bindCards(exam=false){
  document.querySelectorAll('.q-card').forEach(card=>{
    const q=QUESTIONS.find(x=>x.id===card.dataset.id);
    const saved = exam ? (state.exam.answers||{})[q.id] : state.answers[q.id];
    if(saved!==undefined && !exam) applyMark(card,q,saved,true);
    card.querySelector('.checkBtn').onclick=()=>{
      const val=getCardAnswer(card,q);
      if(exam){state.exam.answers=state.exam.answers||{}; state.exam.answers[q.id]=val; save(); return;}
      state.answers[q.id]=val;
      const ok=isCorrect(q,val);
      if(ok===false && !state.wrong.includes(q.id)) state.wrong.push(q.id);
      if(ok===true) state.wrong=state.wrong.filter(id=>id!==q.id);
      applyMark(card,q,val,true); save();
    };
    const sr=card.querySelector('.showRef'); if(sr) sr.onclick=()=>card.querySelector('.explain').classList.toggle('show');
    card.querySelector('.markWrong').onclick=()=>{state.wrong = state.wrong.includes(q.id) ? state.wrong.filter(id=>id!==q.id) : [...state.wrong,q.id]; save(); render();};
  });
}
function renderStudy(){ const arr=filteredQuestions(); panel.innerHTML=arr.map((q,i)=>renderQuestion(q,i,false)).join('') || '<div class="card">没有匹配题目。</div>'; bindCards(false); }
function startExam(){
  const pool=filteredQuestions().filter(q=>q.type!=='short');
  const n=Math.min(parseInt(document.getElementById('examCount')?.value||'30'), pool.length);
  const picks=[...pool].sort(()=>Math.random()-0.5).slice(0,n);
  state.exam={ids:picks.map(q=>q.id),answers:{},submitted:false}; save(); renderExam();
}
function submitExam(){state.exam.submitted=true; save(); renderExam();}
function renderExam(){
  if(!state.exam.ids){ panel.innerHTML=`<div class="card"><h2>模拟考试</h2><p>从当前筛选结果中随机抽题，简答题默认不进入自动判分。</p><input id="examCount" value="30" placeholder="抽题数量"><div class="footer-actions"><button id="startExamBtn">开始考试</button></div></div>`; startExamBtn.onclick=startExam; return; }
  const arr=state.exam.ids.map(id=>QUESTIONS.find(q=>q.id===id)).filter(Boolean);
  if(state.exam.submitted){
    const rows=arr.map(q=>{const val=(state.exam.answers||{})[q.id]; const ok=isCorrect(q,val); return {q,val,ok};});
    const correct=rows.filter(r=>r.ok===true).length;
    panel.innerHTML=`<div class="card result"><strong>${correct} / ${rows.length}</strong><br>正确率：${rows.length?Math.round(correct*100/rows.length):0}%<div class="footer-actions"><button id="newExamBtn">重新组卷</button></div></div>`+rows.map((r,i)=>renderQuestion(r.q,i,false)).join('');
    newExamBtn.onclick=()=>{delete state.exam.ids; save(); renderExam();}; bindCards(false);
    document.querySelectorAll('.q-card').forEach(card=>{const q=QUESTIONS.find(x=>x.id===card.dataset.id); const val=(state.exam.answers||{})[q.id]; applyMark(card,q,val,true); });
  } else {
    panel.innerHTML=`<div class="card"><b>考试进行中：</b>${arr.length}题<div class="footer-actions"><button id="submitExamBtn" class="warn">交卷</button><button id="cancelExamBtn" class="ghost">取消本卷</button></div></div>`+arr.map((q,i)=>renderQuestion(q,i,true)).join('');
    submitExamBtn.onclick=submitExam; cancelExamBtn.onclick=()=>{state.exam={}; save(); renderExam();}; bindCards(true);
  }
}
function renderBrowse(){
 const arr=filteredQuestions();
 panel.innerHTML=`<div class="card"><b>题库浏览：</b>${arr.length}题。点击“提交/查看解析”可直接看答案。</div>`+arr.map((q,i)=>renderQuestion(q,i,false)).join(''); bindCards(false);
}
function renderCards(){ panel.innerHTML='<div class="grid">'+CARDS.map(c=>`<div class="card"><h3>${c.title}</h3><p>${c.body}</p></div>`).join('')+'</div>'; }
function render(){ if(mode==='study') renderStudy(); else if(mode==='exam') renderExam(); else if(mode==='wrong') renderStudy(); else if(mode==='browse') renderBrowse(); else renderCards(); updateStats(); }
function updateStats(){
 const arr=filteredQuestions(); totalCount.textContent=arr.length; wrongCount.textContent=state.wrong.length;
 const answered=Object.keys(state.answers||{}).length; doneCount.textContent=answered;
 let attempts=0, correct=0; for(const [id,val] of Object.entries(state.answers||{})){const q=QUESTIONS.find(x=>x.id===id); if(!q||q.type==='short') continue; const ok=isCorrect(q,val); if(ok!==null){attempts++; if(ok) correct++;}}
 accRate.textContent=attempts?Math.round(correct*100/attempts)+'%':'0%';
}
initFilters();
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); mode=b.dataset.mode; render();});
[chapterFilter,typeFilter,sourceFilter,searchBox].forEach(el=>el.addEventListener('input',()=>{shuffled=false; render();}));
shuffleBtn.onclick=()=>{shuffled=!shuffled; render();};
resetWrongBtn.onclick=()=>{state.wrong=[]; save(); render();};
exportBtn.onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ds-practice-progress.json'; a.click();};
function practiceQuestionType(q){return q.type}
window.studyHubPracticeNav=()=>{
  if(mode!=='study')return null;
  const list=filteredQuestions();
  if(!list.length)return null;
  return {mode:'study',title:'答题卡',current:null,items:list.map((q,i)=>({id:q.id,index:i+1,label:String(i+1),type:practiceQuestionType(q),done:state.answers[q.id]!==undefined,wrong:state.wrong.includes(q.id)})),jump(index){const q=list[index-1];if(!q)return;const card=[...document.querySelectorAll('.q-card')].find(el=>el.dataset.id===q.id);if(card)card.scrollIntoView({behavior:'auto',block:'start'});}};
};
render();
</script>
</body></html>
