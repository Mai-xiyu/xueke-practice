<style>
:root { --bg:#f6f7fb; --card:#fff; --text:#111827; --muted:#6b7280; --line:#e5e7eb; --primary:#2563eb; --green:#16a34a; --red:#dc2626; --amber:#d97706; }
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',Arial,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.header-inner{max-width:1180px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
h1{font-size:20px;margin:0} .sub{font-size:12px;color:var(--muted);margin-top:4px}
main{max-width:1180px;margin:0 auto;padding:18px;display:grid;grid-template-columns:270px 1fr;gap:18px}
.sidebar{position:sticky;top:76px;align-self:start;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
.stat{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0} .stat div{background:#f9fafb;border:1px solid var(--line);border-radius:10px;padding:10px}
.stat b{display:block;font-size:20px} .stat span{font-size:12px;color:var(--muted)}
button,select,input,textarea{font:inherit} button{border:0;border-radius:10px;background:var(--primary);color:#fff;padding:9px 12px;cursor:pointer} button.secondary{background:#111827} button.ghost{background:#fff;color:#111827;border:1px solid var(--line)} button.warn{background:var(--amber)} button.danger{background:var(--red)}
.controls{display:grid;gap:10px} select,input{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:#fff} textarea{width:100%;min-height:110px;padding:10px;border:1px solid var(--line);border-radius:10px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px} .tabs button{background:#fff;color:#111827;border:1px solid var(--line)} .tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px} .pill{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3} .pill.gray{background:#f3f4f6;color:#4b5563} .pill.green{background:#dcfce7;color:#166534} .pill.amber{background:#fef3c7;color:#92400e}
.q-title{font-size:17px;line-height:1.55;margin:6px 0 12px;white-space:pre-wrap}
.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:8px 0;background:#fff;cursor:pointer}
.option input{width:auto;margin-top:3px} .option.correct{border-color:#86efac;background:#f0fdf4} .option.wrong{border-color:#fca5a5;background:#fef2f2} .label{font-weight:700;min-width:22px}
.explain{border-top:1px solid var(--line);margin-top:12px;padding-top:12px;display:none} .explain.show{display:block}
.explain .row{padding:8px 10px;border-radius:10px;background:#f9fafb;margin:6px 0;line-height:1.55}
.footer-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.result{font-size:16px;line-height:1.7} .result strong{font-size:22px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.code{white-space:pre-wrap;font-family:Consolas,'Courier New',monospace;background:#111827;color:#e5e7eb;border-radius:12px;padding:12px;line-height:1.45;overflow:auto}
.hidden{display:none!important}
.badge-red{color:var(--red);font-weight:700} .badge-green{color:var(--green);font-weight:700}
@media (max-width: 860px){main{grid-template-columns:1fr}.sidebar{position:static}.header-inner{display:block}}
</style>

维护已确定最短距离的顶点集合和未确定集合。每次选择当前距离最小的未确定顶点，将其加入已确定集合，并用它的出边松弛相邻顶点的距离。它不能处理负权边，因为算法一旦把某顶点的距离确定下来就不会再回退；负权边可能在后续路径中继续降低已经确定的距离，破坏贪心选择的正确性。","explanations":[{"label":"参考答案","text":"Dijkstra算法从源点出发，维护已确定最短距离的顶点集合和未确定集合。每次选择当前距离最小的未确定顶点，将其加入已确定集合，并用它的出边松弛相邻顶点的距离。它不能处理负权边，因为算法一旦把某顶点的距离确定下来就不会再回退；负权边可能在后续路径中继续降低已经确定的距离，破坏贪心选择的正确性。"}],"tags":["简答题","Dijkstra算法"],"difficulty":"中等"},{"id":"DS-SHORT-002","source":"课堂简答题","chapter":"排序","type":"short","title":"简述排序算法中“内部排序”与“外部排序”的区别。","options":[],"answer":"内部排序指待排序记录能够全部装入内存，排序过程主要在内存中完成。外部排序用于数据量超过内存容量的场景，需要借助磁盘等外存，排序过程涉及分块、归并和外存读写，主要瓶颈通常在I/O。","explanations":[{"label":"参考答案","text":"内部排序指待排序记录能够全部装入内存，排序过程主要在内存中完成。外部排序用于数据量超过内存容量的场景，需要借助磁盘等外存，排序过程涉及分块、归并和外存读写，主要瓶颈通常在I/O。"}],"tags":["简答题","排序"],"difficulty":"中等"},{"id":"DS-SHORT-003","source":"课堂简答题","chapter":"树与二叉树","type":"short","title":"简述二叉排序树的定义、核心特性，以及其在数据查找中的优势。","options":[],"answer":"二叉排序树又称二叉搜索树，或者为空树，或者满足：左子树所有结点关键字小于根结点，右子树所有结点关键字大于根结点，左右子树也分别是二叉排序树。它的中序遍历结果有序，查找时可根据大小关系每次排除一侧子树，平均情况下查找效率较高。","explanations":[{"label":"参考答案","text":"二叉排序树又称二叉搜索树，或者为空树，或者满足：左子树所有结点关键字小于根结点，右子树所有结点关键字大于根结点，左右子树也分别是二叉排序树。它的中序遍历结果有序，查找时可根据大小关系每次排除一侧子树，平均情况下查找效率较高。"}],"tags":["简答题","树与二叉树"],"difficulty":"中等"},{"id":"DS-SHORT-004","source":"课堂简答题","chapter":"树与二叉树","type":"short","title":"简述完全二叉树和满二叉树的区别，以及完全二叉树的存储优势。","options":[],"answer":"满二叉树是除叶子结点外每个结点都有两个孩子，且所有叶子在同一层的二叉树。完全二叉树要求除最后一层外各层都满，最后一层结点从左到右连续排列。完全二叉树适合顺序存储，父子下标关系固定，可减少指针开销，堆通常采用这种存储方式。","explanations":[{"label":"参考答案","text":"满二叉树是除叶子结点外每个结点都有两个孩子，且所有叶子在同一层的二叉树。完全二叉树要求除最后一层外各层都满，最后一层结点从左到右连续排列。完全二叉树适合顺序存储，父子下标关系固定，可减少指针开销，堆通常采用这种存储方式。"}],"tags":["简答题","树与二叉树"],"difficulty":"中等"},{"id":"DS-SHORT-005","source":"课堂简答题","chapter":"串","type":"short","title":"简述串的两种基本存储方式（定长顺序存储和堆分配存储）的区别。","options":[],"answer":"定长顺序存储用固定长度数组保存串，结构简单、访问直接，但最大长度受数组容量限制，容易截断或浪费空间。堆分配存储根据实际长度动态申请空间，空间利用更灵活，适合长度变化较大的串，但需要额外的动态内存管理。","explanations":[{"label":"参考答案","text":"定长顺序存储用固定长度数组保存串，结构简单、访问直接，但最大长度受数组容量限制，容易截断或浪费空间。堆分配存储根据实际长度动态申请空间，空间利用更灵活，适合长度变化较大的串，但需要额外的动态内存管理。"}],"tags":["简答题","串"],"difficulty":"中等"},{"id":"DS-SHORT-006","source":"课堂简答题","chapter":"树与二叉树","type":"short","title":"简述线索二叉树的基本概念，以及引入线索二叉树的目的与应用价值。","options":[],"answer":"线索二叉树是在二叉链表的空指针域中保存遍历序列中前驱或后继信息的二叉树。引入线索的目的是利用空指针、减少遍历时对栈或递归的依赖，使按某种遍历顺序寻找前驱和后继更方便，适合频繁按遍历序列访问结点的场景。","explanations":[{"label":"参考答案","text":"线索二叉树是在二叉链表的空指针域中保存遍历序列中前驱或后继信息的二叉树。引入线索的目的是利用空指针、减少遍历时对栈或递归的依赖，使按某种遍历顺序寻找前驱和后继更方便，适合频繁按遍历序列访问结点的场景。"}],"tags":["简答题","树与二叉树"],"difficulty":"中等"},{"id":"DS-SHORT-007","source":"课堂简答题","chapter":"栈与队列","type":"short","title":"简述队列的特性、核心操作，并举出两个计算机领域的典型应用场景。","options":[],"answer":"队列是一种先进先出的线性结构，只允许在队尾入队、在队头出队，核心操作包括初始化、入队、出队、取队头、判空等。典型应用包括操作系统中的进程就绪队列、打印任务队列、网络请求排队和广度优先搜索。","explanations":[{"label":"参考答案","text":"队列是一种先进先出的线性结构，只允许在队尾入队、在队头出队，核心操作包括初始化、入队、出队、取队头、判空等。典型应用包括操作系统中的进程就绪队列、打印任务队列、网络请求排队和广度优先搜索。"}],"tags":["简答题","栈与队列"],"difficulty":"中等"},{"id":"DS-SHORT-008","source":"课堂简答题","chapter":"线性表","type":"short","title":"简述顺序存储结构与链式存储结构的主要区别。","options":[],"answer":"顺序存储用一段连续内存保存元素，逻辑相邻的元素物理位置也相邻，支持随机访问，但插入删除通常需要移动元素。链式存储通过指针或链接域表示元素关系，不要求连续空间，插入删除更灵活，但访问第i个元素通常需要从头遍历。","explanations":[{"label":"参考答案","text":"顺序存储用一段连续内存保存元素，逻辑相邻的元素物理位置也相邻，支持随机访问，但插入删除通常需要移动元素。链式存储通过指针或链接域表示元素关系，不要求连续空间，插入删除更灵活，但访问第i个元素通常需要从头遍历。"}],"tags":["简答题","线性表"],"difficulty":"中等"},{"id":"DS-SHORT-009","source":"课堂简答题","chapter":"树与二叉树","type":"short","title":"简述二叉树的顺序存储结构与链式存储结构各自的优缺点及适用场景。","options":[],"answer":"顺序存储用数组表示二叉树，适合完全二叉树或接近完全的二叉树，父子下标计算方便、无指针开销，但对稀疏二叉树会浪费空间。链式存储用结点和左右指针表示，适合一般形态二叉树，结构灵活、空间按需分配，但需要额外指针域。","explanations":[{"label":"参考答案","text":"顺序存储用数组表示二叉树，适合完全二叉树或接近完全的二叉树，父子下标计算方便、无指针开销，但对稀疏二叉树会浪费空间。链式存储用结点和左右指针表示，适合一般形态二叉树，结构灵活、空间按需分配，但需要额外指针域。"}],"tags":["简答题","树与二叉树"],"difficulty":"中等"},{"id":"DS-SHORT-010","source":"课堂简答题","chapter":"查找","type":"short","title":"简述哈希冲突的产生原因，并说明开放定址法解决冲突的核心原理。","options":[],"answer":"哈希冲突是指不同关键字经过哈希函数映射到同一地址。开放定址法在冲突发生时不使用额外链表，而是在哈希表内部按照某种探测序列继续寻找下一个空闲地址；查找时也按同一探测序列进行。","explanations":[{"label":"参考答案","text":"哈希冲突是指不同关键字经过哈希函数映射到同一地址。开放定址法在冲突发生时不使用额外链表，而是在哈希表内部按照某种探测序列继续寻找下一个空闲地址；查找时也按同一探测序列进行。"}],"tags":["简答题","查找"],"difficulty":"中等"},{"id":"DS-SHORT-011","source":"课堂简答题","chapter":"图","type":"short","title":"简述关键路径的基本概念及其在工程管理中的实际应用价值。","options":[],"answer":"关键路径是AOE网中从源点到汇点路径长度最大的路径，路径上的活动称为关键活动。关键路径决定整个工程的最短完成时间，关键活动延误会直接导致总工期延误，因此可用于识别工程进度控制重点、安排资源和评估工期风险。","explanations":[{"label":"参考答案","text":"关键路径是AOE网中从源点到汇点路径长度最大的路径，路径上的活动称为关键活动。关键路径决定整个工程的最短完成时间，关键活动延误会直接导致总工期延误，因此可用于识别工程进度控制重点、安排资源和评估工期风险。"}],"tags":["简答题","图"],"difficulty":"中等"},{"id":"DS-SHORT-012","source":"课堂简答题","chapter":"图","type":"short","title":"简述图的深度优先遍历（DFS）和广度优先遍历（BFS）的区别。","options":[],"answer":"DFS从某个顶点出发，沿一条路径尽可能深入，无法继续时再回溯，通常借助递归或栈实现。BFS按层次向外扩展，先访问距离起点近的顶点，通常借助队列实现。DFS适合连通性、拓扑和回溯类问题，BFS适合无权图最短路径和层次遍历。","explanations":[{"label":"参考答案","text":"DFS从某个顶点出发，沿一条路径尽可能深入，无法继续时再回溯，通常借助递归或栈实现。BFS按层次向外扩展，先访问距离起点近的顶点，通常借助队列实现。DFS适合连通性、拓扑和回溯类问题，BFS适合无权图最短路径和层次遍历。"}],"tags":["简答题","图"],"difficulty":"中等"},{"id":"DS-SHORT-013","source":"课堂简答题","chapter":"树与二叉树","type":"short","title":"简述二叉树的三种遍历方式，并说明各自的应用场景。","options":[],"answer":"二叉树常见遍历有先序、中序和后序。先序按根、左、右访问，适合复制树或输出结构；中序按左、根、右访问，在二叉排序树中可得到有序序列；后序按左、右、根访问，适合释放树、计算表达式树或自底向上处理问题。","explanations":[{"label":"参考答案","text":"二叉树常见遍历有先序、中序和后序。先序按根、左、右访问，适合复制树或输出结构；中序按左、根、右访问，在二叉排序树中可得到有序序列；后序按左、右、根访问，适合释放树、计算表达式树或自底向上处理问题。"}],"tags":["简答题","树与二叉树"],"difficulty":"中等"},{"id":"DS-SHORT-014","source":"课堂简答题","chapter":"算法","type":"short","title":"简述递归算法的优缺点，以及栈结构在递归执行过程中的核心作用。","options":[],"answer":"递归算法表达自然，适合具有自相似结构的问题，如树遍历、分治和回溯；缺点是函数调用开销较大，递归层数过深可能导致栈溢出，也可能重复计算。递归执行依赖调用栈保存每一层的参数、局部变量和返回位置，回溯时按后进先出顺序恢复现场。","explanations":[{"label":"参考答案","text":"递归算法表达自然，适合具有自相似结构的问题，如树遍历、分治和回溯；缺点是函数调用开销较大，递归层数过深可能导致栈溢出，也可能重复计算。递归执行依赖调用栈保存每一层的参数、局部变量和返回位置，回溯时按后进先出顺序恢复现场。"}],"tags":["简答题","算法"],"difficulty":"中等"},{"id":"DS-SHORT-015","source":"课堂简答题","chapter":"排序","type":"short","title":"简述堆排序的基本思想及其优缺点。","options":[],"answer":"堆排序先把待排序序列建成大根堆或小根堆，再反复将堆顶元素与当前末尾元素交换，并调整剩余元素保持堆性质。优点是时间复杂度稳定为O(nlogn)、空间复杂度O(1)；缺点是不稳定，实际常数和数据局部性通常不如快速排序。","explanations":[{"label":"参考答案","text":"堆排序先把待排序序列建成大根堆或小根堆，再反复将堆顶元素与当前末尾元素交换，并调整剩余元素保持堆性质。优点是时间复杂度稳定为O(nlogn)、空间复杂度O(1)；缺点是不稳定，实际常数和数据局部性通常不如快速排序。"}],"tags":["简答题","排序"],"difficulty":"中等"},{"id":"DS-SHORT-016","source":"课堂简答题","chapter":"图","type":"short","title":"简述最小生成树的概念及其两种经典算法（Prim算法和Kruskal算法）的核心思想。","options":[],"answer":"最小生成树是在连通无向带权图中连接全部顶点且总权值最小的生成树。Prim算法从一个顶点开始，每次选择连接已选顶点集合和未选顶点集合的最小边扩展；Kruskal算法按边权从小到大选择边，只要不形成环就加入，直到选出n-1条边。","explanations":[{"label":"参考答案","text":"最小生成树是在连通无向带权图中连接全部顶点且总权值最小的生成树。Prim算法从一个顶点开始，每次选择连接已选顶点集合和未选顶点集合的最小边扩展；Kruskal算法按边权从小到大选择边，只要不形成环就加入，直到选出n-1条边。"}],"tags":["简答题","图"],"difficulty":"中等"},{"id":"DS-SHORT-017","source":"课堂简答题","chapter":"栈与队列","type":"short","title":"简述栈和队列的区别与联系。","options":[],"answer":"栈和队列都是操作受限的线性表。栈遵循后进先出，只在栈顶插入和删除；队列遵循先进先出，在队尾插入、队头删除。二者都可用顺序存储或链式存储实现，常用于控制处理顺序，如递归调用、表达式求值、任务排队和BFS。","explanations":[{"label":"参考答案","text":"栈和队列都是操作受限的线性表。栈遵循后进先出，只在栈顶插入和删除；队列遵循先进先出，在队尾插入、队头删除。二者都可用顺序存储或链式存储实现，常用于控制处理顺序，如递归调用、表达式求值、任务排队和BFS。"}],"tags":["简答题","栈与队列"],"difficulty":"中等"},{"id":"DS-SHORT-018","source":"课堂简答题","chapter":"图","type":"short","title":"简述AOE网中关键路径的求解思路。","options":[],"answer":"求AOE网关键路径通常先进行拓扑排序，计算各事件的最早发生时间ve；再按逆拓扑序计算各事件的最迟发生时间vl。对每条活动边求活动最早开始时间e和最迟开始时间l，若e等于l，则该活动为关键活动，由关键活动组成的从源点到汇点的路径就是关键路径。","explanations":[{"label":"参考答案","text":"求AOE网关键路径通常先进行拓扑排序，计算各事件的最早发生时间ve；再按逆拓扑序计算各事件的最迟发生时间vl。对每条活动边求活动最早开始时间e和最迟开始时间l，若e等于l，则该活动为关键活动，由关键活动组成的从源点到汇点的路径就是关键路径。"}],"tags":["简答题","图"],"difficulty":"中等"},{"id":"DS-SHORT-019","source":"课堂简答题","chapter":"线性表","type":"short","title":"简述线性表链式存储结构的优缺点，并说明链式存储为何不支持随机存取？","options":[],"answer":"链式存储的优点是不要求连续空间，插入删除只需修改指针，动态扩展方便；缺点是每个结点需要额外指针域，存储密度较低，查找第i个元素需要遍历。它不支持随机存取，是因为元素物理位置不连续，无法通过下标直接计算地址，只能沿链逐结点访问。","explanations":[{"label":"参考答案","text":"链式存储的优点是不要求连续空间，插入删除只需修改指针，动态扩展方便；缺点是每个结点需要额外指针域，存储密度较低，查找第i个元素需要遍历。它不支持随机存取，是因为元素物理位置不连续，无法通过下标直接计算地址，只能沿链逐结点访问。"}],"tags":["简答题","线性表"],"difficulty":"中等"},{"id":"DS-SHORT-020","source":"课堂简答题","chapter":"查找","type":"short","title":"简述哈希查找中“装填因子”的概念、对查找效率的影响，以及常用的冲突解决方法。","options":[],"answer":"装填因子通常定义为表中已存记录数与哈希表长度之比，反映哈希表的满程度。装填因子越大，冲突概率越高，查找平均长度通常增加。常用冲突解决方法包括开放定址法、链地址法、再哈希法和建立公共溢出区等。","explanations":[{"label":"参考答案","text":"装填因子通常定义为表中已存记录数与哈希表长度之比，反映哈希表的满程度。装填因子越大，冲突概率越高，查找平均长度通常增加。常用冲突解决方法包括开放定址法、链地址法、再哈希法和建立公共溢出区等。"}],"tags":["简答题","查找"],"difficulty":"中等"},{"id":"DS-SHORT-021","source":"课堂简答题","chapter":"串","type":"short","title":"简述串的模式匹配中，KMP算法相对于朴素匹配算法的改进之处。","options":[],"answer":"朴素匹配失败后通常将模式串整体右移一位，主串指针可能反复回退。KMP算法利用模式串自身的前后缀信息构造next数组，匹配失败时根据next值移动模式串，使主串指针不回退，从而避免大量重复比较，时间复杂度可达到O(n+m)。","explanations":[{"label":"参考答案","text":"朴素匹配失败后通常将模式串整体右移一位，主串指针可能反复回退。KMP算法利用模式串自身的前后缀信息构造next数组，匹配失败时根据next值移动模式串，使主串指针不回退，从而避免大量重复比较，时间复杂度可达到O(n+m)。"}],"tags":["简答题","串"],"difficulty":"中等"},{"id":"DS-SHORT-022","source":"课堂简答题","chapter":"图","type":"short","title":"简述拓扑排序的核心思想与执行步骤，并说明其适用场景。","options":[],"answer":"拓扑排序用于有向无环图。核心思想是不断选择入度为0的顶点输出，并删除该顶点及其出边，更新相关顶点入度，直到所有顶点输出或发现仍有顶点未输出。它适用于课程先修关系、工程任务依赖、编译依赖等需要按先后约束排序的场景。","explanations":[{"label":"参考答案","text":"拓扑排序用于有向无环图。核心思想是不断选择入度为0的顶点输出，并删除该顶点及其出边，更新相关顶点入度，直到所有顶点输出或发现仍有顶点未输出。它适用于课程先修关系、工程任务依赖、编译依赖等需要按先后约束排序的场景。"}],"tags":["简答题","图"],"difficulty":"中等"},{"id":"DS-SHORT-023","source":"课堂简答题","chapter":"查找","type":"short","title":"简述折半查找的查找过程、前提条件，并说明为什么要求顺序存储且有序。","options":[],"answer":"折半查找每次取查找区间中间元素与目标比较，若相等则成功，若目标较小则在左半区继续，否则在右半区继续。它要求线性表有序，并且采用顺序存储或可随机访问结构，因为算法需要直接定位中间位置；链式结构无法高效按下标访问中点。","explanations":[{"label":"参考答案","text":"折半查找每次取查找区间中间元素与目标比较，若相等则成功，若目标较小则在左半区继续，否则在右半区继续。它要求线性表有序，并且采用顺序存储或可随机访问结构，因为算法需要直接定位中间位置；链式结构无法高效按下标访问中点。"}],"tags":["简答题","查找"],"difficulty":"中等"},{"id":"DS-SHORT-024","source":"课堂简答题","chapter":"树与二叉树","type":"short","title":"简述二叉排序树的核心特性及其查找优势（补充）。","options":[],"answer":"二叉排序树的核心特性是左子树关键字小于根，右子树关键字大于根，且左右子树递归满足该性质。查找时从根结点开始比较关键字，小则进入左子树，大则进入右子树，平均情况下可减少比较次数；若树高度接近logn，查找效率较高。","explanations":[{"label":"参考答案","text":"二叉排序树的核心特性是左子树关键字小于根，右子树关键字大于根，且左右子树递归满足该性质。查找时从根结点开始比较关键字，小则进入左子树，大则进入右子树，平均情况下可减少比较次数；若树高度接近logn，查找效率较高。"}],"tags":["简答题","树与二叉树"],"difficulty":"中等"},{"id":"DS-SHORT-025","source":"课堂简答题","chapter":"图","type":"short","title":"简述图的邻接矩阵和邻接表两种存储结构的优缺点及适用场景。","options":[],"answer":"邻接矩阵用二维数组表示顶点间关系，判断两点是否相邻很快，适合稠密图，但空间复杂度为O(n²)。邻接表为每个顶点保存边表，空间与顶点数和边数相关，适合稀疏图，遍历某顶点邻接点方便，但判断任意两点是否相邻需要扫描边表。","explanations":[{"label":"参考答案","text":"邻接矩阵用二维数组表示顶点间关系，判断两点是否相邻很快，适合稠密图，但空间复杂度为O(n²)。邻接表为每个顶点保存边表，空间与顶点数和边数相关，适合稀疏图，遍历某顶点邻接点方便，但判断任意两点是否相邻需要扫描边表。"}],"tags":["简答题","图"],"difficulty":"中等"},{"id":"DS-SHORT-026","source":"课堂简答题","chapter":"广义表","type":"short","title":"简述广义表的定义、表头和表尾的概念，以及广义表的应用价值。","options":[],"answer":"广义表是由零个或多个元素组成的有限序列，元素可以是原子，也可以是子表。非空广义表的第一个元素称为表头，除表头外其余元素组成的表称为表尾，表尾一定是广义表。广义表可表示层次结构、嵌套数据和符号表达式。","explanations":[{"label":"参考答案","text":"广义表是由零个或多个元素组成的有限序列，元素可以是原子，也可以是子表。非空广义表的第一个元素称为表头，除表头外其余元素组成的表称为表尾，表尾一定是广义表。广义表可表示层次结构、嵌套数据和符号表达式。"}],"tags":["简答题","广义表"],"difficulty":"中等"},{"id":"DS-SHORT-027","source":"课堂简答题","chapter":"树与二叉树","type":"short","title":"简述平衡二叉树（AVL树）的定义与平衡调整的基本思想。","options":[],"answer":"AVL树是一种二叉排序树，任一结点左右子树高度差的绝对值不超过1。插入或删除后若破坏平衡，需要通过旋转调整，包括单旋和双旋，使树重新满足平衡条件。保持平衡可以避免二叉排序树退化为链表，提高查找、插入和删除效率。","explanations":[{"label":"参考答案","text":"AVL树是一种二叉排序树，任一结点左右子树高度差的绝对值不超过1。插入或删除后若破坏平衡，需要通过旋转调整，包括单旋和双旋，使树重新满足平衡条件。保持平衡可以避免二叉排序树退化为链表，提高查找、插入和删除效率。"}],"tags":["简答题","树与二叉树"],"difficulty":"中等"},{"id":"DS-SHORT-028","source":"课堂简答题","chapter":"树与二叉树","type":"short","title":"简述二叉树中叶子结点与度为2的结点之间的数量关系（n₀ = n₂ + 1），并说明如何通过实例验证。","options":[],"answer":"在任意非空二叉树中，叶子结点数n0等于度为2的结点数n2加1。可由边数关系证明：总结点数n=n0+n1+n2，边数为n-1；另一方面边数也等于n1+2n2，联立可得n0=n2+1。实例中若某二叉树有3个度为2的结点，则应有4个叶子结点。","explanations":[{"label":"参考答案","text":"在任意非空二叉树中，叶子结点数n0等于度为2的结点数n2加1。可由边数关系证明：总结点数n=n0+n1+n2，边数为n-1；另一方面边数也等于n1+2n2，联立可得n0=n2+1。实例中若某二叉树有3个度为2的结点，则应有4个叶子结点。"}],"tags":["简答题","树与二叉树"],"difficulty":"中等"},{"id":"DS-SHORT-029","source":"课堂简答题","chapter":"排序","type":"short","title":"简述简单选择排序的基本思想及其稳定性。","options":[],"answer":"简单选择排序每一趟从未排序区间中选出最小或最大元素，与未排序区间的第一个位置交换，逐步扩大有序区间。它的比较次数固定为O(n²)，移动次数较少。由于交换可能跨过相同关键字元素，简单选择排序通常是不稳定排序。","explanations":[{"label":"参考答案","text":"简单选择排序每一趟从未排序区间中选出最小或最大元素，与未排序区间的第一个位置交换，逐步扩大有序区间。它的比较次数固定为O(n²)，移动次数较少。由于交换可能跨过相同关键字元素，简单选择排序通常是不稳定排序。"}],"tags":["简答题","排序"],"difficulty":"中等"},{"id":"DS-SHORT-030","source":"课堂简答题","chapter":"排序","type":"short","title":"简述直接插入排序的基本思想，并用一个实例说明其排序过程。","options":[],"answer":"直接插入排序把序列分为已排序区和未排序区，每次取未排序区第一个元素，在已排序区中从后向前比较并移动元素，为其插入到合适位置。例如序列[3,1,2]：先把1插入到3前得到[1,3,2]，再把2插入到1和3之间得到[1,2,3]。","explanations":[{"label":"参考答案","text":"直接插入排序把序列分为已排序区和未排序区，每次取未排序区第一个元素，在已排序区中从后向前比较并移动元素，为其插入到合适位置。例如序列[3,1,2]：先把1插入到3前得到[1,3,2]，再把2插入到1和3之间得到[1,2,3]。"}],"tags":["简答题","排序"],"difficulty":"中等"},{"id":"DS-REVIEW-001","source":"数据结构复习资料","chapter":"第三章 栈和队列","type":"single","title":"若让元素1，2，3，4，5依次进栈，则出栈次序不可能出现在（ ）种情况。","options":[{"label":"A","text":"5，4，3，2，1"},{"label":"B","text":"2，1，5，4，3"},{"label":"C","text":"4，3，1，2，5"},{"label":"D","text":"2，3，5，4，1"}],"answer":"C","explanations":[{"label":"资料解析","text":"栈是后进先出的线性表，不难发现C选项中元素1比元素2先出栈，违背了栈的后进先出原则，所以不可能出现C选项所示的情况。"}],"tags":["数据结构复习资料","single","第三章 栈和队列"],"difficulty":"复习"},{"id":"DS-REVIEW-002","source":"数据结构复习资料","chapter":"第三章 栈和队列","type":"single","title":"若已知一个栈的入栈序列是1，2，3，…，n，其输出序列为p1，p2，p3，…，pn，若p1=n，则pi为（ ）。","options":[{"label":"A","text":"i"},{"label":"B","text":"n-i"},{"label":"C","text":"n-i+1"},{"label":"D","text":"不确定"}],"answer":"C","explanations":[{"label":"资料解析","text":"栈是后进先出的线性表，一个栈的入栈序列是1，2，3，…，n，而输出序列的第一个元素为n，说明1，2，3，…，n一次性全部进栈，再进行输出，所以p1=n，p2=n-1，…，pi=n-i+1。"}],"tags":["数据结构复习资料","single","第三章 栈和队列"],"difficulty":"复习"},{"id":"DS-REVIEW-003","source":"数据结构复习资料","chapter":"第三章 栈和队列","type":"single","title":"数组Ｑ［ｎ］用来表示一个循环队列，ｆ为当前队列头元素的前一位置，ｒ为队尾元素的位置，假定队列中元素的个数小于ｎ，计算队列中元素个数的公式为（ ）。","options":[{"label":"A","text":"r-f"},{"label":"B","text":"(n+f-r)%n"},{"label":"C","text":"n+r-f"},{"label":"D","text":"（n+r-f)%n"}],"answer":"D","explanations":[{"label":"资料解析","text":"对于非循环队列，尾指针和头指针的差值便是队列的长度，而对于循环队列，差值可能为负数，所以需要将差值加上MAXSIZE（本题为n），然后与MAXSIZE（本题为n）求余，即（n+r-f)%n。"}],"tags":["数据结构复习资料","single","第三章 栈和队列"],"difficulty":"复习"},{"id":"DS-REVIEW-004","source":"数据结构复习资料","chapter":"第三章 栈和队列","type":"single","title":"循环队列存储在数组A[0..m]中，则入队时的操作为（ ）。","options":[{"label":"A","text":"rear=rear+1"},{"label":"B","text":"rear=(rear+1)%(m-1)"},{"label":"C","text":"rear=(rear+1)%m"},{"label":"D","text":"rear=(rear+1)%(m+1)"}],"answer":"D","explanations":[{"label":"资料解析","text":"数组A[0..m]中共含有m+1个元素，故在求模运算时应除以m+1。"}],"tags":["数据结构复习资料","single","第三章 栈和队列"],"difficulty":"复习"},{"id":"DS-REVIEW-005","source":"数据结构复习资料","chapter":"第三章 栈和队列","type":"single","title":"最大容量为n的循环队列，队尾指针是rear，队头是front，则队空的条件是（ ）。","options":[{"label":"A","text":"(rear+1)%n==front"},{"label":"B","text":"rear==front"},{"label":"C","text":"rear+1==front"},{"label":"D","text":"(rear-l)%n==front"}],"answer":"B","explanations":[{"label":"资料解析","text":"最大容量为n的循环队列，队满条件是(rear+1)%n==front，队空条件是rear==front。"}],"tags":["数据结构复习资料","single","第三章 栈和队列"],"difficulty":"复习"},{"id":"DS-REVIEW-006","source":"数据结构复习资料","chapter":"第四章 串、数组与广义表","type":"single","title":"串是一种特殊的线性表，其特殊性体现在（ ）。","options":[{"label":"A","text":"可以顺序存储"},{"label":"B","text":"数据元素是一个字符"},{"label":"C","text":"可以链式存储"},{"label":"D","text":"数据元素可以是多个字符若"}],"answer":"B","explanations":[{"label":"资料解析","text":"正确答案：B"}],"tags":["数据结构复习资料","single","第四章 串、数组与广义表"],"difficulty":"复习"},{"id":"DS-REVIEW-007","source":"数据结构复习资料","chapter":"第四章 串、数组与广义表","type":"single","title":"串下面关于串的的叙述中，（ ）是不正确的？","options":[{"label":"A","text":"串是字符的有限序列"},{"label":"B","text":"空串是由空格构成的串"},{"label":"C","text":"模式匹配是串的一种重要运算"},{"label":"D","text":"串既可以采用顺序存储，也可以采用链式存储"}],"answer":"B","explanations":[{"label":"资料解析","text":"空格常常是串的字符集合中的一个元素，有一个或多个空格组成的串成为空格串，零个字符的串成为空串，其长度为零。"}],"tags":["数据结构复习资料","single","第四章 串、数组与广义表"],"difficulty":"复习"},{"id":"DS-REVIEW-008","source":"数据结构复习资料","chapter":"第四章 串、数组与广义表","type":"single","title":"假设以行序为主序存储二维数组A=array[1..100,1..100]，设每个数据元素占2个存储单元，基地址为10，则LOC[5,5]=（ ）。","options":[{"label":"A","text":"808"},{"label":"B","text":"818"},{"label":"C","text":"1010"},{"label":"D","text":"1020"}],"answer":"B","explanations":[{"label":"资料解析","text":"以行序为主，则LOC[5,5]=[（5-1）*100+（5-1）]*2+10=818。"}],"tags":["数据结构复习资料","single","第四章 串、数组与广义表"],"difficulty":"复习"},{"id":"DS-REVIEW-009","source":"数据结构复习资料","chapter":"第四章 串、数组与广义表","type":"single","title":"设有数组A[i,j]，数组的每个元素长度为3字节，i的值为1到8，j的值为1到10，数组从内存首地址BA开始顺序存放，当用以列为主存放时，元素A[5,8]的存储首地址为（ ）。","options":[{"label":"A","text":"BA+141"},{"label":"B","text":"BA+180"},{"label":"C","text":"BA+222"},{"label":"D","text":"BA+225"}],"answer":"B","explanations":[{"label":"资料解析","text":"以列序为主，则LOC[5,8]=[（8-1）*8+（5-1）]*3+BA=BA+180。"}],"tags":["数据结构复习资料","single","第四章 串、数组与广义表"],"difficulty":"复习"},{"id":"DS-REVIEW-010","source":"数据结构复习资料","chapter":"第四章 串、数组与广义表","type":"single","title":"设广义表L=((a,b,c))，则L的长度和深度分别为（ ）。","options":[{"label":"A","text":"1和1"},{"label":"B","text":"1和3"},{"label":"C","text":"1和2"},{"label":"D","text":"2和3"}],"answer":"C","explanations":[{"label":"资料解析","text":"广义表的深度是指广义表中展开后所含括号的层数，广义表的长度是指广义表中所含元素的个数。根据定义易知L的长度为1，深度为2。"}],"tags":["数据结构复习资料","single","第四章 串、数组与广义表"],"difficulty":"复习"},{"id":"DS-REVIEW-011","source":"数据结构复习资料","chapter":"第五章 树和二叉树","type":"single","title":"在下列存储形式中，（ ）不是树的存储形式？","options":[{"label":"A","text":"双亲表示法"},{"label":"B","text":"孩子链表表示法"},{"label":"C","text":"孩子兄弟表示法"},{"label":"D","text":"顺序存储表示法"}],"answer":"D","explanations":[{"label":"资料解析","text":"树的存储结构有三种：双亲表示法、孩子表示法、孩子兄弟表示法，其中孩子兄弟表示法是常用的表示法，任意一棵树都能通过孩子兄弟表示法转换为二叉树进行存储。"}],"tags":["数据结构复习资料","single","第五章 树和二叉树"],"difficulty":"复习"},{"id":"DS-REVIEW-012","source":"数据结构复习资料","chapter":"第六章 图","type":"single","title":"具有n个顶点的有向图最多有（ ）条边。","options":[{"label":"A","text":"n"},{"label":"B","text":"n(n-1)"},{"label":"C","text":"n(n+1)"},{"label":"D","text":"n2"}],"answer":"B","explanations":[{"label":"资料解析","text":"有向图的边有方向之分，即为从n个顶点中选取2个顶点有序排列，结果为n(n-1)。"}],"tags":["数据结构复习资料","single","第六章 图"],"difficulty":"复习"},{"id":"DS-REVIEW-013","source":"数据结构复习资料","chapter":"第六章 图","type":"single","title":"n个顶点的连通图用邻接距阵表示时，该距阵至少有（ ）个非零元素。","options":[{"label":"A","text":"n"},{"label":"B","text":"2(n-1)"},{"label":"C","text":"n/2"},{"label":"D","text":"n2"}],"answer":"B","explanations":[{"label":"资料解析","text":"正确答案：B"}],"tags":["数据结构复习资料","single","第六章 图"],"difficulty":"复习"},{"id":"DS-REVIEW-014","source":"数据结构复习资料","chapter":"第六章 图","type":"single","title":"若从无向图的任意一个顶点出发进行一次深度优先搜索可以访问图中所有的顶点，则该图一定是（ ）图。","options":[{"label":"A","text":"非连通"},{"label":"B","text":"连通"},{"label":"C","text":"强连通"},{"label":"D","text":"有向"}],"answer":"B","explanations":[{"label":"资料解析","text":"即从该无向图任意一个顶点出发有到各个顶点的路径，所以该无向图是连通图。"}],"tags":["数据结构复习资料","single","第六章 图"],"difficulty":"复习"},{"id":"DS-REVIEW-015","source":"数据结构复习资料","chapter":"第五章 树和二叉树","type":"single","title":"下面（ ）算法适合构造一个稠密图G的最小生成树。","options":[{"label":"A","text":"Prim算法"},{"label":"B","text":"Kruskal算法"},{"label":"C","text":"Floyd算法"},{"label":"D","text":"Dijkstra算法"}],"answer":"A","explanations":[{"label":"资料解析","text":"Prim算法适合构造一个稠密图G的最小生成树，Kruskal算法适合构造一个稀疏图G的最小生成树。"}],"tags":["数据结构复习资料","single","第五章 树和二叉树"],"difficulty":"复习"},{"id":"DS-REVIEW-016","source":"数据结构复习资料","chapter":"第七章 查找","type":"single","title":"对n个元素的表做顺序查找时，若查找每个元素的概率相同，则平均查找长度为（ ）。","options":[{"label":"A","text":"(n-1)/2"},{"label":"B","text":"n/2"},{"label":"C","text":"(n+1)/2"},{"label":"D","text":"n"}],"answer":"C","explanations":[{"label":"资料解析","text":"总查找次数N=1+2+3+…+n=n(n+1)/2，则平均查找长度为N/n=(n+1)/2。"}],"tags":["数据结构复习资料","single","第七章 查找"],"difficulty":"复习"},{"id":"DS-REVIEW-017","source":"数据结构复习资料","chapter":"第七章 查找","type":"single","title":"适用于折半查找的表的存储方式及元素排列要求为（ ）。","options":[{"label":"A","text":"链接方式存储，元素无序"},{"label":"B","text":"链接方式存储，元素有序"},{"label":"C","text":"顺序方式存储，元素无序"},{"label":"D","text":"顺序方式存储，元素有序"}],"answer":"D","explanations":[{"label":"资料解析","text":"折半查找要求线性表必须采用顺序存储结构，而且表中元素按关键字有序排列。"}],"tags":["数据结构复习资料","single","第七章 查找"],"difficulty":"复习"},{"id":"DS-REVIEW-018","source":"数据结构复习资料","chapter":"第七章 查找","type":"single","title":"设哈希表长为14，哈希函数是H(key)=key%11，表中已有数据的关键字为15，38，61，84共四个，现要将关键字为49的元素加到表中，用二次探测法解决冲突，则放入的位置是（ ）。","options":[{"label":"A","text":"8"},{"label":"B","text":"3"},{"label":"C","text":"5"},{"label":"D","text":"9"}],"answer":"D","explanations":[{"label":"资料解析","text":"关键字15放入位置4，关键字38放入位置5，关键字61放入位置6，关键字84放入位置7，再添加关键字49，计算得到地址为5，冲突，用二次探测法解决冲突得到新地址为6，仍冲突，再用用二次探测法解决冲突，得到新地址为4，仍冲突，再用用二次探测法解决冲突，得到新地址为9，不冲突，即将关键字49放入位置9。"}],"tags":["数据结构复习资料","single","第七章 查找"],"difficulty":"复习"},{"id":"DS-REVIEW-019","source":"数据结构复习资料","chapter":"第七章 查找","type":"single","title":"采用线性探测法处理冲突，可能要探测多个位置，在查找成功的情况下，所探测的这些位置上的关键字 ( )。","options":[{"label":"A","text":"不一定都是同义词"},{"label":"B","text":"一定都是同义词"},{"label":"C","text":"一定都不是同义词"},{"label":"D","text":"都相同"}],"answer":"A","explanations":[{"label":"资料解析","text":"所探测的这些关键字可能是在处理其它关键字冲突过程中放入该位置的。"}],"tags":["数据结构复习资料","single","第七章 查找"],"difficulty":"复习"},{"id":"DS-REVIEW-020","source":"数据结构复习资料","chapter":"第八章 排序","type":"single","title":"从未排序序列中依次取出元素与已排序序列中的元素进行比较，将其放入已排序序列的正确位置上的方法，这种排序方法称为（ ）。","options":[{"label":"A","text":"归并排序"},{"label":"B","text":"冒泡排序"},{"label":"C","text":"插入排序"},{"label":"D","text":"选择排序"}],"answer":"C","explanations":[{"label":"资料解析","text":"正确答案：C"}],"tags":["数据结构复习资料","single","第八章 排序"],"difficulty":"复习"},{"id":"DS-REVIEW-021","source":"数据结构复习资料","chapter":"第八章 排序","type":"single","title":"若一组记录的排序码为（46, 79，56，38，40，84），则利用快速排序的方法，以第一个记录为基准得到的一次划分结果为（ ）。","options":[{"label":"A","text":"38，40，46，56，79，84"},{"label":"B","text":"40，38，46，79，56，84"},{"label":"C","text":"40，38，46，56，79，84"},{"label":"D","text":"40，38，46，84，56，79"}],"answer":"C","explanations":[{"label":"资料解析","text":"正确答案：C"}],"tags":["数据结构复习资料","single","第八章 排序"],"difficulty":"复习"},{"id":"DS-REVIEW-022","source":"数据结构复习资料","chapter":"第八章 排序","type":"single","title":"下列关键字序列中，（ ）是堆。","options":[{"label":"A","text":"16，72，31，23，94，53"},{"label":"B","text":"94，23，31，72，16，53"},{"label":"C","text":"16，53，23，94，31，72"},{"label":"D","text":"16，23，53，31，94，72"}],"answer":"D","explanations":[{"label":"资料解析","text":"D选项为小根堆"}],"tags":["数据结构复习资料","single","第八章 排序"],"difficulty":"复习"},{"id":"DS-REVIEW-023","source":"数据结构复习资料","chapter":"第八章 排序","type":"single","title":"堆是一种（ ）排序。","options":[{"label":"A","text":"插入"},{"label":"B","text":"选择"},{"label":"C","text":"交换"},{"label":"D","text":"归并"}],"answer":"B","explanations":[{"label":"资料解析","text":"正确答案：B"}],"tags":["数据结构复习资料","single","第八章 排序"],"difficulty":"复习"},{"id":"DS-REVIEW-024","source":"数据结构复习资料","chapter":"第一章 绪论","type":"short","title":"1．简述下列概念：数据、数据元素、数据项、数据对象、数据结构、逻辑结构、存储结构、抽象数据类型。","answer":"数据：是客观事物的符号表示，指所有能输入到计算机中并被计算机程序处理的符号的总称。如数学计算中用到的整数和实数，文本编辑所用到的字符串，多媒体程序处理的图形、图像、声音、动画等通过特殊编码定义后的数据。\n数据元素：是数据的基本单位，在计算机中通常作为一个整体进行考虑和处理。在有些情况下，数据元素也称为元素、结点、记录等。数据元素用于完整地描述一个对象，如一个学生记录，树中棋盘的一个格局（状态）、图中的一个顶点等。\n数据项：是组成数据元素的、有独立含义的、不可分割的最小单位。例如，学生基本信息表中的学号、姓名、性别等都是数据项。\n数据对象：是性质相同的数据元素的集合，是数据的一个子集。例如：整数数据对象是集合N={0，±1，±2，…}，字母字符数据对象是集合C={‘A’，‘B’，…，‘Z’， ‘a’，‘b’，…，‘z’}，学生基本信息表也可是一个数据对象。\n数据结构：是相互之间存在一种或多种特定关系的数据元素的集合。换句话说，数据结构是带“结构”的数据元素的集合，“结构”就是指数据元素之间存在的关系。\n逻辑结构：从逻辑关系上描述数据，它与数据的存储无关，是独立于计算机的。因此，数据的逻辑结构可以看作是从具体问题抽象出来的数学模型。\n存储结构：数据对象在计算机中的存储表示，也称为物理结构。\n抽象数据类型：由用户定义的，表示应用问题的数学模型，以及定义在这个模型上的一组操作的总称。具体包括三部分：数据对象、数据对象上关系的集合和对数据对象的基本操作的集合。","explanations":[{"label":"复习资料","text":"来自数据结构复习资料，可按参考答案自行核对。"}],"tags":["数据结构复习资料","short","第一章 绪论"],"difficulty":"复习"},{"id":"DS-REVIEW-025","source":"数据结构复习资料","chapter":"第一章 绪论","type":"short","title":"2．试举一个数据结构的例子，叙述其逻辑结构和存储结构两方面的含义和相互关系。","answer":"例如有一张学生基本信息表，包括学生的学号、姓名、性别、籍贯、专业等。每个学生基本信息记录对应一个数据元素，学生记录按顺序号排列，形成了学生基本信息记录的线性序列。对于整个表来说，只有一个开始结点(它的前面无记录)和一个终端结点(它的后面无记录)，其他的结点则各有一个也只有一个直接前趋和直接后继。学生记录之间的这种关系就确定了学生表的逻辑结构，即线性结构。\n这些学生记录在计算机中的存储表示就是存储结构。如果用连续的存储单元(如用数组表示)来存放这些记录，则称为顺序存储结构；如果存储单元不连续，而是随机存放各个记录，然后用指针进行链接，则称为链式存储结构。\n即相同的逻辑结构，可以对应不同的存储结构。","explanations":[{"label":"复习资料","text":"来自数据结构复习资料，可按参考答案自行核对。"}],"tags":["数据结构复习资料","short","第一章 绪论"],"difficulty":"复习"},{"id":"DS-REVIEW-026","source":"数据结构复习资料","chapter":"数据结构复习资料","type":"short","title":"4．存储结构由哪两种基本的存储方法实现？","answer":"（1）顺序存储结构\n顺序存储结构是借助元素在存储器中的相对位置来表示数据元素之间的逻辑关系，通常借助程序设计语言的数组类型来描述。\n（2）链式存储结构\n顺序存储结构要求所有的元素依次存放在一片连续的存储空间中，而链式存储结构，无需占用一整块存储空间。但为了表示结点之间的关系，需要给每个结点附加指针字段，用于存放后继元素的存储地址。所以链式存储结构通常借助于程序设计语言的指针类型来描述。","explanations":[{"label":"复习资料","text":"来自数据结构复习资料，可按参考答案自行核对。"}],"tags":["数据结构复习资料","short","数据结构复习资料"],"difficulty":"复习"},{"id":"DS-REVIEW-027","source":"数据结构复习资料","chapter":"第二章 线性表","type":"short","title":"（1）设计一个算法，删除递增有序链表中值大于mink且小于maxk的所有元素（mink和maxk是给定的两个参数，其值可以和表中的元素相同，也可以不同 ）。","answer":"[题目分析]\n分别查找第一个值>mink的结点和第一个值 ≥maxk的结点，再修改指针，删除值大于mink且小于maxk的所有元素。\n[算法描述]\nvoid delete(LinkList &L, int mink, int maxk) {\nP=L->next---- //首元结点\nwhile (p && p->data<=mink)\n{pre=p;p=p->next-------} //查找第一个值>mink的结点\nif (p)\n{while (p && p->data<maxk) p=p->next;------\n// 查找第一个值 ≥maxk的结点\nq=pre->next;pre->next=p; ---------- // 修改指针\nwhile (q!=p)\n{ s=q->next; delete q; q=s; } // 释放结点空间\n}//if\n}","explanations":[{"label":"算法思路","text":"先定位区间前驱与区间后继，再断链并释放区间结点。"}],"tags":["数据结构复习资料","short","第二章 线性表"],"difficulty":"复习"}];
const CARDS = [{"title":"复杂度速记","body":"O(1) < O(log n) < O(n) < O(n log n) < O(n²) < O(2ⁿ)。忽略常数、低阶项。"},{"title":"数据结构三要素","body":"逻辑结构、存储结构、数据的运算。逻辑讲关系，存储讲表示，运算讲操作。"},{"title":"线性表存储对比","body":"顺序表：随机访问O(1)，插入删除移动元素。链表：不支持随机访问，已知位置插删改指针即可。"},{"title":"头结点作用","body":"统一首元结点和其他结点的插入删除处理，减少特殊分支。空表条件 head->next == NULL。"},{"title":"单链表后插","body":"s->next = p->next; p->next = s; 顺序不能反，否则原后继会丢失。"},{"title":"栈与队列","body":"栈：后进先出，只在栈顶操作。队列：先进先出，队尾入队，队头出队。"},{"title":"循环队列","body":"常见牺牲一个单元：队空 front==rear；队满 (rear+1)%m==front；元素个数 (rear-front+m)%m。"},{"title":"链栈入栈","body":"s->next = top; top = s。链栈动态分配，通常不判满，但仍可能内存不足。"},{"title":"表达式求值","body":"中缀转后缀用运算符栈；计算后缀表达式用操作数栈。"},{"title":"稀疏矩阵三元组","body":"只存非零元：行下标、列下标、值。用于非零元远少于零元的矩阵。"},{"title":"快速转置","body":"先统计每列非零元数，再求转置后每行起始位置，一次扫描完成放置。"},{"title":"广义表","body":"元素可以是原子或子表。长度看最外层元素个数，深度看最大括号嵌套层数。"},{"title":"表头表尾","body":"非空广义表表头可以是原子或子表；表尾一定是广义表。"},{"title":"复习资料：考试题型提示","body":"单选、填空、判断、算法填空、综合应用题画最小生成树、画散列表（留过作业）"},{"title":"总复习提纲：第一章","body":"数据结构：逻辑结构和存储结构；数据、数据元素、数据项、数据结构的概念。；ADT抽象数据类型的概念。；时间复杂度和空间复杂度计算方法。；算法的定义和特性（5个）。"},{"title":"总复习提纲：第二章","body":"线性表的顺序存储结构（顺序表）：计算地址的方法；优缺点；“随机存取”；线性表的链式存储结构：使用场景；存储密度；优缺点。；顺序表的基本操作：访问第i个元素、插入、删除等，以及时间复杂度。；单链表的基本操作：创建、插入、删除、判断表是否为空等（基本语句）。；注意带头结点的单链表和不带头结点的单链表的区别。；双向链表的基本操作：访问第i个元素、插入、删除等（基本语句）。；有序表的合并（基本语句）"},{"title":"总复习提纲：第三章","body":"栈和队列：定义、逻辑结构、存储结构、运算规则（先进后出、先进先出）。；栈、队列是一种特殊（操作受限）的线性表。区别：仅在于运算规则不同。；2、顺序栈、链栈的基本操作：判断栈是否为空、是否为满、进栈、出栈、取栈顶元素等（基本语句）；3、循环队列、链队列的基本操作：队列长度、是否为满、是否为空、进队、出队等（基本语句）；4、栈和递归：递归调用次数、栈的应用场景(递归调用、函数调用、判断括号是否匹配、表达式求值)。；5、进出队列和栈的序列。"},{"title":"总复习提纲：第四章","body":"串、主串、子串（子串个数）等相关概念。；bf和kmp模式匹配算法：算法思想、时间复杂度；kmp算法的next和nextval的计算。；二维、三维、n维数组：计算数组元素地址。；特殊矩阵的压缩存储：对称阵、三角阵的元素地址计算。；稀疏矩阵的存储结构:三元组、十字链表；广义表的基本操作：求head、tail；求长度、深度"},{"title":"总复习提纲：第五章","body":"树和二叉树的定义和区别：无序、有序；例：3个结点可以构造出多少种不同的树和二叉树？；二叉树的5个性质：计算；完全二叉树的性质：n1=1或n1=0(度为1的结点数等于0或者1)；满m叉树的性质：由满二叉树性质推得；二叉树的先、中、后序遍历；线索二叉树：先序、中序、后序线索二叉树；树的存储结构：双亲表示法、孩子表示法、带双亲的孩子表示法、孩子兄弟法（二叉链表）；8、树、森林转换为二叉树；9、哈夫曼树的定义、构造方法以及哈夫曼树的性质：哈夫曼编码是最优的前缀码，没有度为1的结点。带权路径长度最小。；10、哈夫曼编码；11、树和森林的遍历"},{"title":"总复习提纲：第六章","body":"完全图的定义和性质：无向完全图、有向完全图边数。；顶点的度的计算；回路、简单回路、简单路径等的基本概念；图的存储结构：邻接矩阵和邻接表；4、广度优先遍历：遍历序列、队列；不同存储结构的时间复杂度。；深度优先遍历：遍历序列、栈；不同存储结构的时间复杂度。；最小生成树定义；最小生成树算法：prim、Kruskal和时间复杂度，适用场景（稠密图、稀疏图）；6、拓扑排序：拓扑排序序列、判断图是否有环；7、单源最短路径：Djkstra算法；8、每对顶点之间的最短路径算法Floyd；9、关键路径算法"},{"title":"总复习提纲：第七章","body":"线性表查找算法思想、存储结构和平均查找长度（时间复杂度）：顺序查找、折半查找、分块查找；二叉排序树的定义；二叉排序树的性质：中序遍历非空的二叉排序树，得到按照关键字排列的递增有序列；二叉排序树查找和平均查找长度计算；二叉排序树的生成、插入操作；二叉排序树删除结点：4种情况（叶子结点、只有左子树的结点、只有右子树的节点，同时右左右子树的结点）；平衡二叉树的定义：平衡因子=左子树高度-右子树高度；平衡排序树的调整原则：RR、LL、RL、LR（树的高度降低；保持二叉排序树的性质。）；哈希函数的构造方法：重点：除留余数法；哈希表处理冲突的方法：开放地址（线性探测、二次探测、为随机数探测）和链地址法；哈希表的查找和平均查找长度计算。"},{"title":"总复习提纲：第八章","body":"1、插入排序：直接插入排序（基于顺序查找）、折半插入排序（基于折半查找）、希尔插入排序（基于逐趟缩小增量）；交换排序：冒泡排序、快速排序；选择排序：简单选择排序、堆排序；归并排序：2-路归并排序；基数排序：分配排序：唯一不需要比较的排序；最好、最坏情况的时间复杂度（比较次数、移动次数）；空间复杂度；稳定性；外部排序：两个步骤：（1）划分归并段（2）归并；对m个归并段进行k-路平衡归并的归并趟数s：；k-路平衡归并的比较次数：；使用“败者树”，总比较次数变为：；外部排序-置换选择排序；外部排序-最佳归并树"},{"title":"期末复习要点：一、基础概念总论","body":"数据结构研究三大核心：数据元素、数据间逻辑关系、数据存储方式，不涉及数据商业价值。；数据结构分为两大模块：逻辑结构 + 存储结构。；逻辑结构分类：线性结构、树形结构、图形结构；树、图属于非线性结构。；存储结构分类：顺序存储、链式存储等，存储结构和逻辑结构相互独立。"},{"title":"期末复习要点：二、线性结构","body":"（一）线性表；两种主流存储：顺序存储、链式存储。；顺序表；占用连续内存空间；；支持随机访问（下标直接取值）；；插入、删除需要移动大量元素，效率偏低。；链表；内存空间不连续，依靠指针连接节点；；仅支持顺序访问，无法随机存取；；插入、删除仅修改指针，操作效率高；；循环链表：尾节点指针指向头节点。；（二）栈；本质：特殊线性表，操作仅限一端。；操作规则：先进后出（后进先出）。；术语：允许插入、删除的一端称为栈顶。；（三）队列；本质：特殊线性表，操作仅限两端。；操作规则：先进先出。；循环队列：主要用来解决普通顺序队列的假溢出问题。；栈与队列异同总结；相同点：都属于特殊线性表，仅在端点操作，不能对中间元素操作。；不同点：存取规则不同，栈先进后出，队列先进先出。"},{"title":"期末复习要点：三、树形结构（二叉树为主）","body":"基本定义；叶子节点：没有左、右孩子的节点。；树的度：树中节点的最大度数。；二叉树节点规律：第层最大节点数为。；完全二叉树；高度为，最少节点数：；；关系：满二叉树一定是完全二叉树，反之不成立。；二叉树三大遍历规则；前序遍历：根 → 左子树 → 右子树；中序遍历：左子树 → 根 → 右子树；后序遍历：左子树 → 右子树 → 根；考点应用：根据前序 + 中序、中序 + 后序还原二叉树，并写出对应遍历序列。"},{"title":"期末复习要点：四、图形结构","body":"两大遍历方式；深度优先遍历：缩写DFS；广度优先遍历：缩写BFS；DFS、BFS 均可用于连通图的遍历。"},{"title":"期末复习要点：五、排序算法（核心考点）","body":"稳定排序 & 不稳定排序；稳定排序：排序后相等元素相对位置不变，代表：冒泡排序、直接插入排序。；不稳定排序：排序后相等元素相对位置可能改变，代表：快速排序、简单选择排序、堆排序。；冒泡排序；原理：逐一遍历序列，相邻元素两两比较，逆序则交换，每一趟将当前最大值移至末尾。；时间复杂度：最坏情况，最好情况（已有序）。；实操考点：手写升序 / 降序每一趟冒泡排序结果。"},{"title":"期末复习要点：六、其他常用数据结构","body":"哈希表；核心作用：实现快速查找。；冲突解决方法：开放定址法、链地址法。；注意：哈希表并非绝对查找，存在冲突时效率下降。；稀疏矩阵：主流存储方式为三元组表。"},{"title":"期末复习要点：七、概念易混点","body":"栈、队列都属于特殊线性表（正确）。；链表不能随机访问（错误）。；满二叉树与完全二叉树的包含关系（正确）。；简单选择排序属于不稳定排序（错误）。；数据逻辑结构和存储方式无关（正确）。"},{"title":"期末复习要点：八、易混知识点","body":"顺序表与链表区别：从存储方式、访问方式、增删效率三点作答。；栈和队列：先答共同点（特殊线性表、端点操作），再答不同点（存取规则）。；二叉树遍历：分别写明前、中、后序 “根、左、右” 的访问顺序。；稳定排序：先定义概念，再各举 1~2 个典型算法例子。"}];

function norm(s){return String(s||'').replace(/\s+/g,'').replace(/[；;，,。\.]/g,'').toLowerCase();}
function isCorrect(q, val){
  if(q.type==='single'||q.type==='judge') return val===q.answer;
  if(q.type==='multiple') return [...val].sort().join('') === [...q.answer].sort().join('');
  if(q.type==='fill') {
    if(!Array.isArray(val)) return false; const ans=q.answer||[]; if(val.length<ans.length) return false;
    return ans.every((a,i)=> norm(val[i]).includes(norm(a)) || norm(a).includes(norm(val[i])));
  }
  return null;
}
function filteredQuestions(){
  const c=document.getElementById('chapterFilter').value, t=document.getElementById('typeFilter').value, s=document.getElementById('sourceFilter').value, kw=document.getElementById('searchBox').value.trim().toLowerCase();
  let arr=QUESTIONS.filter(q=>(!c||q.chapter===c)&&(!t||q.type===t)&&(!s||q.source===s));
  if(kw) arr=arr.filter(q=>JSON.stringify(q).toLowerCase().includes(kw));
  if(mode==='wrong') arr=arr.filter(q=>state.wrong.includes(q.id));
  if(shuffled) arr=[...arr].sort(()=>Math.random()-0.5);
  return arr;
}
function initFilters(){
  const chapters=[...new Set(QUESTIONS.map(q=>q.chapter))];
  chapterFilter.innerHTML='<option value="">全部章节</option>'+chapters.map(x=>`<option>${x}</option>`).join('');
  typeFilter.innerHTML='<option value="">全部题型</option>'+Object.entries(TYPE_NAME).map(([k,v])=>`<option value="${k}">${v}</option>`).join('');
  sourceFilter.innerHTML='<option value="">全部来源</option>'+[...new Set(QUESTIONS.map(q=>q.source))].map(x=>`<option>${x}</option>`).join('');
}
function renderMeta(q,i){return `<div class="meta"><span class="pill gray">${i+1}</span><span class="pill">${q.chapter}</span><span class="pill gray">${TYPE_NAME[q.type]}</span><span class="pill ${q.source==='原题'?'green':'amber'}">${q.source}</span><span class="pill gray">${q.difficulty||''}</span></div>`}
function answerText(q){
  if(q.type==='single'||q.type==='multiple') return q.answer;
  if(q.type==='judge') return q.answer;
  if(q.type==='fill') return (q.answer||[]).join('；');
  return q.answer;
}
function renderQuestion(q,i, exam=false){
  const saved = exam ? (state.exam.answers||{})[q.id] : state.answers[q.id];
  const checked = saved !== undefined;
  let body='';
  if(q.type==='single'||q.type==='judge'){
    body=q.options.map(o=>`<label class="option" data-label="${o.label}"><input type="radio" name="q_${q.id}" value="${o.label}" ${saved===o.label?'checked':''}> <span class="label">${o.label}</span><span>${o.text}</span></label>`).join('');
  } else if(q.type==='multiple'){
    const set=new Set(String(saved||'').split(''));
    body=q.options.map(o=>`<label class="option" data-label="${o.label}"><input type="checkbox" name="q_${q.id}" value="${o.label}" ${set.has(o.label)?'checked':''}> <span class="label">${o.label}</span><span>${o.text}</span></label>`).join('');
  } else if(q.type==='fill'){
    const arr=Array.isArray(saved)?saved:[];
    const blanks=Math.max((q.answer||[]).length, (q.title.match(/_(2,)/g)||[]).length, 1);
    body=Array.from({length:blanks},(_,k)=>`<input class="fill-input" data-index="${k}" placeholder="第${k+1}空" value="${arr[k]||''}">`).join('');
  } else {
    body=`<textarea class="short-input" placeholder="先自己写，再查看参考答案。">${saved||''}</textarea>`;
  }
  return `<div class="card q-card" data-id="${q.id}">${renderMeta(q,i)}<div class="q-title">${q.title}</div>${body}<div class="footer-actions"><button class="checkBtn">${exam?'保存答案':'提交/查看解析'}</button>${q.type==='short'?'<button class="showRef ghost">查看参考答案</button>':''}<button class="markWrong ghost">加入/移出错题</button></div><div class="explain"><div class="row"><b>正确答案：</b><span class="badge-green">${answerText(q)}</span></div>${(q.explanations||[]).map(e=>`<div class="row"><b>${e.label}：</b>${escapeHtml(e.text)}</div>`).join('')}</div></div>`
}
function escapeHtml(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function applyMark(card,q,val,show){
  if(!show) return;
  card.querySelectorAll('.option').forEach(el=>{
    const lab=el.dataset.label; el.classList.remove('correct','wrong');
    const ok = q.type==='multiple' ? q.answer.includes(lab) : q.answer===lab;
    const chosen = q.type==='multiple' ? String(val||'').includes(lab) : val===lab;
    if(ok) el.classList.add('correct');
    if(chosen && !ok) el.classList.add('wrong');
  });
  card.querySelector('.explain').classList.add('show');
}
function getCardAnswer(card,q){
  if(q.type==='single'||q.type==='judge') return (card.querySelector(`input[name="q_${q.id}"]:checked`)||{}).value || '';
  if(q.type==='multiple') return [...card.querySelectorAll(`input[name="q_${q.id}"]:checked`)].map(x=>x.value).sort().join('');
  if(q.type==='fill') return [...card.querySelectorAll('.fill-input')].map(x=>x.value.trim());
  return (card.querySelector('.short-input')||{}).value || '';
}
function bindCards(exam=false){
  document.querySelectorAll('.q-card').forEach(card=>{
    const q=QUESTIONS.find(x=>x.id===card.dataset.id);
    const saved = exam ? (state.exam.answers||{})[q.id] : state.answers[q.id];
    if(saved!==undefined && !exam) applyMark(card,q,saved,true);
    card.querySelector('.checkBtn').onclick=()=>{
      const val=getCardAnswer(card,q);
      if(exam){state.exam.answers=state.exam.answers||{}; state.exam.answers[q.id]=val; save(); return;}
      state.answers[q.id]=val;
      const ok=isCorrect(q,val);
      if(ok===false && !state.wrong.includes(q.id)) state.wrong.push(q.id);
      if(ok===true) state.wrong=state.wrong.filter(id=>id!==q.id);
      applyMark(card,q,val,true); save();
    };
    const sr=card.querySelector('.showRef'); if(sr) sr.onclick=()=>card.querySelector('.explain').classList.toggle('show');
    card.querySelector('.markWrong').onclick=()=>{state.wrong = state.wrong.includes(q.id) ? state.wrong.filter(id=>id!==q.id) : [...state.wrong,q.id]; save(); render();};
  });
}
function renderStudy(){ const arr=filteredQuestions(); panel.innerHTML=arr.map((q,i)=>renderQuestion(q,i,false)).join('') || '<div class="card">没有匹配题目。</div>'; bindCards(false); }
function startExam(){
  const pool=filteredQuestions().filter(q=>q.type!=='short');
  const n=Math.min(parseInt(document.getElementById('examCount')?.value||'30'), pool.length);
  const picks=[...pool].sort(()=>Math.random()-0.5).slice(0,n);
  state.exam={ids:picks.map(q=>q.id),answers:{},submitted:false}; save(); renderExam();
}
function submitExam(){state.exam.submitted=true; save(); renderExam();}
function renderExam(){
  if(!state.exam.ids){ panel.innerHTML=`<div class="card"><h2>模拟考试</h2><p>从当前筛选结果中随机抽题，简答题默认不进入自动判分。</p><input id="examCount" value="30" placeholder="抽题数量"><div class="footer-actions"><button id="startExamBtn">开始考试</button></div></div>`; startExamBtn.onclick=startExam; return; }
  const arr=state.exam.ids.map(id=>QUESTIONS.find(q=>q.id===id)).filter(Boolean);
  if(state.exam.submitted){
    const rows=arr.map(q=>{const val=(state.exam.answers||{})[q.id]; const ok=isCorrect(q,val); return {q,val,ok};});
    const correct=rows.filter(r=>r.ok===true).length;
    panel.innerHTML=`<div class="card result"><strong>${correct} / ${rows.length}</strong><br>正确率：${rows.length?Math.round(correct*100/rows.length):0}%<div class="footer-actions"><button id="newExamBtn">重新组卷</button></div></div>`+rows.map((r,i)=>renderQuestion(r.q,i,false)).join('');
    newExamBtn.onclick=()=>{delete state.exam.ids; save(); renderExam();}; bindCards(false);
    document.querySelectorAll('.q-card').forEach(card=>{const q=QUESTIONS.find(x=>x.id===card.dataset.id); const val=(state.exam.answers||{})[q.id]; applyMark(card,q,val,true); });
  } else {
    panel.innerHTML=`<div class="card"><b>考试进行中：</b>${arr.length}题<div class="footer-actions"><button id="submitExamBtn" class="warn">交卷</button><button id="cancelExamBtn" class="ghost">取消本卷</button></div></div>`+arr.map((q,i)=>renderQuestion(q,i,true)).join('');
    submitExamBtn.onclick=submitExam; cancelExamBtn.onclick=()=>{state.exam={}; save(); renderExam();}; bindCards(true);
  }
}
function renderBrowse(){
 const arr=filteredQuestions();
 panel.innerHTML=`<div class="card"><b>题库浏览：</b>${arr.length}题。点击“提交/查看解析”可直接看答案。</div>`+arr.map((q,i)=>renderQuestion(q,i,false)).join(''); bindCards(false);
}
function renderCards(){ panel.innerHTML=`<div class="card"><h2>复习资料</h2><p class="small">共 ${CARDS.length} 张卡片，包含速记知识点和本次导入的复习提纲。</p></div><div class="grid">`+CARDS.map(c=>`<div class="card"><h3>${c.title}</h3><p>${c.body}</p></div>`).join('')+'</div>'; }
function render(){ if(mode==='study') renderStudy(); else if(mode==='exam') renderExam(); else if(mode==='wrong') renderStudy(); else if(mode==='browse') renderBrowse(); else renderCards(); updateStats(); }
function updateStats(){
 const arr=filteredQuestions(); totalCount.textContent=arr.length; wrongCount.textContent=state.wrong.length;
 const answered=Object.keys(state.answers||{}).length; doneCount.textContent=answered;
 let attempts=0, correct=0; for(const [id,val] of Object.entries(state.answers||{})){const q=QUESTIONS.find(x=>x.id===id); if(!q||q.type==='short') continue; const ok=isCorrect(q,val); if(ok!==null){attempts++; if(ok) correct++;}}
 accRate.textContent=attempts?Math.round(correct*100/attempts)+'%':'0%';
}
window.studyHubPracticeStats=()=>{
 const answered=Object.keys(state.answers||{}).length;
 let attempts=0, correct=0;
 for(const [id,val] of Object.entries(state.answers||{})){const q=QUESTIONS.find(x=>x.id===id); if(!q||q.type==='short') continue; const ok=isCorrect(q,val); if(ok!==null){attempts++; if(ok) correct++;}}
 const chapters=new Set(QUESTIONS.map(q=>q.chapter||'未分类')).size;
 const types=new Set(QUESTIONS.map(q=>q.type||'other')).size;
 return {total:QUESTIONS.length,done:answered,wrong:state.wrong.length,accuracy:attempts?Math.round(correct*100/attempts)+'%':'0%',extraLabel:'章节/题型',extraValue:`${chapters}/${types}`};
};
initFilters();
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); mode=b.dataset.mode; render();});
[chapterFilter,typeFilter,sourceFilter,searchBox].forEach(el=>el.addEventListener('input',()=>{shuffled=false; render();}));
shuffleBtn.onclick=()=>{shuffled=!shuffled; render();};
resetWrongBtn.onclick=()=>{state.wrong=[]; save(); render();};
exportBtn.onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ds-practice-progress.json'; a.click();};
function practiceQuestionType(q){return q.type}
window.studyHubPracticeNav=()=>{
  if(mode!=='study')return null;
  const list=filteredQuestions();
  if(!list.length)return null;
  return {mode:'study',title:'答题卡',current:null,items:list.map((q,i)=>({id:q.id,index:i+1,label:String(i+1),type:practiceQuestionType(q),done:state.answers[q.id]!==undefined,wrong:state.wrong.includes(q.id)})),jump(index){const q=list[index-1];if(!q)return;const card=[...document.querySelectorAll('.q-card')].find(el=>el.dataset.id===q.id);if(card)card.scrollIntoView({behavior:'auto',block:'start'});}};
};
render();
</script>
</body></html>
