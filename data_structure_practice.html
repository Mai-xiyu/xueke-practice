<head>

<style>
:root { --bg:#f6f7fb; --card:#fff; --text:#111827; --muted:#6b7280; --line:#e5e7eb; --primary:#2563eb; --green:#16a34a; --red:#dc2626; --amber:#d97706; }
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',Arial,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.header-inner{max-width:1180px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
h1{font-size:20px;margin:0} .sub{font-size:12px;color:var(--muted);margin-top:4px}
main{max-width:1180px;margin:0 auto;padding:18px;display:grid;grid-template-columns:270px 1fr;gap:18px}
.sidebar{position:sticky;top:76px;align-self:start;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
.stat{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0} .stat div{background:#f9fafb;border:1px solid var(--line);border-radius:10px;padding:10px}
.stat b{display:block;font-size:20px} .stat span{font-size:12px;color:var(--muted)}
button,select,input,textarea{font:inherit} button{border:0;border-radius:10px;background:var(--primary);color:#fff;padding:9px 12px;cursor:pointer} button.secondary{background:#111827} button.ghost{background:#fff;color:#111827;border:1px solid var(--line)} button.warn{background:var(--amber)} button.danger{background:var(--red)}
.controls{display:grid;gap:10px} select,input{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:#fff} textarea{width:100%;min-height:110px;padding:10px;border:1px solid var(--line);border-radius:10px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px} .tabs button{background:#fff;color:#111827;border:1px solid var(--line)} .tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px} .pill{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3} .pill.gray{background:#f3f4f6;color:#4b5563} .pill.green{background:#dcfce7;color:#166534} .pill.amber{background:#fef3c7;color:#92400e}
.q-title{font-size:17px;line-height:1.55;margin:6px 0 12px;white-space:pre-wrap}
.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:8px 0;background:#fff;cursor:pointer}
.option input{width:auto;margin-top:3px} .option.correct{border-color:#86efac;background:#f0fdf4} .option.wrong{border-color:#fca5a5;background:#fef2f2} .label{font-weight:700;min-width:22px}
.explain{border-top:1px solid var(--line);margin-top:12px;padding-top:12px;display:none} .explain.show{display:block}
.explain .row{padding:8px 10px;border-radius:10px;background:#f9fafb;margin:6px 0;line-height:1.55}
.footer-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.result{font-size:16px;line-height:1.7} .result strong{font-size:22px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.code{white-space:pre-wrap;font-family:Consolas,'Courier New',monospace;background:#111827;color:#e5e7eb;border-radius:12px;padding:12px;line-height:1.45;overflow:auto}
.hidden{display:none!important}
.badge-red{color:var(--red);font-weight:700} .badge-green{color:var(--green);font-weight:700}
@media (max-width: 860px){main{grid-template-columns:1fr}.sidebar{position:static}.header-inner{display:block}}

<script>
let QUESTIONS = [];
const CARDS = [{"title":"复杂度速记","body":"O(1) < O(log n) < O(n) < O(n log n) < O(n²) < O(2ⁿ)。忽略常数、低阶项。"},{"title":"数据结构三要素","body":"逻辑结构、存储结构、数据的运算。逻辑讲关系，存储讲表示，运算讲操作。"},{"title":"线性表存储对比","body":"顺序表：随机访问O(1)，插入删除移动元素。链表：不支持随机访问，已知位置插删改指针即可。"},{"title":"头结点作用","body":"统一首元结点和其他结点的插入删除处理，减少特殊分支。空表条件 head->next == NULL。"},{"title":"单链表后插","body":"s->next = p->next; p->next = s; 顺序不能反，否则原后继会丢失。"},{"title":"栈与队列","body":"栈：后进先出，只在栈顶操作。队列：先进先出，队尾入队，队头出队。"},{"title":"循环队列","body":"常见牺牲一个单元：队空 front==rear；队满 (rear+1)%m==front；元素个数 (rear-front+m)%m。"},{"title":"链栈入栈","body":"s->next = top; top = s。链栈动态分配，通常不判满，但仍可能内存不足。"},{"title":"表达式求值","body":"中缀转后缀用运算符栈；计算后缀表达式用操作数栈。"},{"title":"稀疏矩阵三元组","body":"只存非零元：行下标、列下标、值。用于非零元远少于零元的矩阵。"},{"title":"快速转置","body":"先统计每列非零元数，再求转置后每行起始位置，一次扫描完成放置。"},{"title":"广义表","body":"元素可以是原子或子表。长度看最外层元素个数，深度看最大括号嵌套层数。"},{"title":"表头表尾","body":"非空广义表表头可以是原子或子表；表尾一定是广义表。"},{"title":"复习资料：考试题型提示","body":"单选、填空、判断、算法填空、综合应用题画最小生成树、画散列表（留过作业）"},{"title":"总复习提纲：第一章","body":"数据结构：逻辑结构和存储结构；数据、数据元素、数据项、数据结构的概念。；ADT抽象数据类型的概念。；时间复杂度和空间复杂度计算方法。；算法的定义和特性（5个）。"},{"title":"总复习提纲：第二章","body":"线性表的顺序存储结构（顺序表）：计算地址的方法；优缺点；“随机存取”；线性表的链式存储结构：使用场景；存储密度；优缺点。；顺序表的基本操作：访问第i个元素、插入、删除等，以及时间复杂度。；单链表的基本操作：创建、插入、删除、判断表是否为空等（基本语句）。；注意带头结点的单链表和不带头结点的单链表的区别。；双向链表的基本操作：访问第i个元素、插入、删除等（基本语句）。；有序表的合并（基本语句）"},{"title":"总复习提纲：第三章","body":"栈和队列：定义、逻辑结构、存储结构、运算规则（先进后出、先进先出）。；栈、队列是一种特殊（操作受限）的线性表。区别：仅在于运算规则不同。；2、顺序栈、链栈的基本操作：判断栈是否为空、是否为满、进栈、出栈、取栈顶元素等（基本语句）；3、循环队列、链队列的基本操作：队列长度、是否为满、是否为空、进队、出队等（基本语句）；4、栈和递归：递归调用次数、栈的应用场景(递归调用、函数调用、判断括号是否匹配、表达式求值)。；5、进出队列和栈的序列。"},{"title":"总复习提纲：第四章","body":"串、主串、子串（子串个数）等相关概念。；bf和kmp模式匹配算法：算法思想、时间复杂度；kmp算法的next和nextval的计算。；二维、三维、n维数组：计算数组元素地址。；特殊矩阵的压缩存储：对称阵、三角阵的元素地址计算。；稀疏矩阵的存储结构:三元组、十字链表；广义表的基本操作：求head、tail；求长度、深度"},{"title":"总复习提纲：第五章","body":"树和二叉树的定义和区别：无序、有序；例：3个结点可以构造出多少种不同的树和二叉树？；二叉树的5个性质：计算；完全二叉树的性质：n1=1或n1=0(度为1的结点数等于0或者1)；满m叉树的性质：由满二叉树性质推得；二叉树的先、中、后序遍历；线索二叉树：先序、中序、后序线索二叉树；树的存储结构：双亲表示法、孩子表示法、带双亲的孩子表示法、孩子兄弟法（二叉链表）；8、树、森林转换为二叉树；9、哈夫曼树的定义、构造方法以及哈夫曼树的性质：哈夫曼编码是最优的前缀码，没有度为1的结点。带权路径长度最小。；10、哈夫曼编码；11、树和森林的遍历"},{"title":"总复习提纲：第六章","body":"完全图的定义和性质：无向完全图、有向完全图边数。；顶点的度的计算；回路、简单回路、简单路径等的基本概念；图的存储结构：邻接矩阵和邻接表；4、广度优先遍历：遍历序列、队列；不同存储结构的时间复杂度。；深度优先遍历：遍历序列、栈；不同存储结构的时间复杂度。；最小生成树定义；最小生成树算法：prim、Kruskal和时间复杂度，适用场景（稠密图、稀疏图）；6、拓扑排序：拓扑排序序列、判断图是否有环；7、单源最短路径：Djkstra算法；8、每对顶点之间的最短路径算法Floyd；9、关键路径算法"},{"title":"总复习提纲：第七章","body":"线性表查找算法思想、存储结构和平均查找长度（时间复杂度）：顺序查找、折半查找、分块查找；二叉排序树的定义；二叉排序树的性质：中序遍历非空的二叉排序树，得到按照关键字排列的递增有序列；二叉排序树查找和平均查找长度计算；二叉排序树的生成、插入操作；二叉排序树删除结点：4种情况（叶子结点、只有左子树的结点、只有右子树的节点，同时右左右子树的结点）；平衡二叉树的定义：平衡因子=左子树高度-右子树高度；平衡排序树的调整原则：RR、LL、RL、LR（树的高度降低；保持二叉排序树的性质。）；哈希函数的构造方法：重点：除留余数法；哈希表处理冲突的方法：开放地址（线性探测、二次探测、为随机数探测）和链地址法；哈希表的查找和平均查找长度计算。"},{"title":"总复习提纲：第八章","body":"1、插入排序：直接插入排序（基于顺序查找）、折半插入排序（基于折半查找）、希尔插入排序（基于逐趟缩小增量）；交换排序：冒泡排序、快速排序；选择排序：简单选择排序、堆排序；归并排序：2-路归并排序；基数排序：分配排序：唯一不需要比较的排序；最好、最坏情况的时间复杂度（比较次数、移动次数）；空间复杂度；稳定性；外部排序：两个步骤：（1）划分归并段（2）归并；对m个归并段进行k-路平衡归并的归并趟数s：；k-路平衡归并的比较次数：；使用“败者树”，总比较次数变为：；外部排序-置换选择排序；外部排序-最佳归并树"},{"title":"期末复习要点：一、基础概念总论","body":"数据结构研究三大核心：数据元素、数据间逻辑关系、数据存储方式，不涉及数据商业价值。；数据结构分为两大模块：逻辑结构 + 存储结构。；逻辑结构分类：线性结构、树形结构、图形结构；树、图属于非线性结构。；存储结构分类：顺序存储、链式存储等，存储结构和逻辑结构相互独立。"},{"title":"期末复习要点：二、线性结构","body":"（一）线性表；两种主流存储：顺序存储、链式存储。；顺序表；占用连续内存空间；；支持随机访问（下标直接取值）；；插入、删除需要移动大量元素，效率偏低。；链表；内存空间不连续，依靠指针连接节点；；仅支持顺序访问，无法随机存取；；插入、删除仅修改指针，操作效率高；；循环链表：尾节点指针指向头节点。；（二）栈；本质：特殊线性表，操作仅限一端。；操作规则：先进后出（后进先出）。；术语：允许插入、删除的一端称为栈顶。；（三）队列；本质：特殊线性表，操作仅限两端。；操作规则：先进先出。；循环队列：主要用来解决普通顺序队列的假溢出问题。；栈与队列异同总结；相同点：都属于特殊线性表，仅在端点操作，不能对中间元素操作。；不同点：存取规则不同，栈先进后出，队列先进先出。"},{"title":"期末复习要点：三、树形结构（二叉树为主）","body":"基本定义；叶子节点：没有左、右孩子的节点。；树的度：树中节点的最大度数。；二叉树节点规律：第层最大节点数为。；完全二叉树；高度为，最少节点数：；；关系：满二叉树一定是完全二叉树，反之不成立。；二叉树三大遍历规则；前序遍历：根 → 左子树 → 右子树；中序遍历：左子树 → 根 → 右子树；后序遍历：左子树 → 右子树 → 根；考点应用：根据前序 + 中序、中序 + 后序还原二叉树，并写出对应遍历序列。"},{"title":"期末复习要点：四、图形结构","body":"两大遍历方式；深度优先遍历：缩写DFS；广度优先遍历：缩写BFS；DFS、BFS 均可用于连通图的遍历。"},{"title":"期末复习要点：五、排序算法（核心考点）","body":"稳定排序 & 不稳定排序；稳定排序：排序后相等元素相对位置不变，代表：冒泡排序、直接插入排序。；不稳定排序：排序后相等元素相对位置可能改变，代表：快速排序、简单选择排序、堆排序。；冒泡排序；原理：逐一遍历序列，相邻元素两两比较，逆序则交换，每一趟将当前最大值移至末尾。；时间复杂度：最坏情况，最好情况（已有序）。；实操考点：手写升序 / 降序每一趟冒泡排序结果。"},{"title":"期末复习要点：六、其他常用数据结构","body":"哈希表；核心作用：实现快速查找。；冲突解决方法：开放定址法、链地址法。；注意：哈希表并非绝对查找，存在冲突时效率下降。；稀疏矩阵：主流存储方式为三元组表。"},{"title":"期末复习要点：七、概念易混点","body":"栈、队列都属于特殊线性表（正确）。；链表不能随机访问（错误）。；满二叉树与完全二叉树的包含关系（正确）。；简单选择排序属于不稳定排序（错误）。；数据逻辑结构和存储方式无关（正确）。"},{"title":"期末复习要点：八、易混知识点","body":"顺序表与链表区别：从存储方式、访问方式、增删效率三点作答。；栈和队列：先答共同点（特殊线性表、端点操作），再答不同点（存取规则）。；二叉树遍历：分别写明前、中、后序 “根、左、右” 的访问顺序。；稳定排序：先定义概念，再各举 1~2 个典型算法例子。"}];
const TYPE_NAME = {single:'单选题',multiple:'多选题',fill:'填空题',judge:'判断题',short:'简答/代码题'};
let state = JSON.parse(localStorage.getItem('dsPracticeState') || '{"answers":{},"wrong":[],"exam":{}}');
let mode='study';
let shuffled=false;
function save(){localStorage.setItem('dsPracticeState', JSON.stringify(state)); document.getElementById('saveState').textContent='已保存 '+new Date().toLocaleTimeString(); updateStats();}
function norm(s){return String(s||'').replace(/\s+/g,'').replace(/[；;，,。\.]/g,'').toLowerCase();}
function isCorrect(q, val){
  if(q.type==='single'||q.type==='judge') return val===q.answer;
  if(q.type==='multiple') return [...val].sort().join('') === [...q.answer].sort().join('');
  if(q.type==='fill') {
    if(!Array.isArray(val)) return false; const ans=q.answer||[]; if(val.length<ans.length) return false;
    return ans.every((a,i)=> norm(val[i]).includes(norm(a)) || norm(a).includes(norm(val[i])));
  }
  return null;
}
function filteredQuestions(){
  const c=document.getElementById('chapterFilter').value, t=document.getElementById('typeFilter').value, s=document.getElementById('sourceFilter').value, kw=document.getElementById('searchBox').value.trim().toLowerCase();
  let arr=QUESTIONS.filter(q=>(!c||q.chapter===c)&&(!t||q.type===t)&&(!s||q.source===s));
  if(kw) arr=arr.filter(q=>JSON.stringify(q).toLowerCase().includes(kw));
  if(mode==='wrong') arr=arr.filter(q=>state.wrong.includes(q.id));
  if(shuffled) arr=[...arr].sort(()=>Math.random()-0.5);
  return arr;
}
function initFilters(){
  const chapters=[...new Set(QUESTIONS.map(q=>q.chapter))];
  chapterFilter.innerHTML='<option value="">全部章节</option>'+chapters.map(x=>`<option>${x}</option>`).join('');
  typeFilter.innerHTML='<option value="">全部题型</option>'+Object.entries(TYPE_NAME).map(([k,v])=>`<option value="${k}">${v}</option>`).join('');
  sourceFilter.innerHTML='<option value="">全部来源</option>'+[...new Set(QUESTIONS.map(q=>q.source))].map(x=>`<option>${x}</option>`).join('');
}
function renderMeta(q,i){return `<div class="meta"><span class="pill gray">${i+1}</span><span class="pill">${q.chapter}</span><span class="pill gray">${TYPE_NAME[q.type]}</span><span class="pill ${q.source==='原题'?'green':'amber'}">${q.source}</span><span class="pill gray">${q.difficulty||''}</span></div>`}
function answerText(q){
  if(q.type==='single'||q.type==='multiple') return q.answer;
  if(q.type==='judge') return q.answer;
  if(q.type==='fill') return (q.answer||[]).join('；');
  return q.answer;
}
function renderQuestion(q,i, exam=false){
  const saved = exam ? (state.exam.answers||{})[q.id] : state.answers[q.id];
  const checked = saved !== undefined;
  let body='';
  if(q.type==='single'||q.type==='judge'){
    body=q.options.map(o=>`<label class="option" data-label="${o.label}"><input type="radio" name="q_${q.id}" value="${o.label}" ${saved===o.label?'checked':''}> <span class="label">${o.label}</span><span>${o.text}</span></label>`).join('');
  } else if(q.type==='multiple'){
    const set=new Set(String(saved||'').split(''));
    body=q.options.map(o=>`<label class="option" data-label="${o.label}"><input type="checkbox" name="q_${q.id}" value="${o.label}" ${set.has(o.label)?'checked':''}> <span class="label">${o.label}</span><span>${o.text}</span></label>`).join('');
  } else if(q.type==='fill'){
    const arr=Array.isArray(saved)?saved:[];
    const blanks=Math.max((q.answer||[]).length, (q.title.match(/_(2,)/g)||[]).length, 1);
    body=Array.from({length:blanks},(_,k)=>`<input class="fill-input" data-index="${k}" placeholder="第${k+1}空" value="${arr[k]||''}">`).join('');
  } else {
    body=`<textarea class="short-input" placeholder="先自己写，再查看参考答案。">${saved||''}</textarea>`;
  }
  return `<div class="card q-card" data-id="${q.id}">${renderMeta(q,i)}<div class="q-title">${q.title}</div>${body}<div class="footer-actions"><button class="checkBtn">${exam?'保存答案':'提交/查看解析'}</button>${q.type==='short'?'<button class="showRef ghost">查看参考答案</button>':''}<button class="markWrong ghost">加入/移出错题</button></div><div class="explain"><div class="row"><b>正确答案：</b><span class="badge-green">${answerText(q)}</span></div>${(q.explanations||[]).map(e=>`<div class="row"><b>${e.label}：</b>${escapeHtml(e.text)}</div>`).join('')}</div></div>`
}
function escapeHtml(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function applyMark(card,q,val,show){
  if(!show) return;
  card.querySelectorAll('.option').forEach(el=>{
    const lab=el.dataset.label; el.classList.remove('correct','wrong');
    const ok = q.type==='multiple' ? q.answer.includes(lab) : q.answer===lab;
    const chosen = q.type==='multiple' ? String(val||'').includes(lab) : val===lab;
    if(ok) el.classList.add('correct');
    if(chosen && !ok) el.classList.add('wrong');
  });
  card.querySelector('.explain').classList.add('show');
}
function getCardAnswer(card,q){
  if(q.type==='single'||q.type==='judge') return (card.querySelector(`input[name="q_${q.id}"]:checked`)||{}).value || '';
  if(q.type==='multiple') return [...card.querySelectorAll(`input[name="q_${q.id}"]:checked`)].map(x=>x.value).sort().join('');
  if(q.type==='fill') return [...card.querySelectorAll('.fill-input')].map(x=>x.value.trim());
  return (card.querySelector('.short-input')||{}).value || '';
}
function bindCards(exam=false){
  document.querySelectorAll('.q-card').forEach(card=>{
    const q=QUESTIONS.find(x=>x.id===card.dataset.id);
    const saved = exam ? (state.exam.answers||{})[q.id] : state.answers[q.id];
    if(saved!==undefined && !exam) applyMark(card,q,saved,true);
    card.querySelector('.checkBtn').onclick=()=>{
      const val=getCardAnswer(card,q);
      if(exam){state.exam.answers=state.exam.answers||{}; state.exam.answers[q.id]=val; save(); return;}
      state.answers[q.id]=val;
      const ok=isCorrect(q,val);
      if(ok===false && !state.wrong.includes(q.id)) state.wrong.push(q.id);
      if(ok===true) state.wrong=state.wrong.filter(id=>id!==q.id);
      applyMark(card,q,val,true); save();
    };
    const sr=card.querySelector('.showRef'); if(sr) sr.onclick=()=>card.querySelector('.explain').classList.toggle('show');
    card.querySelector('.markWrong').onclick=()=>{state.wrong = state.wrong.includes(q.id) ? state.wrong.filter(id=>id!==q.id) : [...state.wrong,q.id]; save(); render();};
  });
}
function renderStudy(){ const arr=filteredQuestions(); panel.innerHTML=arr.map((q,i)=>renderQuestion(q,i,false)).join('') || '<div class="card">没有匹配题目。</div>'; bindCards(false); }
function startExam(){
  const pool=filteredQuestions().filter(q=>q.type!=='short');
  const n=Math.min(parseInt(document.getElementById('examCount')?.value||'30'), pool.length);
  const picks=[...pool].sort(()=>Math.random()-0.5).slice(0,n);
  state.exam={ids:picks.map(q=>q.id),answers:{},submitted:false}; save(); renderExam();
}
function submitExam(){state.exam.submitted=true; save(); renderExam();}
function renderExam(){
  if(!state.exam.ids){ panel.innerHTML=`<div class="card"><h2>模拟考试</h2><p>从当前筛选结果中随机抽题，简答题默认不进入自动判分。</p><input id="examCount" value="30" placeholder="抽题数量"><div class="footer-actions"><button id="startExamBtn">开始考试</button></div></div>`; startExamBtn.onclick=startExam; return; }
  const arr=state.exam.ids.map(id=>QUESTIONS.find(q=>q.id===id)).filter(Boolean);
  if(state.exam.submitted){
    const rows=arr.map(q=>{const val=(state.exam.answers||{})[q.id]; const ok=isCorrect(q,val); return {q,val,ok};});
    const correct=rows.filter(r=>r.ok===true).length;
    panel.innerHTML=`<div class="card result"><strong>${correct} / ${rows.length}</strong><br>正确率：${rows.length?Math.round(correct*100/rows.length):0}%<div class="footer-actions"><button id="newExamBtn">重新组卷</button></div></div>`+rows.map((r,i)=>renderQuestion(r.q,i,false)).join('');
    newExamBtn.onclick=()=>{delete state.exam.ids; save(); renderExam();}; bindCards(false);
    document.querySelectorAll('.q-card').forEach(card=>{const q=QUESTIONS.find(x=>x.id===card.dataset.id); const val=(state.exam.answers||{})[q.id]; applyMark(card,q,val,true); });
  } else {
    panel.innerHTML=`<div class="card"><b>考试进行中：</b>${arr.length}题<div class="footer-actions"><button id="submitExamBtn" class="warn">交卷</button><button id="cancelExamBtn" class="ghost">取消本卷</button></div></div>`+arr.map((q,i)=>renderQuestion(q,i,true)).join('');
    submitExamBtn.onclick=submitExam; cancelExamBtn.onclick=()=>{state.exam={}; save(); renderExam();}; bindCards(true);
  }
}
function renderBrowse(){
 const arr=filteredQuestions();
 panel.innerHTML=`<div class="card"><b>题库浏览：</b>${arr.length}题。点击“提交/查看解析”可直接看答案。</div>`+arr.map((q,i)=>renderQuestion(q,i,false)).join(''); bindCards(false);
}
function renderCards(){ panel.innerHTML=`<div class="card"><h2>复习资料</h2><p class="small">共 ${CARDS.length} 张卡片，包含速记知识点和本次导入的复习提纲。</p></div><div class="grid">`+CARDS.map(c=>`<div class="card"><h3>${c.title}</h3><p>${c.body}</p></div>`).join('')+'</div>'; }
function render(){ if(mode==='study') renderStudy(); else if(mode==='exam') renderExam(); else if(mode==='wrong') renderStudy(); else if(mode==='browse') renderBrowse(); else renderCards(); updateStats(); }
function updateStats(){
 const arr=filteredQuestions(); totalCount.textContent=arr.length; wrongCount.textContent=state.wrong.length;
 const answered=Object.keys(state.answers||{}).length; doneCount.textContent=answered;
 let attempts=0, correct=0; for(const [id,val] of Object.entries(state.answers||{})){const q=QUESTIONS.find(x=>x.id===id); if(!q||q.type==='short') continue; const ok=isCorrect(q,val); if(ok!==null){attempts++; if(ok) correct++;}}
 accRate.textContent=attempts?Math.round(correct*100/attempts)+'%':'0%';
}
window.studyHubPracticeStats=()=>{
 const answered=Object.keys(state.answers||{}).length;
 let attempts=0, correct=0;
 for(const [id,val] of Object.entries(state.answers||{})){const q=QUESTIONS.find(x=>x.id===id); if(!q||q.type==='short') continue; const ok=isCorrect(q,val); if(ok!==null){attempts++; if(ok) correct++;}}
 const chapters=new Set(QUESTIONS.map(q=>q.chapter||'未分类')).size;
 const types=new Set(QUESTIONS.map(q=>q.type||'other')).size;
 return {total:QUESTIONS.length,done:answered,wrong:state.wrong.length,accuracy:attempts?Math.round(correct*100/attempts)+'%':'0%',extraLabel:'章节/题型',extraValue:`${chapters}/${types}`};
};
function bootPractice(){
initFilters();
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); mode=b.dataset.mode; render();});
[chapterFilter,typeFilter,sourceFilter,searchBox].forEach(el=>el.addEventListener('input',()=>{shuffled=false; render();}));
shuffleBtn.onclick=()=>{shuffled=!shuffled; render();};
resetWrongBtn.onclick=()=>{state.wrong=[]; save(); render();};
exportBtn.onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ds-practice-progress.json'; a.click();};
render();
}
function practiceQuestionType(q){return q.type}
window.studyHubPracticeNav=()=>{
  if(mode!=='study')return null;
  const list=filteredQuestions();
  if(!list.length)return null;
  return {mode:'study',title:'答题卡',current:null,items:list.map((q,i)=>({id:q.id,index:i+1,label:String(i+1),type:practiceQuestionType(q),done:state.answers[q.id]!==undefined,wrong:state.wrong.includes(q.id)})),jump(index){const q=list[index-1];if(!q)return;const card=[...document.querySelectorAll('.q-card')].find(el=>el.dataset.id===q.id);if(card)card.scrollIntoView({behavior:'auto',block:'start'});}};
};
studyHubLoadQuestions("data/data-structure.json", "数据结构").then(data => { QUESTIONS = data; bootPractice(); });
</script>
