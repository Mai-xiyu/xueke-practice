
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>路由交换题库模拟练习</title>
<style>
:root {
  --bg:#0f172a; --panel:#111827; --panel2:#1f2937; --text:#e5e7eb; --muted:#9ca3af;
  --line:#334155; --blue:#60a5fa; --green:#16a34a; --green-bg:#052e16;
  --red:#ef4444; --red-bg:#3f1212; --yellow:#f59e0b; --white:#fff;
}
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","Microsoft YaHei",Arial,sans-serif; background:var(--bg); color:var(--text); }
header { position:sticky; top:0; z-index:20; background:rgba(15,23,42,.95); border-bottom:1px solid var(--line); backdrop-filter:blur(8px); }
.header-inner { max-width:1180px; margin:0 auto; padding:14px 18px; display:flex; gap:14px; align-items:center; justify-content:space-between; }
h1 { font-size:18px; margin:0; font-weight:700; letter-spacing:.2px; }
.badge { display:inline-block; padding:3px 8px; border:1px solid var(--line); border-radius:999px; color:var(--muted); font-size:12px; margin-left:8px; }
main { max-width:1180px; margin:0 auto; padding:20px 18px 50px; }
.card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px; margin:14px 0; box-shadow:0 10px 30px rgba(0,0,0,.18); }
.row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
button, select, input { border:1px solid var(--line); background:var(--panel2); color:var(--text); border-radius:10px; padding:9px 11px; font-size:14px; }
button { cursor:pointer; }
button.primary { background:#1d4ed8; border-color:#2563eb; color:white; }
button.ghost { background:transparent; }
button.warn { background:#7c2d12; border-color:#9a3412; }
button:disabled { opacity:.5; cursor:not-allowed; }
input[type="search"], input[type="number"] { min-width:180px; }
.tabs { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.tab { padding:9px 13px; border-radius:999px; border:1px solid var(--line); color:var(--muted); background:transparent; }
.tab.active { background:#1d4ed8; color:white; border-color:#2563eb; }
.meta { color:var(--muted); font-size:13px; line-height:1.7; }
.question-title { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:12px; }
.question-title h2 { font-size:18px; line-height:1.55; margin:0; white-space:pre-wrap; }
.qno { color:var(--blue); font-weight:700; margin-right:6px; }
.options { display:grid; gap:10px; margin:14px 0; }
.option { width:100%; text-align:left; display:flex; gap:10px; align-items:flex-start; background:#0b1220; border:1px solid var(--line); border-radius:13px; padding:12px; line-height:1.55; white-space:pre-wrap; }
.option .letter { flex:0 0 26px; width:26px; height:26px; border-radius:50%; display:inline-grid; place-items:center; background:var(--panel2); color:var(--text); font-weight:700; }
.option.correct { border-color:var(--green); background:var(--green-bg); }
.option.correct .letter { background:var(--green); color:white; }
.option.wrong { border-color:var(--red); background:var(--red-bg); }
.option.wrong .letter { background:var(--red); color:white; }
.option.selected:not(.correct):not(.wrong) { border-color:var(--blue); }
.explain { background:#0b1220; border:1px solid var(--line); border-radius:13px; padding:13px; margin-top:12px; }
.explain h3 { margin:0 0 8px; font-size:15px; }
.explain .meta { white-space:pre-wrap; }
.explain-list { display:grid; gap:8px; margin-top:10px; }
.explain-line { border-left:3px solid var(--line); padding:7px 9px; background:rgba(255,255,255,.03); border-radius:8px; line-height:1.55; }
.explain-line.good { border-left-color:var(--green); }
.explain-line.bad { border-left-color:var(--red); }
.progress { height:10px; background:#0b1220; border:1px solid var(--line); border-radius:999px; overflow:hidden; }
.progress > div { height:100%; background:linear-gradient(90deg,#2563eb,#22c55e); width:0%; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(52px,1fr)); gap:8px; }
.pill { border-radius:10px; padding:8px 0; text-align:center; background:#0b1220; border:1px solid var(--line); color:var(--muted); cursor:pointer; }
.pill.done { color:#bbf7d0; border-color:#166534; }
.pill.wrongMini { color:#fecaca; border-color:#991b1b; }
.pill.current { color:white; background:#1d4ed8; border-color:#2563eb; }
.result-big { font-size:28px; font-weight:800; }
.question-image { display:block; max-width:100%; border-radius:12px; border:1px solid var(--line); margin:12px 0; background:#fff; }
.hidden { display:none !important; }
.footer { color:var(--muted); font-size:12px; margin-top:20px; line-height:1.7; }
@media (max-width:760px) { .header-inner { align-items:flex-start; flex-direction:column; } .question-title { flex-direction:column; } }
</style>
<link rel="stylesheet" href="assets/common.css">
<script src="assets/question-loader.js"></script>
<script src="assets/session-sync.js" defer></script>
</head>
<body data-practice-shell="routing-switching">
<aside id="practiceAnswerCard" class="practice-question-nav" aria-label="答题卡" hidden></aside>
<header><div class="header-inner"><div><h1>路由交换题库模拟练习 <span class="badge" id="totalBadge">300题</span></h1><div class="meta">学习模式：每题作答后立即显示答案、红绿标注和逐项解析。考试模式：交卷后统计正确数与错题。</div></div><div class="row"><button class="ghost" id="btnExport">导出进度</button><button class="ghost" id="btnImport">导入进度</button><button class="warn" id="btnReset">清空进度</button></div></div></header>
<main>
  <div class="tabs"><button class="tab active" data-mode="study">学习模式</button><button class="tab" data-mode="exam">模拟考试</button><button class="tab" data-mode="bank">题库浏览</button></div>
  <section id="study" class="mode-section"></section>
  <section id="exam" class="mode-section hidden"></section>
  <section id="bank" class="mode-section hidden"></section>
  <div class="footer">说明：题目从本地 docx 题库提取；答案与解析按网络基础/华为 VRP 常见考试口径生成。页面支持本地保存进度，数据保存在浏览器 localStorage 中。</div>
</main>
<script>
let QUESTIONS = [];
const STORE_KEY = 'network-practice-v1';
let state = loadState();
let studyList = QUESTIONS.map(q=>q.id);
let studyIndex = Math.max(0, Math.min(state.studyIndex || 0, studyList.length - 1));
let examSet = [];
let examAnswers = {};
let examSubmitted = false;
let currentFilters = { source:'all', status:'all', search:'' };

function loadState() { try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch { return {}; } }
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function effectiveAnswer(q) { return (state.overrides && state.overrides[q.id]) || q.answer || ''; }
function getQ(id) { return QUESTIONS.find(q=>q.id===id); }
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function el(tag, cls, text) { const n=document.createElement(tag); if(cls) n.className=cls; if(text!==undefined) n.textContent=text; return n; }
function optionKeys(q) { return Object.keys(q.options || {}).filter(k => q.options[k] !== undefined && q.options[k] !== '').sort(); }
function isSubjective(q) { return ['subjective','short','essay','comprehensive'].includes(q.type) || optionKeys(q).length === 0; }
function optionExplanation(q, letter) {
  if (isSubjective(q)) return q.explanation || '';
  const ans = effectiveAnswer(q);
  const correctText = q.options?.[ans] || '';
  if (letter === ans) return `正确。该选项与本题规则一致：${q.explanation}`;
  return `错误。该选项是“${q.options?.[letter] || ''}”，不符合题干条件；本题应选 ${ans}. ${correctText}。${q.explanation}`;
}
function renderSubjectiveControls(q, revealed, onChoose) {
  const box = el('div','options');
  const btn = el('button','option'); btn.type='button';
  if (revealed) { btn.classList.add('correct'); btn.disabled = true; }
  btn.append(el('span','letter','答'), el('span','', revealed ? '已显示参考答案' : '显示参考答案'));
  btn.onclick = () => onChoose && onChoose('SUBJECTIVE');
  box.appendChild(btn);
  return box;
}
function renderOptionList(q, selected, revealed, onChoose) {
  if (isSubjective(q)) return renderSubjectiveControls(q, revealed, onChoose);
  const box = el('div','options');
  for (const k of optionKeys(q)) {
    const btn = el('button','option'); btn.type='button';
    const ans = effectiveAnswer(q);
    if (selected === k) btn.classList.add('selected');
    if (revealed) { if (k === ans) btn.classList.add('correct'); if (selected === k && selected !== ans) btn.classList.add('wrong'); btn.disabled = true; }
    btn.append(el('span','letter',k), el('span','',q.options?.[k] || ''));
    btn.onclick = () => onChoose && onChoose(k);
    box.appendChild(btn);
  }
  return box;
}
function renderExplanation(q) {
  const ans = effectiveAnswer(q);
  const wrap = el('div','explain');
  wrap.appendChild(el('h3','', isSubjective(q) ? '参考答案' : `正确答案：${ans}. ${q.options?.[ans] || ''}`));
  wrap.appendChild(el('div','meta',q.explanation));
  if (isSubjective(q)) return wrap;
  const lines = el('div','explain-list');
  for (const k of optionKeys(q)) { const line = el('div','explain-line ' + (k===ans?'good':'bad')); line.textContent = `${k}. ${optionExplanation(q,k)}`; lines.appendChild(line); }
  wrap.appendChild(lines);
  return wrap;
}
function renderQuestionHeader(q) {
  const head = el('div','question-title');
  const left = el('div'); const h = el('h2');
  h.append(el('span','qno',`[${q.source}] 第${q.num}题 `), document.createTextNode(q.stem));
  left.appendChild(h);
  if (q.image) { const img = new Image(); img.src=q.image; img.className='question-image'; img.alt=`${q.id} 题图`; left.appendChild(img); }
  head.appendChild(left); return head;
}
function renderAnswerEditor(q) {
  const controls = el('div','row');
  if (isSubjective(q)) {
    controls.appendChild(el('div','meta','主观题'));
  } else {
    const sel = el('select');
    for (const k of optionKeys(q)) { const o=el('option','',`设为 ${k}`); o.value=k; if(effectiveAnswer(q)===k) o.selected=true; sel.appendChild(o); }
    const save = el('button','ghost','改答案');
    save.onclick=()=>{ state.overrides ||= {}; state.overrides[q.id]=sel.value; saveState(); renderAll(); };
    controls.append(sel, save);
  }
  return controls;
}
function filtersCard(onApply) {
  const card = el('div','card'); const row = el('div','row');
  const source = el('select'); source.id='filterSource';
  [['all','全部卷'],['1','卷1 路由/RIP'],['2','卷2 OSPF/BGP/ACL'],['3','卷3 NAT/VLAN/STP'],['4','去年A卷'],['5','头歌配置题']].forEach(([v,t])=>{ const o=el('option','',t); o.value=v; source.appendChild(o); });
  source.value = currentFilters.source;
  const status = el('select'); status.id='filterStatus';
  [['all','全部状态'],['wrong','只看错题'],['unseen','未做题'],['marked','收藏题']].forEach(([v,t])=>{ const o=el('option','',t); o.value=v; status.appendChild(o); });
  status.value = currentFilters.status;
  const search = document.createElement('input'); search.type='search'; search.placeholder='搜索题干/选项'; search.id='filterSearch';
  search.value = currentFilters.search;
  const btn = el('button','primary','应用筛选'); btn.onclick=onApply;
  row.append(source,status,search,btn); card.appendChild(row); return card;
}
function applyFilter() {
  const src=document.getElementById('filterSource')?.value || 'all';
  const st=document.getElementById('filterStatus')?.value || 'all';
  const kw=(document.getElementById('filterSearch')?.value || '').trim().toLowerCase();
  currentFilters = { source:src, status:st, search:kw };
  let list=QUESTIONS.filter(q=>{
    if(src!=='all' && String(q.doc)!==src) return false;
    const rec=state.progress?.[q.id];
    if(st==='wrong' && (!rec || rec.lastCorrect!==false)) return false;
    if(st==='unseen' && rec) return false;
    if(st==='marked' && !state.marked?.[q.id]) return false;
    if(kw) { const hay=(q.stem+' '+Object.values(q.options || {}).join(' ')+' '+(q.explanation || '')).toLowerCase(); if(!hay.includes(kw)) return false; }
    return true;
  }).map(q=>q.id);
  if(!list.length) list=QUESTIONS.map(q=>q.id);
  studyList=list; studyIndex=0; state.studyIndex=0; saveState(); renderStudy();
}
function renderStudy() {
  const root=document.getElementById('study'); root.innerHTML='';
  root.appendChild(filtersCard(applyFilter));
  if (!studyList.length) {
    const empty=el('div','card');
    empty.appendChild(el('h2','','没有匹配的题目'));
    empty.appendChild(el('div','meta','当前筛选或错题集合为空，可以恢复全部题目继续练习。'));
    const resetAll=el('button','primary','恢复全部题目');
    resetAll.onclick=()=>{ currentFilters={source:'all',status:'all',search:''}; studyList=QUESTIONS.map(q=>q.id); studyIndex=0; state.studyIndex=0; saveState(); renderStudy(); };
    empty.appendChild(resetAll);
    root.appendChild(empty);
    if (typeof window.studyHubRefreshStats === 'function') window.studyHubRefreshStats();
    return;
  }
  if (studyIndex < 0 || studyIndex >= studyList.length) {
    studyIndex=Math.max(0, Math.min(studyIndex, studyList.length-1));
    state.studyIndex=studyIndex;
    saveState();
  }
  const q=getQ(studyList[studyIndex]);
  if (!q) {
    studyList=QUESTIONS.map(q=>q.id);
    studyIndex=0;
    state.studyIndex=0;
    saveState();
    renderStudy();
    return;
  }
  const rec=state.progress?.[q.id] || {}; const selected=rec.studySelected || null; const revealed=!!rec.studyRevealed;
  const card=el('div','card');
  const top=el('div','row'); top.appendChild(el('div','meta',`当前 ${studyIndex+1}/${studyList.length}，总题库 ${QUESTIONS.length} 题`));
  const markBtn=el('button','ghost', state.marked?.[q.id] ? '取消收藏' : '收藏本题');
  markBtn.onclick=()=>{ state.marked ||= {}; if(state.marked[q.id]) delete state.marked[q.id]; else state.marked[q.id]=true; saveState(); renderStudy(); };
  top.appendChild(markBtn); card.appendChild(top);
  const prog=el('div','progress'); const bar=el('div'); bar.style.width = `${Math.round((studyIndex+1)/studyList.length*100)}%`; prog.appendChild(bar); card.appendChild(prog);
  card.appendChild(renderQuestionHeader(q));
  card.appendChild(renderOptionList(q, selected, revealed, (k)=>{
    state.progress ||= {}; state.progress[q.id] ||= {};
    const ans=effectiveAnswer(q);
    state.progress[q.id].studySelected=k; state.progress[q.id].studyRevealed=true;
    state.progress[q.id].attempts=(state.progress[q.id].attempts||0)+1;
    state.progress[q.id].lastCorrect=isSubjective(q) ? null : (k===ans); state.progress[q.id].lastAt=Date.now();
    saveState(); renderStudy();
  }));
  if(revealed) card.appendChild(renderExplanation(q));
  const nav=el('div','row');
  const prev=el('button','ghost','上一题'); prev.disabled=studyIndex===0; prev.onclick=()=>{studyIndex--; state.studyIndex=studyIndex; saveState(); renderStudy(); window.scrollTo(0,0);};
  const next=el('button','primary','下一题'); next.disabled=studyIndex>=studyList.length-1; next.onclick=()=>{studyIndex++; state.studyIndex=studyIndex; saveState(); renderStudy(); window.scrollTo(0,0);};
  const rand=el('button','ghost','随机一题'); rand.onclick=()=>{studyIndex=Math.floor(Math.random()*studyList.length); state.studyIndex=studyIndex; saveState(); renderStudy(); window.scrollTo(0,0);};
  const reset=el('button','ghost','重做本题'); reset.onclick=()=>{ if(state.progress?.[q.id]) { delete state.progress[q.id].studySelected; delete state.progress[q.id].studyRevealed; } saveState(); renderStudy(); };
  nav.append(prev,next,rand,reset); card.appendChild(nav); root.appendChild(card);
}
function renderExam() {
  const root=document.getElementById('exam'); root.innerHTML='';
  const cfg=el('div','card'); const row=el('div','row');
  const source=el('select'); source.id='examSource'; [['all','全部卷'],['1','卷1'],['2','卷2'],['3','卷3'],['4','去年A卷'],['5','头歌配置题']].forEach(([v,t])=>{const o=el('option','',t);o.value=v;source.appendChild(o);});
  const count=el('select'); count.id='examCount'; [['20','20题'],['50','50题'],['100','100题'],['300','300题'],['9999','全部题']].forEach(([v,t])=>{const o=el('option','',t);o.value=v;count.appendChild(o);});
  const order=el('select'); order.id='examOrder'; [['random','随机抽题'],['seq','顺序出题'],['wrong','错题重练']].forEach(([v,t])=>{const o=el('option','',t);o.value=v;order.appendChild(o);});
  const start=el('button','primary','开始/重开考试'); start.onclick=startExam;
  row.append(source,count,order,start); cfg.appendChild(row); cfg.appendChild(el('div','meta','交卷前不显示答案；交卷后统计客观题分数，主观题交卷后显示参考答案并需人工判分。')); root.appendChild(cfg);
  examSet=examSet.filter(id=>getQ(id));
  if(!examSet.length) {
    const empty=el('div','card');
    empty.appendChild(el('h2','','暂无考试题目'));
    empty.appendChild(el('div','meta','当前出题条件没有可用题目，请切换模式或点击重新生成试卷。'));
    root.appendChild(empty);
    return;
  }
  const card=el('div','card'); card.appendChild(el('h3','', examSubmitted ? '考试结果' : '答题区'));
  if(examSubmitted) {
    const scored = examSet.filter(id=>!isSubjective(getQ(id)));
    const subjective = examSet.length - scored.length;
    let ok=0; const wrong=[];
    scored.forEach(id=>{ const q=getQ(id); const ans=effectiveAnswer(q); if(examAnswers[id]===ans) ok++; else wrong.push(id); });
    const rate = scored.length ? Math.round(ok/scored.length*100) : 0;
    card.appendChild(el('div','result-big',`${ok}/${scored.length}`));
    card.appendChild(el('div','meta',`客观题正确率 ${rate}%。错题 ${wrong.length} 道。主观题 ${subjective} 道需人工判分。`));
    const wrongOnly=el('button','primary','把错题加入学习模式'); wrongOnly.disabled=!wrong.length; wrongOnly.onclick=()=>{ studyList=wrong; studyIndex=0; switchMode('study'); renderStudy(); };
    card.appendChild(wrongOnly);
  } else {
    const answered=Object.keys(examAnswers).length; const prog=el('div','progress'); const bar=el('div'); bar.style.width=`${Math.round(answered/examSet.length*100)}%`; prog.appendChild(bar); card.appendChild(prog); card.appendChild(el('div','meta',`已答 ${answered}/${examSet.length}`));
  }
  const submit=el('button','primary', examSubmitted?'重新交卷':'交卷');
  submit.onclick=()=>{ examSubmitted=true; state.progress ||= {}; examSet.forEach(id=>{ const q=getQ(id); const ans=effectiveAnswer(q); const chosen=examAnswers[id] || null; state.progress[id] ||= {}; state.progress[id].lastCorrect = isSubjective(q) ? null : (chosen===ans); state.progress[id].examSelected=chosen; state.progress[id].lastAt=Date.now(); }); saveState(); renderExam(); window.scrollTo(0,0); };
  card.appendChild(submit); root.appendChild(card);
  examSet.forEach((id)=>{ const q=getQ(id); const qcard=el('div','card'); qcard.appendChild(renderQuestionHeader(q)); const selected=examAnswers[id] || null; if(isSubjective(q)) { const note=el('div','explain'); note.appendChild(el('div','meta','主观题不自动判分；交卷后显示参考答案。')); qcard.appendChild(note); examAnswers[id] ||= 'SUBJECTIVE'; } else { qcard.appendChild(renderOptionList(q, selected, examSubmitted, (k)=>{ examAnswers[id]=k; renderExam(); })); } if(examSubmitted) qcard.appendChild(renderExplanation(q)); root.appendChild(qcard); });
}
function startExam() {
  const src=document.getElementById('examSource').value; const n=parseInt(document.getElementById('examCount').value,10); const ord=document.getElementById('examOrder').value;
  let pool=QUESTIONS.filter(q=>src==='all'||String(q.doc)===src).map(q=>q.id);
  if(ord==='wrong') pool=pool.filter(id=>state.progress?.[id]?.lastCorrect===false);
  if(ord==='random' || ord==='wrong') pool=shuffle(pool);
  examSet=pool.slice(0, Math.min(n,pool.length)); examAnswers={}; examSubmitted=false; renderExam();
}
function renderBank() {
  const root=document.getElementById('bank'); root.innerHTML=''; const card=el('div','card'); const row=el('div','row');
  const search=document.createElement('input'); search.type='search'; search.placeholder='搜索题干、选项、答案';
  const src=el('select'); [['all','全部卷'],['1','卷1'],['2','卷2'],['3','卷3'],['4','去年A卷'],['5','头歌配置题']].forEach(([v,t])=>{const o=el('option','',t);o.value=v;src.appendChild(o);});
  const btn=el('button','primary','搜索'); row.append(src,search,btn); card.appendChild(row); const result=el('div'); card.appendChild(result); root.appendChild(card);
  const doSearch=()=>{ const kw=search.value.trim().toLowerCase(); result.innerHTML=''; QUESTIONS.filter(q=>(src.value==='all'||String(q.doc)===src.value) && (!kw || (q.stem+' '+Object.values(q.options || {}).join(' ')+' '+effectiveAnswer(q)+' '+(q.explanation || '')).toLowerCase().includes(kw))).forEach(q=>{ const item=el('div','explain'); item.appendChild(el('h3','', isSubjective(q) ? `${q.id} 主观题` : `${q.id} 正确：${effectiveAnswer(q)}. ${q.options?.[effectiveAnswer(q)] || ''}`)); item.appendChild(el('div','meta',q.stem)); const actions=renderAnswerEditor(q); const open=el('button','ghost','进入学习'); open.onclick=()=>{ studyList=QUESTIONS.map(x=>x.id); studyIndex=QUESTIONS.findIndex(x=>x.id===q.id); switchMode('study'); renderStudy(); window.scrollTo(0,0); }; actions.appendChild(open); item.appendChild(actions); result.appendChild(item); }); };
  btn.onclick=doSearch; search.onkeydown=(e)=>{if(e.key==='Enter')doSearch();}; doSearch();
}
function practiceQuestionType(q) {
  if (q.type === 'true_false') return 'judge';
  if (q.type === 'comprehensive') return 'comprehensive';
  if (isSubjective(q)) return 'short';
  return 'choice';
}
window.studyHubPracticeStats = () => {
  const progress = state.progress || {};
  const records = Object.values(progress);
  const done = records.filter((rec) => rec.studyRevealed || rec.lastCorrect !== undefined || rec.examSelected !== undefined).length;
  const wrong = records.filter((rec) => rec.lastCorrect === false).length;
  const docs = new Set(QUESTIONS.map((q) => q.doc ?? q.source ?? "default")).size;
  const types = new Set(QUESTIONS.map((q) => practiceQuestionType(q))).size;
  return { total: QUESTIONS.length, done, wrong, extraLabel: "题库/题型", extraValue: `${docs}/${types}` };
};
window.studyHubPracticeNav = () => {
  const activeMode = document.querySelector('.tab.active')?.dataset.mode;
  if (activeMode !== 'study' || !studyList.length) return null;
  return {
    mode: 'study',
    title: '答题卡',
    current: studyIndex + 1,
    items: studyList.map((id, index) => {
      const q = getQ(id);
      const rec = state.progress?.[id] || {};
      return {
        id,
        index: index + 1,
        label: String(index + 1),
        type: practiceQuestionType(q),
        done: Boolean(rec.studyRevealed),
        wrong: rec.lastCorrect === false,
        marked: Boolean(state.marked?.[id])
      };
    }),
    jump(index) {
      studyIndex = Math.max(0, Math.min(index - 1, studyList.length - 1));
      state.studyIndex = studyIndex;
      saveState();
      renderStudy();
      window.scrollTo(0, 0);
    }
  };
};
function switchMode(m) { document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m)); document.querySelectorAll('.mode-section').forEach(s=>s.classList.add('hidden')); document.getElementById(m).classList.remove('hidden'); }
function renderAll() { renderStudy(); renderExam(); renderBank(); document.getElementById('totalBadge').textContent=`${QUESTIONS.length}题`; }
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{switchMode(t.dataset.mode); if(t.dataset.mode==='exam'){ renderExam(); if(!examSet.length) startExam(); } if(t.dataset.mode==='bank')renderBank();});
document.getElementById('btnReset').onclick=()=>{ if(confirm('确定清空所有本地进度、收藏和改答案记录？')) { state={}; saveState(); studyIndex=0; examSet=[]; examAnswers={}; examSubmitted=false; renderAll(); } };
document.getElementById('btnExport').onclick=()=>{ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='network-practice-progress.json'; a.click(); URL.revokeObjectURL(url); };
document.getElementById('btnImport').onclick=()=>{ const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json'; inp.onchange=()=>{ const f=inp.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{state=JSON.parse(r.result); saveState(); renderAll();}catch(e){alert('导入失败：JSON无效');} }; r.readAsText(f); }; inp.click(); };
studyHubLoadQuestions("data/route-switching.json", "路由交换").then(data => {
  QUESTIONS = data;
  studyList = QUESTIONS.map(q => q.id);
  studyIndex = Math.max(0, Math.min(state.studyIndex || 0, studyList.length - 1));
  renderAll();
});
</script>
</body>
</html>
