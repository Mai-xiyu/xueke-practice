const TYPE_NAME = { single: "单选", multiple: "多选", fill: "填空", judge: "判断", short: "简答", code: "代码" };
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"answers":{},"wrong":{}}');
let current = 0;

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function chapters(){ return [...new Set(QUESTIONS.map(q => q.chapter || "未分章"))]; }
function filtered(){
  const ch = chapterFilter.value;
  const ty = typeFilter.value;
  const kw = searchBox.value.trim().toLowerCase();
  return QUESTIONS.filter(q => (!ch || q.chapter === ch) && (!ty || q.type === ty) && (!kw || JSON.stringify(q).toLowerCase().includes(kw)));
}
function answerText(q){
  if (q.type === "fill") return (q.answers || []).join(" / ");
  if (q.type === "short" || q.type === "code") return q.answer || "";
  return (q.correct || []).join("");
}
function render(){
  const list = filtered();
  if (!list.length) {
    questionPanel.innerHTML = '<div class="card">没有匹配题目。</div>';
    return;
  }
  current = Math.max(0, Math.min(current, list.length - 1));
  const q = list[current];
  const saved = state.answers[q.id];
  let body = "";
  if (q.type === "single" || q.type === "judge") {
    body = Object.entries(q.options || {}).map(([k,v]) => `<button class="option" data-answer="${esc(k)}"><b>${esc(k)}.</b> ${esc(v)}</button>`).join("");
  } else if (q.type === "multiple") {
    body = Object.entries(q.options || {}).map(([k,v]) => `<label class="option"><input type="checkbox" value="${esc(k)}"> <b>${esc(k)}.</b> ${esc(v)}</label>`).join("");
  } else {
    body = `<textarea id="textAnswer" style="width:100%;min-height:130px">${esc(saved || "")}</textarea>`;
  }
  questionPanel.innerHTML = `<article class="card">
    <p class="muted">${current + 1}/${list.length} · ${esc(q.source)} · ${esc(q.chapter)} · ${esc(TYPE_NAME[q.type] || q.type)}</p>
    <h2>${esc(q.stem)}</h2>
    ${body}
    <div class="row"><button class="primary" id="showBtn">提交/查看解析</button><button id="prevBtn">上一题</button><button id="nextBtn">下一题</button></div>
    <div id="analysis" class="analysis hidden"></div>
  </article>`;
  questionPanel.querySelectorAll("[data-answer]").forEach(btn => btn.onclick = () => choose(q, btn.dataset.answer));
  showBtn.onclick = () => show(q, null);
  prevBtn.onclick = () => { current -= 1; render(); };
  nextBtn.onclick = () => { current += 1; render(); };
}
function choose(q, value){
  state.answers[q.id] = value;
  const ok = (q.correct || []).includes(value);
  if (ok) delete state.wrong[q.id]; else state.wrong[q.id] = value;
  save();
  show(q, value);
}
function show(q, value){
  const box = document.getElementById("analysis");
  box.classList.remove("hidden");
  box.innerHTML = `<b>参考答案：${esc(answerText(q))}</b><p>${esc(q.analysis || "")}</p>`;
  document.querySelectorAll(".option").forEach(el => {
    const value = el.dataset.answer;
    if ((q.correct || []).includes(value)) el.classList.add("correct");
    else el.classList.add("wrong");
  });
}
function init(){
  chapterFilter.innerHTML = '<option value="">全部章节</option>' + chapters().map(x => `<option>${esc(x)}</option>`).join("");
  typeFilter.innerHTML = '<option value="">全部题型</option>' + Object.entries(TYPE_NAME).map(([k,v]) => `<option value="${k}">${v}</option>`).join("");
  [chapterFilter,typeFilter,searchBox].forEach(el => el.addEventListener("input", () => { current = 0; render(); }));
  shuffleBtn.onclick = () => { const list = filtered(); current = Math.floor(Math.random() * list.length); render(); };
  resetBtn.onclick = () => { const q = filtered()[current]; if (q) delete state.answers[q.id]; save(); render(); };
  render();
}
function practiceQuestionType(q){return q.type}
window.studyHubPracticeNav=()=>{
  const list=filtered();
  if(!list.length)return null;
  return {mode:'study',title:'答题卡',current:current+1,items:list.map((q,i)=>({id:q.id,index:i+1,label:String(i+1),type:practiceQuestionType(q),done:state.answers[q.id]!==undefined,wrong:Boolean(state.wrong[q.id])})),jump(index){current=Math.max(0,Math.min(index-1,list.length-1));render();window.scrollTo(0,0);}};
};
init();
